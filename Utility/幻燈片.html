<style>
  :root{
    --bg:#121315;          /* 墨玄 */
    --surface:#1b1c1f;
    --surface-2:#26272b;
    --text:#fcfbfa;        /* 玉盤白 */
    --text-dim:#b3b0a8;
    --accent:#bd8b2a;      /* 耀日金 */
    --accent-soft:rgba(189,139,42,.18);
    --accent2:#942525;     /* 硃砂紅 */
    --accent2-soft:rgba(148,37,37,.22);
    --ctrl-size:72px;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg); color:var(--text);
    font-family:"Noto Serif TC","PingFang TC","Microsoft JhengHei",serif;
    overscroll-behavior:none;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  .ctrl-btn .lb, .info, #support-note, .status, input[type=range]{
    font-family:"Inter","Noto Sans TC",sans-serif;
  }
  #app{ position:fixed; inset:0; overflow:hidden; }

  /* ---------- Start screen ---------- */
  #start-screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:28px;
    padding:32px; text-align:center; background:var(--bg);
    overflow-y:auto;
  }
  #start-screen h1{
    font-size:clamp(28px,5vw,44px); font-weight:900; margin:0 0 4px;
    letter-spacing:.06em; color:var(--accent);
    font-family:"Cormorant Garamond","Noto Serif TC",serif;
  }
  #start-screen p.sub{ color:var(--text-dim); margin:0 0 12px; font-size:clamp(16px,2.4vw,20px); }
  .picker-row{ display:flex; flex-wrap:wrap; gap:18px; justify-content:center; }
  .big-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; min-width:180px; min-height:120px; padding:18px 22px;
    background:var(--surface); border:2px solid var(--surface-2);
    border-radius:var(--radius); color:var(--text); cursor:pointer;
    font-family:inherit; font-size:18px; font-weight:700;
    transition:border-color .15s, transform .1s, background .15s;
  }
  .big-btn:hover{ border-color:var(--accent); }
  .big-btn:active{ transform:scale(.97); background:var(--surface-2); }
  .big-btn .icon{ font-size:40px; line-height:1; }
  .big-btn .status{ font-size:14px; font-weight:400; color:var(--text-dim); max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .big-btn.ready{ border-color:var(--accent); background:var(--accent-soft); }

  .option-row{ display:flex; flex-wrap:wrap; gap:16px; justify-content:center; align-items:center; margin-top:4px; }
  .option-group{
    display:flex; align-items:center; gap:10px; background:var(--surface);
    padding:12px 18px; border-radius:999px; font-size:17px;
  }
  .option-group label{ color:var(--text-dim); }
  .toggle-pair{ display:flex; border-radius:999px; overflow:hidden; border:2px solid var(--surface-2); }
  .toggle-pair button{
    border:none; background:transparent; color:var(--text-dim); padding:8px 18px;
    font-family:inherit; font-size:16px; font-weight:700; cursor:pointer;
  }
  .toggle-pair button.active{ background:var(--accent); color:var(--bg); }
  input[type=range]{ width:140px; accent-color:var(--accent); }

  #start-action{
    margin-top:10px; padding:20px 56px; font-size:24px; font-weight:900;
    background:var(--accent); color:var(--bg); border:none; border-radius:999px;
    cursor:pointer; box-shadow:0 6px 24px rgba(201,162,39,.35);
  }
  #start-action:disabled{ background:var(--surface-2); color:var(--text-dim); box-shadow:none; cursor:not-allowed; }
  #start-action:active:not(:disabled){ transform:scale(.98); }

  #resume-banner{
    display:none; background:var(--surface); border:2px solid var(--accent);
    border-radius:var(--radius); padding:16px 22px; font-size:17px; max-width:520px;
    align-items:center; gap:16px; flex-wrap:wrap; justify-content:center;
  }
  #resume-banner button{
    padding:12px 22px; border-radius:999px; border:none; font-family:inherit;
    font-size:16px; font-weight:700; cursor:pointer;
  }
  #resume-continue{ background:var(--accent); color:var(--bg); }
  #resume-restart{ background:var(--surface-2); color:var(--text); }

  #support-note{ font-size:13px; color:var(--text-dim); max-width:520px; }

  /* ---------- Stage ---------- */
  #stage{ position:absolute; inset:0; display:none; background:#000; }
  #photo-container{ position:absolute; inset:0; overflow:hidden; }
  .layer{
    position:absolute; top:0; left:0; will-change:transform, opacity;
    opacity:0; transition:opacity 1s ease;
    max-width:none; max-height:none;
  }
  .layer.visible{ opacity:1; }
  #empty-note{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); font-size:20px; text-align:center; padding:24px;
  }

  /* ---------- Overlay controls ---------- */
  #controls-overlay{
    position:absolute; inset:0; pointer-events:none;
    opacity:1; transition:opacity .4s ease;
  }
  #controls-overlay.hidden{ opacity:0; }
  #top-bar{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:18px 20px; pointer-events:none;
    background:linear-gradient(to bottom, rgba(0,0,0,.55), transparent);
  }
  #top-bar .info{ font-size:15px; color:var(--text-dim); pointer-events:none; }
  #top-bar .info b{ color:var(--text); }
  #gear-btn{ pointer-events:auto; }

  #bottom-bar{
    position:absolute; left:0; right:0; bottom:0;
    display:flex; align-items:center; justify-content:center; gap:14px;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(0,0,0,.7), transparent);
    pointer-events:auto; flex-wrap:wrap;
  }
  .ctrl-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:var(--ctrl-size); height:var(--ctrl-size); border-radius:50%;
    background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18);
    color:var(--text); cursor:pointer; gap:2px;
  }
  .ctrl-btn:active{ background:rgba(255,255,255,.16); transform:scale(.95); }
  .ctrl-btn .ic{ font-size:26px; line-height:1; }
  .ctrl-btn .lb{ font-size:11px; color:var(--text-dim); }
  .ctrl-btn.primary{ width:calc(var(--ctrl-size) + 18px); height:calc(var(--ctrl-size) + 18px); background:var(--accent); border:none; }
  .ctrl-btn.primary .ic{ font-size:32px; color:var(--bg); }
  .ctrl-btn.primary .lb{ color:rgba(18,19,21,.75); }
  .ctrl-btn.on{ background:var(--accent-soft); border-color:var(--accent); }

  #progress-track{
    position:absolute; bottom:0; left:0; right:0; height:4px;
    background:rgba(255,255,255,.12); pointer-events:none;
  }
  #progress-fill{ height:100%; width:0%; background:var(--accent); }

  /* ---------- Settings panel ---------- */
  #settings-panel{
    position:absolute; inset:0; background:rgba(0,0,0,.72);
    display:none; align-items:center; justify-content:center; z-index:20;
    padding:20px;
  }
  #settings-card{
    background:var(--surface); border-radius:20px; padding:28px 26px;
    width:min(460px, 100%); max-height:86vh; overflow-y:auto;
    display:flex; flex-direction:column; gap:20px;
  }
  #settings-card h2{ margin:0; font-size:22px; }
  .settings-row{ display:flex; align-items:center; justify-content:space-between; gap:14px; font-size:17px; }
  .settings-row .val{ color:var(--accent); font-weight:700; min-width:48px; text-align:right; }
  .settings-btn-row{ display:flex; gap:12px; flex-wrap:wrap; }
  .settings-btn-row .big-btn{ min-width:0; flex:1; min-height:88px; padding:12px; }
  #close-settings{
    align-self:center; margin-top:6px; padding:12px 30px; border-radius:999px;
    border:none; background:var(--accent); color:var(--bg); font-weight:900;
    font-size:17px; cursor:pointer; font-family:inherit;
  }

  @media (max-width:520px){
    :root{ --ctrl-size:60px; }
    .ctrl-btn .lb{ display:none; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===================== START SCREEN ===================== -->
  <div id="start-screen">
    <h1>相簿播放器</h1>
    <p class="sub">選好相片和音樂資料夾，就可以開始播放</p>

    <div id="resume-banner">
      <span id="resume-text">找到上次播放的進度</span>
      <button id="resume-continue">從上次繼續</button>
      <button id="resume-restart">從頭開始</button>
    </div>

    <div class="picker-row">
      <button class="big-btn" id="pick-photos">
        <span class="icon">🖼️</span>
        <span>選擇相片資料夾</span>
        <span class="status" id="photo-status">尚未選擇</span>
      </button>
      <button class="big-btn" id="pick-music">
        <span class="icon">🎵</span>
        <span>選擇音樂資料夾（可略過）</span>
        <span class="status" id="music-status">尚未選擇</span>
      </button>
    </div>

    <div class="option-row">
      <div class="option-group">
        <label>播放順序</label>
        <div class="toggle-pair" id="order-toggle">
          <button data-mode="sequential" class="active">循序</button>
          <button data-mode="random">隨機</button>
        </div>
      </div>
      <div class="option-group">
        <label>每張秒數</label>
        <input type="range" id="duration-range" min="3" max="100" value="8">
        <span id="duration-label">8 秒</span>
      </div>
      <div class="option-group">
        <label>放大比例</label>
        <input type="range" id="zoom-range" min="100" max="300" step="10" value="100">
        <span id="zoom-label">100%</span>
      </div>
      <div class="option-group">
        <label>放大前先看原圖</label>
        <div class="toggle-pair" id="original-toggle">
          <button data-val="off" class="active">關閉</button>
          <button data-val="on">開啟</button>
        </div>
      </div>
      <div class="option-group">
        <label>高畫質放大</label>
        <div class="toggle-pair" id="hq-toggle">
          <button data-val="off" class="active">關閉</button>
          <button data-val="on">開啟</button>
        </div>
      </div>
    </div>

    <button id="start-action" disabled>開始播放</button>
    <p id="support-note"></p>

    <!-- hidden fallback inputs for browsers without File System Access API -->
    <input type="file" id="photo-input-fallback" webkitdirectory multiple style="display:none">
    <input type="file" id="music-input-fallback" webkitdirectory multiple style="display:none">
  </div>

  <!-- ===================== STAGE ===================== -->
  <div id="stage">
    <div id="photo-container">
      <img class="layer" id="layer-a">
      <img class="layer" id="layer-b">
      <div id="empty-note" style="display:none;">這個資料夾裡沒有找到相片</div>
    </div>
    <audio id="audio-player"></audio>

    <div id="controls-overlay">
      <div id="top-bar">
        <div class="info"><b id="counter-text">0 / 0</b></div>
        <button class="ctrl-btn" id="gear-btn"><span class="ic">⚙️</span><span class="lb">設定</span></button>
      </div>
      <div id="bottom-bar">
        <button class="ctrl-btn" id="prev-btn"><span class="ic">⏮</span><span class="lb">上一張</span></button>
        <button class="ctrl-btn primary" id="play-btn"><span class="ic" id="play-icon">⏸</span><span class="lb">暫停</span></button>
        <button class="ctrl-btn" id="next-btn"><span class="ic">⏭</span><span class="lb">下一張</span></button>
        <button class="ctrl-btn" id="order-btn"><span class="ic">🔀</span><span class="lb" id="order-lb">隨機</span></button>
        <button class="ctrl-btn" id="mute-btn"><span class="ic" id="mute-icon">🔊</span><span class="lb">音樂</span></button>
        <button class="ctrl-btn" id="fullscreen-btn"><span class="ic">⛶</span><span class="lb">全螢幕</span></button>
      </div>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>

    <!-- Settings panel reachable during playback -->
    <div id="settings-panel">
      <div id="settings-card">
        <h2>設定</h2>
        <div class="settings-row">
          <label>每張相片秒數</label>
          <input type="range" id="duration-range-2" min="3" max="100" value="8">
          <span class="val" id="duration-label-2">8 秒</span>
        </div>
        <div class="settings-row">
          <label>播放順序</label>
          <div class="toggle-pair" id="order-toggle-2">
            <button data-mode="sequential">循序</button>
            <button data-mode="random">隨機</button>
          </div>
        </div>
        <div class="settings-row">
          <label>放大比例</label>
          <input type="range" id="zoom-range-2" min="100" max="300" step="10" value="100">
          <span class="val" id="zoom-label-2">100%</span>
        </div>
        <div class="settings-row">
          <label>放大前先看原圖</label>
          <div class="toggle-pair" id="original-toggle-2">
            <button data-val="off" class="active">關閉</button>
            <button data-val="on">開啟</button>
          </div>
        </div>
        <div class="settings-row">
          <label>高畫質放大</label>
          <div class="toggle-pair" id="hq-toggle-2">
            <button data-val="off" class="active">關閉</button>
            <button data-val="on">開啟</button>
          </div>
        </div>
        <div class="settings-row">
          <label>音樂音量</label>
          <input type="range" id="volume-range" min="0" max="100" value="70">
          <span class="val" id="volume-label">70%</span>
        </div>
        <div class="settings-btn-row">
          <button class="big-btn" id="reselect-photos"><span class="icon">🖼️</span><span>重新選相片資料夾</span></button>
          <button class="big-btn" id="reselect-music"><span class="icon">🎵</span><span>重新選音樂資料夾</span></button>
        </div>
        <button id="close-settings">關閉設定</button>
      </div>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ---------------------------------------------------------------
     Feature detection
  --------------------------------------------------------------- */
  const HAS_FS_ACCESS = 'showDirectoryPicker' in window;
  const PHOTO_EXT = ['jpg','jpeg','png','gif','webp','bmp','heic','heif'];
  const MUSIC_EXT = ['mp3','wav','m4a','aac','ogg','flac'];

  const supportNote = document.getElementById('support-note');
  supportNote.textContent = HAS_FS_ACCESS
    ? '此瀏覽器支援自動記住資料夾，下次開啟可直接繼續播放。'
    : '此瀏覽器每次開啟需要重新選擇資料夾，但會自動接續上次播放的位置。';

  /* ---------------------------------------------------------------
     Tiny IndexedDB helper (stores directory handles only)
  --------------------------------------------------------------- */
  const DB_NAME = 'slideshow-app-db';
  const STORE = 'handles';
  function idbOpen(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => { req.result.createObjectStore(STORE); };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbSet(key, value){
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(value, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
  async function idbGet(key){
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  /* ---------------------------------------------------------------
     localStorage progress (plain JSON, works for both browser paths)
  --------------------------------------------------------------- */
  const PROGRESS_KEY = 'slideshow_progress_v1';
  function saveProgress(partial){
    const cur = loadProgress() || {};
    const next = Object.assign(cur, partial);
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(next));
  }
  function loadProgress(){
    try{
      const raw = localStorage.getItem(PROGRESS_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }

  /* Settings (duration / order / volume / zoom) persist independently of
     which photo folder is loaded, so they carry over every time the app
     is reopened, per the user's request for the zoom level to stick. */
  const SETTINGS_KEY = 'slideshow_settings_v1';
  function saveSettings(){
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      duration: state.duration, orderMode: state.orderMode,
      volume: state.volume, zoom: state.zoom,
      showOriginalFirst: state.showOriginalFirst,
      highQualityZoom: state.highQualityZoom,
    }));
  }
  function loadSettings(){

    }catch(e){ return null; }
  }

  /* ---------------------------------------------------------------
     App state

  const state = {

    musicFiles: [],
    photoOrder: [],       // array of indices

    photoPos: 0,

    muted: false,
    playing: false,

    musicDirLabel: '',

  /* ---------------------------------------------------------------
     File wrapping helpers
  --------------------------------------------------------------- */
  function wrapHandleFile(name, handle){
    return { name, getFile: () => handle.getFile() };
  }
  function wrapRawFile(name, file){
    return { name, getFile: () => Promise.resolve(file) };
  }

  async function scanDirHandle(dirHandle, exts){
    const out = [];
    async function walk(handle, prefix){
      for await (const [name, entry] of handle.entries()){
        if (entry.kind === 'file'){
          const ext = name.split('.').pop().toLowerCase();
          if (exts.includes(ext)) out.push(wrapHandleFile(prefix + name, entry));
        } else if (entry.kind === 'directory'){
          await walk(entry, prefix + name + '/');
        }
      }
    }
    await walk(dirHandle, '');
    out.sort((a,b) => a.name.localeCompare(b.name, 'zh-Hant'));
    return out;
  }

  function scanFileList(fileList, exts){
    const out = [];
    for (const file of fileList){
      const relPath = file.webkitRelativePath || file.name;
      const ext = file.name.split('.').pop().toLowerCase();
      if (exts.includes(ext)) out.push(wrapRawFile(relPath, file));
    }
    out.sort((a,b) => a.name.localeCompare(b.name, 'zh-Hant'));
    return out;
  }

  function folderKeyFromFiles(files){
    return files.length + ':' + (files[0] ? files[0].name : '') + ':' + (files[files.length-1] ? files[files.length-1].name : '');
  }

  /* ---------------------------------------------------------------
     Order building
  --------------------------------------------------------------- */
  function shuffle(arr){
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function buildOrder(n, mode){
    const idx = Array.from({length:n}, (_,i)=>i);
    return mode === 'random' ? shuffle(idx) : idx;
  }

  /* Restore last-used settings (duration/order/volume/zoom) so they

  /* ---------------------------------------------------------------
     Attempt auto-resume on load (File System Access browsers only,
     since handles persist there). Fallback browsers show the note
     but still auto-match progress once the user reselects folders.
  --------------------------------------------------------------- */
  async function tryAutoDetectSavedHandles(){
    if (!HAS_FS_ACCESS) return;
    const photoHandle = await idbGet('photoDir');
    const musicHandle = await idbGet('musicDir');
    if (!photoHandle) return;

    let granted = true;
    try{
      const perm = await photoHandle.queryPermission({ mode:'read' });
      granted = perm === 'granted';
    }catch(e){ granted = false; }

    const progress = loadProgress();
    resumeText.textContent = '上次播放：「' + photoHandle.name + '」';
    resumeBanner.style.display = 'flex';

    resumeContinueBtn.addEventListener('click', async () => {
      try{
        const perm = await photoHandle.requestPermission({ mode:'read' });
        if (perm !== 'granted'){ alert('需要授權才能讀取資料夾'); return; }
        await loadPhotosFromHandle(photoHandle);
        if (musicHandle){
          await musicHandle.requestPermission({ mode:'read' });
          await loadMusicFromHandle(musicHandle);
        }
        pendingResume = progress;
        beginPlayback(true);
      }catch(err){ console.error(err); }
    }, { once:true });

    resumeRestartBtn.addEventListener('click', async () => {
      try{
        const perm = await photoHandle.requestPermission({ mode:'read' });
        if (perm === 'granted'){
          await loadPhotosFromHandle(photoHandle);
          if (musicHandle){
            await musicHandle.requestPermission({ mode:'read' });
            await loadMusicFromHandle(musicHandle);
          }
        }
      }catch(err){ console.error(err); }
      resumeBanner.style.display = 'none';
    }, { once:true });
  }
  tryAutoDetectSavedHandles();

  /* For fallback (no FS Access), check if a previous progress record
     exists so we can offer resume once folders are (re)selected. */
  function maybeApplySavedProgressForFallback(){
    if (HAS_FS_ACCESS) return;
    const progress = loadProgress();
    if (!progress) return;
    if (progress.photoDirKey && progress.photoDirKey === state.photoDirKey){
      pendingResume = progress;
    }

  startActionBtn.addEventListener('click', () => {
    maybeApplySavedProgressForFallback();
    beginPlayback(!!pendingResume && pendingResume.photoDirKey === state.photoDirKey);

  /* ---------------------------------------------------------------
     Playback engine
  --------------------------------------------------------------- */
  const stageEl = document.getElementById('stage');
  const startScreenEl = document.getElementById('start-screen');
  const layerA = document.getElementById('layer-a');
  const layerB = document.getElementById('layer-b');
  const emptyNote = document.getElementById('empty-note');
  const audioEl = document.getElementById('audio-player');
  const counterText = document.getElementById('counter-text');
  const progressFill = document.getElementById('progress-fill');
  const playBtn = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  const muteBtn = document.getElementById('mute-btn');
  const muteIcon = document.getElementById('mute-icon');

  function currentVisibleLayer(){
    return state.activeLayer === 'a' ? layerA : layerB;
  }

  function beginPlayback(useResume){
    if (state.photoFiles.length === 0) return;

    if (useResume && pendingResume){
      state.orderMode = pendingResume.orderMode || state.orderMode;
      state.duration = pendingResume.duration || state.duration;
      state.volume = (typeof pendingResume.volume === 'number') ? pendingResume.volume : state.volume;
      state.photoOrder = (pendingResume.photoOrder && pendingResume.photoOrder.length === state.photoFiles.length)
        ? pendingResume.photoOrder : buildOrder(state.photoFiles.length, state.orderMode);
      state.photoPos = Math.min(pendingResume.photoPos || 0, state.photoOrder.length - 1);
      if (state.musicFiles.length){
        state.musicOrder = (pendingResume.musicOrder && pendingResume.musicOrder.length === state.musicFiles.length)
          ? pendingResume.musicOrder : buildOrder(state.musicFiles.length, state.orderMode);
        state.musicPos = Math.min(pendingResume.musicPos || 0, state.musicOrder.length - 1);
      }
    } else {
      state.photoOrder = buildOrder(state.photoFiles.length, state.orderMode);
      state.photoPos = 0;
      if (state.musicFiles.length){
        state.musicOrder = buildOrder(state.musicFiles.length, state.orderMode);
        state.musicPos = 0;
      }
    }

    setOrderModeUI(state.orderMode);
    document.getElementById('duration-range-2').value = state.duration;
    document.getElementById('duration-label-2').textContent = state.duration + ' 秒';
    document.getElementById('volume-range').value = Math.round(state.volume * 100);
    document.getElementById('volume-label').textContent = Math.round(state.volume * 100) + '%';
    setZoomUI(state.zoom);
    audioEl.volume = state.volume;

    startScreenEl.style.display = 'none';
    stageEl.style.display = 'block';

    if (!document.fullscreenElement && document.documentElement.requestFullscreen){
      document.documentElement.requestFullscreen().catch(() => {});
    }

    state.playing = true;
    showPhoto(state.photoOrder[state.photoPos]);
    if (state.musicFiles.length){
      playMusicTrack(state.musicOrder[state.musicPos], useResume ? (pendingResume.musicTime || 0) : 0);
    }
    persistNow();
    resetControlsHideTimer();
  }

  function persistNow(extra){
    saveProgress(Object.assign({
      photoDirKey: state.photoDirKey,
      musicDirKey: state.musicDirKey,
      photoOrder: state.photoOrder,
      musicOrder: state.musicOrder,
      photoPos: state.photoPos,
      musicPos: state.musicPos,
      musicTime: audioEl.currentTime || 0,
      orderMode: state.orderMode,
      duration: state.duration,
      volume: state.volume,
    }, extra || {}));
  }
  setInterval(() => { if (state.playing) persistNow(); }, 5000);

  /* ---- Photo display + directional pan ---- */
  /* Fit the whole photo within the screen (letterboxed if needed),
     centered, with no cropping and no pan — used for the optional
     "show original first" preview. */
  function fitContain(img){
    if (state.panAnim){ state.panAnim.cancel(); state.panAnim = null; }
    const cw = window.innerWidth, ch = window.innerHeight;
    const nw = img.naturalWidth, nh = img.naturalHeight;
    if (!nw || !nh) return;
    const scale = Math.min(cw / nw, ch / nh);
    const drawW = nw * scale, drawH = nh * scale;
    img.style.width = drawW + 'px';
    img.style.height = drawH + 'px';
    img.style.left = ((cw - drawW) / 2) + 'px';
    img.style.top = ((ch - drawH) / 2) + 'px';
    img.style.transform = 'translate(0px,0px)';
  }

  /* Crossfade the given image url onto whichever layer is currently
     hidden, laying it out either as the full "original" (mode:
     'contain') or the cover+zoom pan ('zoom'). Returns how long this
     frame should stay on screen. */
  async function renderFrame(url, mode){
    const incoming = state.activeLayer === 'a' ? layerB : layerA;
    const outgoing = state.activeLayer === 'a' ? layerA : layerB;

    await new Promise((resolve) => {
      incoming.onload = resolve;
      incoming.src = url;
    });
    incoming._masterNW = incoming.naturalWidth;
    incoming._masterNH = incoming.naturalHeight;
    incoming._masterCanvas = null; // cleared so HQ redraw rebuilds from this fresh pristine bitmap

    let slotMs;
    if (mode === 'contain'){
      fitContain(incoming);
      slotMs = ORIGINAL_VIEW_MS;
    } else {
      slotMs = layoutAndPan(incoming);
    }

    incoming.classList.add('visible');
    outgoing.classList.remove('visible');
    state.activeLayer = state.activeLayer === 'a' ? 'b' : 'a';

    return slotMs;
  }

  async function showPhoto(fileIndex){
    const fileObj = state.photoFiles[fileIndex];
    if (!fileObj) return;
    let file;
    try{ file = await fileObj.getFile(); }
    catch(err){ console.error(err); return; }

    const url = URL.createObjectURL(file);
    if (state.currentObjectUrl) URL.revokeObjectURL(state.currentObjectUrl);
    state.currentObjectUrl = url;

    counterText.textContent = (state.photoPos + 1) + ' / ' + state.photoOrder.length;

    const wantsOriginalFirst = state.showOriginalFirst && (state.zoom || 1) > 1.02;

    if (wantsOriginalFirst){
      await renderFrame(url, 'contain');
      if (state.playing) scheduleTimer(ORIGINAL_VIEW_MS, () => switchToZoomed(url));
    } else {
      const slotMs = await renderFrame(url, 'zoom');
      if (state.playing) scheduleNextPhoto(slotMs);
    }
  }

  async function switchToZoomed(url){
    const slotMs = await renderFrame(url, 'zoom');
    if (state.playing) scheduleNextPhoto(slotMs);
  }

  /* Fit the photo so it covers the whole screen (whichever dimension is
     the tighter constraint is matched exactly, the other overflows),
     then apply the user's extra zoom on top, always keeping aspect
     ratio. If the result overflows only one axis, pan smoothly across
     that axis (left->right for width, bottom->top for height). If it
     overflows both axes (typically once zoom is increased), sweep in
     a "Z" / boustrophedon pattern: left->right, step up, right->left,
     step up, and so on, until the whole photo has been shown. */
  /* Keep a detached, never-mutated copy of the photo's pristine pixels
     so repeated high-quality redraws (zoom slider drags, window
     resizes) always resample from the original file, not from an
     already-processed canvas output (which would compound blur). */
  function getMasterCanvas(img){
    if (img._masterCanvas) return img._masterCanvas;
    const c = document.createElement('canvas');
    c.width = img._masterNW || img.naturalWidth;
    c.height = img._masterNH || img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    img._masterCanvas = c;
    return c;
  }

  /* Re-render the photo through a canvas with high-quality smoothing at
     the exact on-screen pixel size (accounting for device pixel ratio),
     instead of letting the browser stretch the original bitmap via CSS.
     This can look noticeably sharper once zoomed in, though it can only
     resample existing detail — it can't invent resolution the source
     photo doesn't have. */
  function applyHighQualityRender(img, targetW, targetH){
    try{
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const outW = Math.min(Math.round(targetW * dpr), 2400);
      const outH = Math.min(Math.round(targetH * dpr), 2400);
      if (outW < 4 || outH < 4) return;
      const master = getMasterCanvas(img);
      const canvas = document.createElement('canvas');
      canvas.width = outW; canvas.height = outH;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(master, 0, 0, outW, outH);
      img.src = canvas.toDataURL('image/png');
    } catch(e){ /* canvas unavailable or failed; keep the normal rendering */ }
  }

  function layoutAndPan(img){
    if (state.panAnim){ state.panAnim.cancel(); state.panAnim = null; }
    const cw = window.innerWidth, ch = window.innerHeight;
    const nw = img._masterNW || img.naturalWidth, nh = img._masterNH || img.naturalHeight;
    const configuredMs = state.duration * 1000;
    if (!nw || !nh) return configuredMs;

    const coverScale = Math.max(cw / nw, ch / nh);
    const scale = coverScale * (state.zoom || 1);
    const drawW = nw * scale, drawH = nh * scale;
    img.style.width = drawW + 'px';
    img.style.height = drawH + 'px';
    img.style.left = '0px';
    img.style.top = '0px';

    if (state.highQualityZoom) applyHighQualityRender(img, drawW, drawH);

    const overflowX = Math.max(0, drawW - cw);
    const overflowY = Math.max(0, drawH - ch);

    if (overflowX <= 4 && overflowY <= 4){
      img.style.transform = 'translate(0px,0px)';
      return configuredMs;
    }

    const rows = overflowY > 4 ? Math.max(2, Math.ceil(drawH / ch)) : 1;

    // Build the raster path: viewX (0..overflowX) sweeps left/right per
    // row, viewY (overflowY..0) steps from bottom row to top row.
    const waypoints = [];
    for (let i = 0; i < rows; i++){
      const y = rows > 1 ? overflowY * (1 - i / (rows - 1)) : 0;
      const xStart = i % 2 === 0 ? 0 : overflowX;
      const xEnd   = i % 2 === 0 ? overflowX : 0;
      if (i === 0) waypoints.push({ x:xStart, y });
      waypoints.push({ x:xEnd, y });
      if (i < rows - 1){
        const yNext = overflowY * (1 - (i+1) / (rows - 1));
        waypoints.push({ x:xEnd, y:yNext });
      }
    }
    // drop zero-length duplicate points (e.g. a row with no horizontal overflow)
    const pts = [waypoints[0]];
    for (let i = 1; i < waypoints.length; i++){
      const prev = pts[pts.length - 1];
      if (Math.abs(waypoints[i].x - prev.x) > 0.5 || Math.abs(waypoints[i].y - prev.y) > 0.5) pts.push(waypoints[i]);
    }

    if (pts.length < 2){
      img.style.transform = 'translate(' + (-pts[0].x) + 'px,' + (-pts[0].y) + 'px)';
      return configuredMs;
    }

    const dist = [0];
    for (let i = 1; i < pts.length; i++){
      dist.push(dist[i-1] + Math.abs(pts[i].x - pts[i-1].x) + Math.abs(pts[i].y - pts[i-1].y));
    }
    const total = dist[dist.length - 1] || 1;
    const keyframes = pts.map((p, i) => ({
      transform: 'translate(' + (-p.x) + 'px,' + (-p.y) + 'px)',
      offset: dist[i] / total,
    }));
    keyframes[0].offset = 0;
    keyframes[keyframes.length - 1].offset = 1;

    // Keep the pan speed roughly constant no matter how much the zoom
    // level increases the distance to travel: the "每張秒數" setting
    // defines the pace (screen-widths per second), not a hard deadline.
    // A photo that needs more distance to fully reveal gets more time
    // instead of panning faster.
    const baseAnimMs = Math.max(configuredMs - 900, 400);
    const pacePxPerSec = (8 * Math.min(cw, ch)) / (state.duration || 8);
    const neededMs = (total / pacePxPerSec) * 1000;
    const animMs = Math.max(baseAnimMs, neededMs);

    state.panAnim = img.animate(keyframes, { duration: animMs, easing: 'linear', fill: 'forwards' });
    return animMs + 900;
  }

  window.addEventListener('resize', () => {
    const activeImg = currentVisibleLayer();
    if (activeImg.src) layoutAndPan(activeImg);
  });

  /* Generic pending-action timer: whatever should happen next (switch
     to the zoomed view, or advance to the next photo) is stored as
     state.pendingAction so pause/resume can re-run the same step
     rather than always assuming "advance to next photo". */
  function scheduleTimer(ms, action){
    clearTimeout(state.timerHandle);
    state.timerStartedAt = Date.now();
    state.timerRemainingMs = ms;
    state.pendingAction = action;
    animateProgressBar(ms);
    state.timerHandle = setTimeout(action, ms);
  }
  function scheduleNextPhoto(ms){
    scheduleTimer(ms, () => advancePhoto(1));
  }

  let progressRAF = null;
  function animateProgressBar(totalMs){
    cancelAnimationFrame(progressRAF);
    const start = performance.now();
    function step(now){
      if (!state.playing) return;
      const elapsed = now - start;
      const pct = Math.min(100, (elapsed/totalMs)*100);
      progressFill.style.width = pct + '%';
      if (pct < 100) progressRAF = requestAnimationFrame(step);
    }
    progressRAF = requestAnimationFrame(step);
  }

  function advancePhoto(dir){
    if (state.photoOrder.length === 0) return;
    clearTimeout(state.timerHandle);
    state.photoPos = (state.photoPos + dir + state.photoOrder.length) % state.photoOrder.length;
    showPhoto(state.photoOrder[state.photoPos]);
    persistNow();
  }

  /* ---- Music ---- */
  async function playMusicTrack(fileIndex, startAt){
    const fileObj = state.musicFiles[fileIndex];
    if (!fileObj) return;
    const file = await fileObj.getFile();
    const url = URL.createObjectURL(file);
    audioEl.src = url;
    audioEl.volume = state.muted ? 0 : state.volume;
    audioEl.currentTime = startAt || 0;
    if (state.playing){
      audioEl.play().catch(()=>{ /* needs a user gesture on some browsers */ });
    }
  }
  audioEl.addEventListener('ended', () => {
    if (state.musicOrder.length === 0) return;
    state.musicPos = (state.musicPos + 1) % state.musicOrder.length;
    playMusicTrack(state.musicOrder[state.musicPos], 0);
    persistNow();
  });

  /* ---- Transport controls ---- */
  function setPlaying(playing){
    state.playing = playing;
    playIcon.textContent = playing ? '⏸' : '▶';
    playBtn.querySelector('.lb').textContent = playing ? '暫停' : '播放';
    if (playing){
      const remaining = Math.max(state.timerRemainingMs - (Date.now() - state.timerStartedAt), 200);
      if (state.pendingAction) scheduleTimer(remaining, state.pendingAction);
      if (state.panAnim) state.panAnim.play();
      if (audioEl.src) audioEl.play().catch(()=>{});
    } else {
      clearTimeout(state.timerHandle);
      state.timerRemainingMs = Math.max(state.timerRemainingMs - (Date.now() - state.timerStartedAt), 0);
      cancelAnimationFrame(progressRAF);
      if (state.panAnim) state.panAnim.pause();
      audioEl.pause();
    }
    persistNow();
  }

  playBtn.addEventListener('click', () => setPlaying(!state.playing));
  document.getElementById('prev-btn').addEventListener('click', () => advancePhoto(-1));
  document.getElementById('next-btn').addEventListener('click', () => advancePhoto(1));

  document.getElementById('order-btn').addEventListener('click', () => {
    const newMode = state.orderMode === 'random' ? 'sequential' : 'random';
    applyOrderMode(newMode);
  });
  function applyOrderMode(mode){
    state.orderMode = mode;
    setOrderModeUI(mode);
    // rebuild order arrays but keep the currently shown item first
    const curPhoto = state.photoOrder[state.photoPos];
    state.photoOrder = buildOrder(state.photoFiles.length, mode);
    state.photoPos = Math.max(0, state.photoOrder.indexOf(curPhoto));
    if (state.musicFiles.length){
      const curMusic = state.musicOrder[state.musicPos];
      state.musicOrder = buildOrder(state.musicFiles.length, mode);
      state.musicPos = Math.max(0, state.musicOrder.indexOf(curMusic));
    }
    persistNow();
  }

  muteBtn.addEventListener('click', () => {
    state.muted = !state.muted;
    audioEl.volume = state.muted ? 0 : state.volume;
    muteIcon.textContent = state.muted ? '🔇' : '🔊';
    muteBtn.classList.toggle('on', state.muted);
  });

  document.getElementById('fullscreen-btn').addEventListener('click', () => {
    if (!document.fullscreenElement){
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen().catch(()=>{});
    }
  });

  /* ---- Settings panel ---- */
  const settingsPanel = document.getElementById('settings-panel');
  document.getElementById('gear-btn').addEventListener('click', () => {
    settingsPanel.style.display = 'flex';
    setPlaying(false);
  });
  document.getElementById('close-settings').addEventListener('click', () => {
    settingsPanel.style.display = 'none';
    setPlaying(true);
  });
  document.getElementById('duration-range-2').addEventListener('input', (e) => {
    state.duration = parseInt(e.target.value, 10);
    document.getElementById('duration-label-2').textContent = state.duration + ' 秒';
    durationRange.value = state.duration;
    durationLabel.textContent = state.duration + ' 秒';
    saveSettings();
  });
  document.getElementById('order-toggle-2').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    applyOrderMode(btn.dataset.mode);
    saveSettings();
  });
  document.getElementById('volume-range').addEventListener('input', (e) => {
    state.volume = parseInt(e.target.value, 10) / 100;
    document.getElementById('volume-label').textContent = Math.round(state.volume*100) + '%';
    if (!state.muted) audioEl.volume = state.volume;
    saveSettings();
  });
  document.getElementById('zoom-range-2').addEventListener('input', (e) => {
    setZoomUI(parseInt(e.target.value, 10) / 100);
    saveSettings();
    layoutAndPan(currentVisibleLayer());
  });
  document.getElementById('reselect-photos').addEventListener('click', async () => {
    await choosePhotoFolder();
    state.photoOrder = buildOrder(state.photoFiles.length, state.orderMode);
    state.photoPos = 0;
    showPhoto(state.photoOrder[0]);
    persistNow();
  });
  document.getElementById('reselect-music').addEventListener('click', async () => {
    await chooseMusicFolder();
    state.musicOrder = buildOrder(state.musicFiles.length, state.orderMode);
    state.musicPos = 0;
    playMusicTrack(state.musicOrder[0], 0);
    persistNow();
  });

  /* ---- Auto-hide controls ---- */
  const controlsOverlay = document.getElementById('controls-overlay');
  let hideTimer = null;
  function resetControlsHideTimer(){
    controlsOverlay.classList.remove('hidden');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      if (settingsPanel.style.display !== 'flex') controlsOverlay.classList.add('hidden');
    }, 4000);
  }
  ['mousemove','touchstart','click'].forEach(evt => {
    stageEl.addEventListener(evt, resetControlsHideTimer);
  });

  /* ---- Keyboard shortcuts (desktop) ---- */
  document.addEventListener('keydown', (e) => {
    if (stageEl.style.display !== 'block') return;
    if (e.code === 'Space'){ e.preventDefault(); setPlaying(!state.playing); }
    else if (e.code === 'ArrowRight'){ advancePhoto(1); }
    else if (e.code === 'ArrowLeft'){ advancePhoto(-1); }
    else if (e.key === 'f' || e.key === 'F'){ document.getElementById('fullscreen-btn').click(); }
    else if (e.key === 'm' || e.key === 'M'){ muteBtn.click(); }
  });

  /* ---- Save progress before leaving ---- */
  window.addEventListener('beforeunload', () => persistNow());

})();
</script>
</body>
</html>
