<style>
  :root{
    --bg:#121315;
    --bg-raised:#1b1c1f;
    --bg-tab:#201f22;
    --line:#3a3632;
    --red:#942525;
    --gold:#bd8b2a;
    --ink:#fcfbfa;
    --ink-dim:#c9c5bd;
    --font-ui:'Noto Serif TC', serif;
    --content-family:'Noto Serif TC', 'Cormorant Garamond', 'Inter', serif;
    --content-size:20px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--font-ui);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
    -webkit-user-select:auto; user-select:auto;
  }
  header{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; border-bottom:1px solid var(--line); background:var(--bg-raised);
  }
  header h1{font-size:19px; margin:0; font-weight:600; letter-spacing:.04em; color:var(--gold);}
  header .icon-btn{color:var(--ink-dim);}
  .header-actions{display:flex; align-items:center; gap:8px;}
  .icon-btn.save-btn{
    width:52px; height:52px; border-radius:50%;
    background:var(--gold); color:var(--bg); border:1px solid var(--gold);
  }
  .icon-btn.save-btn svg{width:26px; height:26px;}
  .icon-btn.save-btn:active{background:#a97c25;}

  .icon-btn{
    background:none; border:1px solid transparent; color:var(--ink);
    width:42px; height:42px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex:0 0 auto;
  }
  .icon-btn svg{width:22px; height:22px;}
  .icon-btn:active{background:rgba(189,139,42,.18); border-color:var(--gold);}
  .icon-btn.on{background:rgba(189,139,42,.25); border-color:var(--gold); color:var(--gold);}
  .icon-btn:disabled{opacity:.35; cursor:default;}

  .toolbar{
    flex:0 0 auto; display:flex; gap:2px; padding:6px 8px; overflow-x:auto;
    background:var(--bg-raised); border-bottom:1px solid var(--line);
    scrollbar-width:none;
  }
  .toolbar::-webkit-scrollbar{display:none;}
  .toolbar .sep{width:1px; background:var(--line); margin:6px 6px; flex:0 0 auto;}

  .tabbar{
    flex:0 0 auto; display:flex; align-items:stretch; gap:6px; padding:8px 8px 0 8px;
    overflow-x:auto; background:var(--bg); scrollbar-width:none;
  }
  .tabbar::-webkit-scrollbar{display:none;}
  .tab{
    position:relative; flex:0 0 auto; max-width:38vw; min-width:84px;
    background:var(--bg-tab); border:1px solid var(--line); border-bottom:none;
    border-radius:10px 10px 0 0; padding:9px 30px 9px 12px;
    display:flex; align-items:center; cursor:pointer;
  }
  .tab.active{background:var(--bg-raised); border-color:var(--gold);}
  .tab .name{
    font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:100%; color:var(--ink-dim);
  }
  .tab.active .name{color:var(--ink);}
  .tab .name[contenteditable="true"]{outline:none; text-overflow:clip; background:rgba(255,255,255,.06); border-radius:4px; padding:0 2px;}
  .tab .close{
    position:absolute; right:2px; top:50%; transform:translateY(-50%);
    width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    color:var(--ink-dim); font-size:13px; flex:0 0 auto;
  }
  .tab .close:active{background:rgba(148,37,37,.35); color:var(--ink);}
  .tab .dirty-dot{
    position:absolute; left:5px; top:6px; width:6px; height:6px; border-radius:50%; background:var(--red);
    display:none;
  }
  .tab.dirty .dirty-dot{display:block;}
  .newtab{
    flex:0 0 auto; width:38px; height:38px; align-self:center; border-radius:10px;
    background:none; border:1px dashed var(--line); color:var(--gold); font-size:20px; cursor:pointer;
  }

  .editor-area{
    flex:1 1 auto; overflow:hidden; position:relative; background:var(--bg-raised);
  }
  .page{
    display:none; height:100%; overflow-y:auto; padding:18px 16px 40vh 10px;
    font-family:var(--content-family); font-size:var(--content-size); line-height:1.75;
  }
  .page.active{display:block;}
  .page.wrap-off{white-space:pre; overflow-x:auto;}
  .page .txt{outline:none;}
  .page textarea{
    width:100%; height:100%; resize:none; border:none; outline:none; background:transparent;
    color:var(--ink); font-family:var(--content-family); font-size:var(--content-size); line-height:1.75;
    white-space:pre-wrap; word-break:break-word;
  }
  .page.wrap-off textarea{white-space:pre; word-break:normal;}

  .line{
    display:flex; align-items:baseline; min-height:1.75em; word-break:break-word; overflow-wrap:anywhere;
    border-radius:4px;
  }
  .line .badge{
    flex:0 0 auto; color:var(--gold); font-variant-numeric:tabular-nums; margin-right:.4em;
    font-family:'Inter',sans-serif; -webkit-user-select:none; user-select:none;
  }
  .line .txt{flex:1 1 auto; white-space:pre-wrap;}
  .line.lvl-0{padding-left:0}
  .line.lvl-1{padding-left:1.6em}
  .line.lvl-2{padding-left:3.2em}
  .line.lvl-3{padding-left:4.8em}
  .line.lvl-4{padding-left:6.4em}
  .line.lvl-5{padding-left:8.0em}
  .line.lvl-6{padding-left:9.6em}

  .run-fab{
    position:absolute; right:16px; bottom:16px; background:var(--gold); color:var(--bg);
    border:none; width:52px; height:52px; border-radius:50%; box-shadow:0 4px 14px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }

  .panel-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:flex-end; z-index:50;
  }
  .panel-overlay.show{display:flex;}
  .panel{
    background:var(--bg-raised); width:100%; max-height:82vh; overflow-y:auto;
    border-top:1px solid var(--gold); border-radius:16px 16px 0 0; padding:18px 18px 26px;
  }
  .panel h2{margin:0 0 14px; font-size:17px; color:var(--gold); display:flex; justify-content:space-between; align-items:center;}
  .panel h2 button{background:none; border:none; color:var(--ink-dim); font-size:20px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:14px; color:var(--ink-dim); margin-bottom:6px;}
  .field input[type="text"], .field select{
    width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); color:var(--ink); font-size:16px; font-family:var(--font-ui);
  }
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .row.between{justify-content:space-between;}
  .chk{display:flex; align-items:center; gap:8px; font-size:14px; color:var(--ink-dim);}
  .chk input{width:20px; height:20px;}
  .btn{
    padding:11px 16px; border-radius:9px; border:1px solid var(--gold); background:none;
    color:var(--gold); font-size:15px; font-family:var(--font-ui); cursor:pointer; flex:1 1 auto;
  }
  .btn.solid{background:var(--gold); color:var(--bg); font-weight:600;}
  .btn.danger{border-color:var(--red); color:var(--red);}
  .stepper{display:flex; align-items:center; gap:10px;}
  .stepper button{
    width:40px; height:40px; border-radius:8px; border:1px solid var(--line); background:var(--bg);
    color:var(--ink); font-size:18px;
  }
  .stepper span{min-width:2ch; text-align:center; font-size:16px;}
  .swatch-row{display:flex; gap:8px;}
  .swatch{width:34px; height:34px; border-radius:8px; border:2px solid transparent; cursor:pointer;}
  .swatch.sel{border-color:var(--ink);}

  .toast{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%);
    background:var(--bg-tab); border:1px solid var(--gold); color:var(--ink);
    padding:9px 18px; border-radius:20px; font-size:14px; z-index:80; opacity:0; pointer-events:none;
    transition:opacity .25s;
  }
  .toast.show{opacity:1;}

  ::selection{background:rgba(189,139,42,.4);}
</style>
</head>
<body>

<header>
  <h1>文字筆記本</h1>
  <div class="header-actions">
    <button class="icon-btn" id="btnOpenHeader" title="開啟本機檔案" aria-label="開啟本機檔案">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>
    </button>
    <button class="icon-btn save-btn" id="btnSaveHeader" title="快速儲存" aria-label="快速儲存">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13H5z"/><path d="M8 4v6h8V4M8 21v-7h8v7"/></svg>
    </button>
    <button class="icon-btn" id="btnSettings" title="設定" aria-label="設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.5a7.6 7.6 0 0 0 0-3l2-1.5-2-3.4-2.3.8a7.6 7.6 0 0 0-2.6-1.5L14 2h-4l-.5 2.4a7.6 7.6 0 0 0-2.6 1.5l-2.3-.8-2 3.4 2 1.5a7.6 7.6 0 0 0 0 3l-2 1.5 2 3.4 2.3-.8a7.6 7.6 0 0 0 2.6 1.5L10 22h4l.5-2.4a7.6 7.6 0 0 0 2.6-1.5l2.3.8 2-3.4-2-1.5Z"/></svg>
    </button>
  </div>
</header>

<div class="toolbar" id="toolbar">
  <button class="icon-btn" data-cmd="undo" title="復原"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h9a5 5 0 0 1 0 10h-2"/><path d="M8 5 3 10l5 5"/></svg></button>
  <button class="icon-btn" data-cmd="redo" title="重做"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10h-9a5 5 0 0 0 0 10h2"/><path d="M16 5l5 5-5 5"/></svg></button>
  <button class="icon-btn" data-cmd="paste" title="貼上"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M9 11h6M9 15h6"/></svg></button>
  <button class="icon-btn" data-cmd="numlist" title="編號清單"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11"/><text x="1" y="8" font-size="6" fill="currentColor" stroke="none">1</text><text x="1" y="14" font-size="6" fill="currentColor" stroke="none">2</text><text x="1" y="20" font-size="6" fill="currentColor" stroke="none">3</text></svg></button>
  <button class="icon-btn" data-cmd="indent" title="增加縮排"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18M9 12h12M3 19h18"/><path d="M3 9l4 3-4 3"/></svg></button>
  <button class="icon-btn" data-cmd="outdent" title="減少縮排"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18M9 12h12M3 19h18"/><path d="M7 9 3 12l4 3"/></svg></button>
  <div class="sep"></div>
  <button class="icon-btn" data-cmd="find" title="尋找與取代"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
  <div class="sep"></div>
  <button class="icon-btn" data-cmd="saveas" title="另存新檔"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13H5z"/><path d="M8 4v6h8V4"/><path d="M12 14v5M9.5 16.5 12 19l2.5-2.5"/></svg></button>
  <div class="sep"></div>
  <button class="icon-btn" data-cmd="closetab" title="關閉分頁"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
</div>

<div class="tabbar" id="tabbar">
  <button class="newtab" id="btnNewTab" title="新增分頁">＋</button>
</div>

<div class="editor-area" id="editorArea">
  <button class="run-fab" id="btnRun" style="display:none" title="在瀏覽器中執行">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
  </button>
</div>

<!-- 設定面板 -->
<div class="panel-overlay" id="settingsOverlay">
  <div class="panel">
    <h2>設定 <button id="closeSettings">✕</button></h2>
    <div class="field">
      <label>字型</label>
      <select id="fontFamily">
        <option value="'Noto Serif TC','Cormorant Garamond','Inter',serif">思源宋體（預設）</option>
        <option value="'Inter','Noto Serif TC',sans-serif">Inter（無襯線）</option>
        <option value="'Cormorant Garamond','Noto Serif TC',serif">Cormorant Garamond</option>
        <option value="ui-monospace,'Courier New',monospace">等寬字體</option>
      </select>
    </div>
    <div class="field">
      <label>字級</label>
      <div class="stepper">
        <button id="fontDec">A-</button>
        <span id="fontSizeLabel">20</span>
        <button id="fontInc">A+</button>
      </div>
    </div>
    <div class="field row between">

        Android／Chrome：瀏覽器選單的「安裝應用程式」只有在網頁是透過 <b>https://</b>（或 http://localhost）開啟時才會出現；直接雙擊本機檔案（file://）開啟不會出現安裝選項，需先將本 HTML 與同資料夾的 sw.js 一起上傳到網站或本機伺服器。

<input type="file" id="fileInput" accept=".txt,.md,.markdown,.html,.htm" style="display:none">
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

/* ---------- 共用工具 ---------- */
const $ = (s,el)=> (el||document).querySelector(s);
const $$ = (s,el)=> Array.from((el||document).querySelectorAll(s));
let uidSeq = 1;
function uid(){ return 't' + (uidSeq++) + '_' + Date.now().toString(36); }
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._h); toast._h = setTimeout(()=>t.classList.remove('show'), 1800);
}
const STORAGE_KEY = 'wznotebook_state_v1';
const MAX_INDENT = 6;

/* ---------- 全域設定 ---------- */
let settings = {fontFamily:"'Noto Serif TC','Cormorant Garamond','Inter',serif", fontSize:20, wrap:true};
function loadSettings(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY+'_settings');
    if(raw) settings = Object.assign(settings, JSON.parse(raw));
  }catch(e){}
}
function saveSettings(){
  try{ localStorage.setItem(STORAGE_KEY+'_settings', JSON.stringify(settings)); }catch(e){}
}
function applySettings(){
  document.documentElement.style.setProperty('--content-family', settings.fontFamily);
  document.documentElement.style.setProperty('--content-size', settings.fontSize+'px');
  $('#fontFamily').value = settings.fontFamily;
  $('#fontSizeLabel').textContent = settings.fontSize;
  $('#wrapToggle').checked = settings.wrap;
  $$('.page').forEach(p=> p.classList.toggle('wrap-off', !settings.wrap));
}

/* ---------- 分頁模型 ----------
   tab: {id,name,ext,type:'rich'|'raw', dirty, fileHandle, pageEl, scrollTop, caretInfo, history:[], typing:false}
*/
let tabs = [];
let activeId = null;

function createLineEl(indent, numbered, text){
  const div = document.createElement('div');
  div.className = 'line lvl-'+indent;
  div.dataset.indent = String(indent);
  div.dataset.num = numbered ? '1':'0';
  if(numbered){
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = '';
    div.appendChild(badge);
  }
  const txt = document.createElement('span');
  txt.className='txt';
  txt.contentEditable = 'true';
  txt.textContent = text || '';
  div.appendChild(txt);
  return div;
}

function linesOf(pageEl){ return Array.from(pageEl.children).filter(el=>el.classList.contains('line')); }

function renumberAll(pageEl){
  const counters = new Array(MAX_INDENT+2).fill(0);
  linesOf(pageEl).forEach(line=>{
    const indent = parseInt(line.dataset.indent,10)||0;
    const numbered = line.dataset.num === '1';
    line.className = 'line lvl-'+indent;
    let badge = line.querySelector(':scope > .badge');
    if(numbered){
      counters[indent]++;
      for(let k=indent+1;k<counters.length;k++) counters[k]=0;
      if(!badge){
        badge = document.createElement('span');
        badge.className='badge';
        line.insertBefore(badge, line.firstChild);
      }
      badge.textContent = counters[indent] + '.';
    } else {
      counters[indent] = 0;
      for(let k=indent+1;k<counters.length;k++) counters[k]=0;
      if(badge) badge.remove();
    }
  });
}

function getActiveTab(){ return tabs.find(t=>t.id===activeId); }

/* ---------- 游標 / 選取工具 ---------- */
function lineIndexOf(pageEl, lineEl){ return linesOf(pageEl).indexOf(lineEl); }
function closestLine(node, pageEl){
  let n = node;
  while(n && n!==pageEl){
    if(n.nodeType===1 && n.classList && n.classList.contains('line')) return n;
    n = n.parentNode;
  }
  return null;
}
function getTxtSpan(lineEl){ return lineEl.querySelector(':scope > .txt'); }

function placeCaretAt(txtSpan, offset){
  txtSpan.focus();
  const sel = window.getSelection();
  const range = document.createRange();
  let node = txtSpan.firstChild;
  if(!node){ node = document.createTextNode(''); txtSpan.appendChild(node); }
  const len = node.textContent.length;
  const off = Math.max(0, Math.min(offset, len));
  range.setStart(node, off);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
}

function getCaretPos(pageEl){
  const sel = window.getSelection();
  if(!sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  const lineEl = closestLine(range.startContainer, pageEl);
  if(!lineEl) return null;
  return {lineIndex: lineIndexOf(pageEl,lineEl), offset: range.startOffset, lineEl};
}

/* ---------- 歷史紀錄（復原） ---------- */
function snapshot(tab){
  tab.history.push(tab.pageEl.innerHTML);
  if(tab.history.length>60) tab.history.shift();
  tab.redo.length = 0;
}
function undo(tab){
  if(!tab.history.length){ toast('沒有可復原的動作'); return; }
  tab.redo.push(tab.pageEl.innerHTML);
  const html = tab.history.pop();
  tab.pageEl.innerHTML = html;
  renumberAll(tab.pageEl);
  markDirty(tab);
  refocusEnd(tab);
}
function redo(tab){
  if(!tab.redo.length){ toast('沒有可重做的動作'); return; }
  tab.history.push(tab.pageEl.innerHTML);
  const html = tab.redo.pop();
  tab.pageEl.innerHTML = html;
  renumberAll(tab.pageEl);
  markDirty(tab);
  refocusEnd(tab);
}
function refocusEnd(tab){
  if(tab.type!=='rich') return;
  const lines = linesOf(tab.pageEl);
  const last = lines[lines.length-1];
  if(last){ placeCaretAt(getTxtSpan(last), getTxtSpan(last).textContent.length); }
}

/* ---------- 結構操作：Enter / Backspace / 縮排 ---------- */
function splitLine(pageEl, lineEl, offset){
  const txt = getTxtSpan(lineEl);
  const full = txt.textContent;
  const before = full.slice(0, offset);
  const after = full.slice(offset);
  txt.textContent = before;
  const indent = parseInt(lineEl.dataset.indent,10)||0;
  const numbered = lineEl.dataset.num==='1';
  const newLine = createLineEl(indent, numbered, after);
  lineEl.after(newLine);
  renumberAll(pageEl);
  placeCaretAt(getTxtSpan(newLine), 0);
}
function mergeUp(pageEl, lineEl){
  const idx = lineIndexOf(pageEl, lineEl);
  if(idx<=0) return;
  const prev = linesOf(pageEl)[idx-1];
  const prevTxt = getTxtSpan(prev);
  const curTxt = getTxtSpan(lineEl);
  const mergePoint = prevTxt.textContent.length;
  prevTxt.textContent = prevTxt.textContent + curTxt.textContent;
  lineEl.remove();
  renumberAll(pageEl);
  placeCaretAt(prevTxt, mergePoint);
}
function getEffectiveLines(tab){
  const pageEl = tab.pageEl;
  const sel = window.getSelection();
  let lines = [];
  if(sel.rangeCount){
    const range = sel.getRangeAt(0);
    if(pageEl.contains(range.startContainer) && pageEl.contains(range.endContainer)){
      const l1 = closestLine(range.startContainer, pageEl);
      const l2 = closestLine(range.endContainer, pageEl);
      if(l1 && l2){
        const all = linesOf(pageEl);
        const i1 = all.indexOf(l1), i2 = all.indexOf(l2);
        lines = all.slice(Math.min(i1,i2), Math.max(i1,i2)+1);
      }
    }
  }
  if(!lines.length && tab.savedCaret){
    const all = linesOf(pageEl);
    const idx = Math.min(Math.max(tab.savedCaret.lineIndex,0), all.length-1);
    if(idx>=0) lines = [all[idx]];
  }
  if(!lines.length && linesOf(pageEl).length){
    lines = [linesOf(pageEl)[linesOf(pageEl).length-1]];
  }
  return lines;
}
function restoreCaretToLine(tab, lineEl){
  const txt = getTxtSpan(lineEl);
  const offset = tab.savedCaret ? tab.savedCaret.offset : txt.textContent.length;
  placeCaretAt(txt, offset);
}
function indentSelected(tab, delta){
  const pageEl = tab.pageEl;
  const lines = getEffectiveLines(tab);
  lines.forEach(line=>{
    let ind = parseInt(line.dataset.indent,10)||0;
    ind = Math.max(0, Math.min(MAX_INDENT, ind+delta));
    line.dataset.indent = String(ind);
  });
  renumberAll(pageEl);
  if(lines.length) restoreCaretToLine(tab, lines[lines.length-1]);
}
function toggleNumbered(tab){
  const pageEl = tab.pageEl;
  const lines = getEffectiveLines(tab);
  const allOn = lines.every(l=>l.dataset.num==='1');
  lines.forEach(l=> l.dataset.num = allOn? '0':'1');
  renumberAll(pageEl);
  if(lines.length) restoreCaretToLine(tab, lines[lines.length-1]);
}

/* ---------- 分頁事件綁定（rich 類型） ---------- */
function bindRichPage(tab){
  const pageEl = tab.pageEl;
  let typingTimer = null;
  function beginTypingBurstIfNeeded(){
    if(!tab._inBurst){
      snapshot(tab);
      tab._inBurst = true;
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(()=>{ tab._inBurst=false; }, 800);
  }

  pageEl.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){
      e.preventDefault();
      snapshot(tab); tab._inBurst=false;
      const pos = getCaretPos(pageEl);
      if(pos) splitLine(pageEl, pos.lineEl, pos.offset);
      markDirty(tab);
      return;
    }
    if(e.key==='Tab'){
      e.preventDefault();
      snapshot(tab); tab._inBurst=false;
      indentSelected(tab, e.shiftKey? -1: 1);
      markDirty(tab);
      return;
    }
    if(e.key==='Backspace'){
      const pos = getCaretPos(pageEl);
      if(pos && pos.offset===0){
        const idx = lineIndexOf(pageEl,pos.lineEl);
        if(idx>0){
          e.preventDefault();
          snapshot(tab); tab._inBurst=false;
          mergeUp(pageEl, pos.lineEl);
          markDirty(tab);
          return;
        } else { e.preventDefault(); return; }
      }
      beginTypingBurstIfNeeded();
      return;
    }
    if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z'){
      e.preventDefault(); undo(tab); return;
    }
    if(!e.ctrlKey && !e.metaKey && e.key.length===1){
      beginTypingBurstIfNeeded();
    }
  });

  pageEl.addEventListener('paste', (e)=>{
    e.preventDefault();
    snapshot(tab); tab._inBurst=false;
    const text = (e.clipboardData||window.clipboardData).getData('text/plain');
    insertMultilineAtCaret(pageEl, text);
    markDirty(tab);
  });

  pageEl.addEventListener('beforeinput', (e)=>{
    if(e.inputType && e.inputType!=='insertText' && e.inputType!=='insertCompositionText'){
      snapshot(tab); tab._inBurst=false;
    }
  });
  pageEl.addEventListener('input', ()=>{ renumberAll(pageEl); markDirty(tab); });

  function trackCaret(){
    const pos = getCaretPos(pageEl);
    if(pos) tab.savedCaret = {lineIndex: pos.lineIndex, offset: pos.offset};
  }
  pageEl.addEventListener('keyup', trackCaret);
  pageEl.addEventListener('mouseup', trackCaret);
  pageEl.addEventListener('focusin', trackCaret);

  // 點擊行與行之間的空白處(不是任何一行本身)時，聚焦最後一行的末端
  pageEl.addEventListener('mousedown', (e)=>{
    if(e.target===pageEl){
      const lines = linesOf(pageEl);
      const last = lines[lines.length-1];
      if(last){ e.preventDefault(); placeCaretAt(getTxtSpan(last), getTxtSpan(last).textContent.length); }
    }
  });
  // 點擊編號徽章本身(不可編輯)時，把游標移到該行文字最前面
  pageEl.addEventListener('click', (e)=>{
    const badge = e.target.closest && e.target.closest('.badge');
    if(!badge) return;
    const lineEl = closestLine(badge, pageEl);
    if(lineEl) placeCaretAt(getTxtSpan(lineEl), 0);
  });
}

function insertMultilineAtCaret(pageEl, text){
  const pos = getCaretPos(pageEl);
  const parts = text.replace(/\r\n/g,'\n').split('\n');
  if(!pos){
    const indent = 0;
    parts.forEach(p=> pageEl.appendChild(createLineEl(indent,false,p)));
    renumberAll(pageEl);
    return;
  }
  const lineEl = pos.lineEl;
  const indent = parseInt(lineEl.dataset.indent,10)||0;
  const txt = getTxtSpan(lineEl);
  const full = txt.textContent;
  const before = full.slice(0,pos.offset);
  const after = full.slice(pos.offset);
  if(parts.length===1){
    txt.textContent = before + parts[0] + after;
    placeCaretAt(txt, (before+parts[0]).length);
  } else {
    txt.textContent = before + parts[0];
    let lastEl = lineEl;
    for(let i=1;i<parts.length;i++){
      const isLast = i===parts.length-1;
      const newLine = createLineEl(indent, false, isLast? (parts[i]+after) : parts[i]);
      lastEl.after(newLine);
      lastEl = newLine;
      if(isLast) placeCaretAt(getTxtSpan(newLine), parts[i].length);
    }
  }
  renumberAll(pageEl);
}

/* ---------- raw 類型（開啟既有 txt/md/html 原始碼編輯） ---------- */
function bindRawPage(tab){
  const ta = tab.textarea;
  ta.addEventListener('input', ()=> markDirty(tab));
  ta.addEventListener('keydown', (e)=>{
    if(e.key==='Tab'){
      e.preventDefault();
      const s = ta.selectionStart, en = ta.selectionEnd;
      ta.value = ta.value.slice(0,s) + '\t' + ta.value.slice(en);
      ta.selectionStart = ta.selectionEnd = s+1;
      markDirty(tab);
    }
  });
}

/* ---------- 建立/切換/關閉分頁 ---------- */
function newTab(opts){
  opts = opts||{};
  const tab = {
    id: uid(),
    name: opts.name || '未命名筆記',
    ext: opts.ext || null,
    type: opts.type || 'rich',
    dirty: false,
    fileHandle: opts.fileHandle || null,
    history: [],
    redo: [],
    savedCaret: null,
    _inBurst: false,
    scrollTop: 0
  };
  const pageEl = document.createElement('div');
  pageEl.className = 'page' + (settings.wrap? '' : ' wrap-off');
  pageEl.id = 'page_'+tab.id;

  if(tab.type==='rich'){
    pageEl.spellcheck = false;
    if(opts.initialLines && opts.initialLines.length){
      opts.initialLines.forEach(l=> pageEl.appendChild(createLineEl(l.indent, l.numbered, l.text)));
    } else {
      pageEl.appendChild(createLineEl(0,false,''));
    }
    tab.pageEl = pageEl;
    $('#editorArea').appendChild(pageEl);
    renumberAll(pageEl);
    bindRichPage(tab);
  } else {
    const ta = document.createElement('textarea');
    ta.value = opts.rawText || '';
    ta.spellcheck = false;
    pageEl.appendChild(ta);
    tab.pageEl = pageEl;
    tab.textarea = ta;
    $('#editorArea').appendChild(pageEl);
    bindRawPage(tab);
  }

  tabs.push(tab);
  switchTab(tab.id);
  renderTabBar();
  persist();
  return tab;
}

function switchTab(id){
  const cur = getActiveTab();
  if(cur){
    cur.scrollTop = cur.pageEl.scrollTop;
  }
  activeId = id;
  $$('.page').forEach(p=>p.classList.remove('active'));
  const tab = getActiveTab();
  if(tab){
    tab.pageEl.classList.add('active');
    tab.pageEl.scrollTop = tab.scrollTop || 0;
    $('#btnRun').style.display = (tab.type==='raw' && tab.ext==='html') ? 'flex':'none';
  }
  renderTabBar();
}

function closeTab(id){
  const idx = tabs.findIndex(t=>t.id===id);
  if(idx<0) return;
  const tab = tabs[idx];
  if(tab.dirty && !confirm('此分頁尚未儲存，確定要關閉嗎？')) return;
  tab.pageEl.remove();
  tabs.splice(idx,1);
  if(activeId===id){
    const next = tabs[idx] || tabs[idx-1];
    if(next) switchTab(next.id); else newTab({});
  }
  renderTabBar();
  persist();
}

function markDirty(tab){
  tab.dirty = true;
  renderTabBar();
  persist();
}

function renderTabBar(){
  const bar = $('#tabbar');
  $$('.tab').forEach(el=>el.remove());
  tabs.forEach(tab=>{
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id===activeId? ' active':'') + (tab.dirty? ' dirty':'');
    el.innerHTML = '<span class="dirty-dot"></span><span class="name">'+escapeHtml(tab.name)+'</span><span class="close">✕</span>';
    el.addEventListener('click',(e)=>{
      if(e.target.classList.contains('close')){ closeTab(tab.id); return; }
      if(e.target.classList.contains('name')) return; // 讓 dblclick 處理改名
      switchTab(tab.id);
    });
    const nameEl = el.querySelector('.name');
    nameEl.addEventListener('click', ()=>{
      if(tab.id!==activeId){ switchTab(tab.id); return; }
      startRename(tab, nameEl);
    });
    bar.insertBefore(el, $('#btnNewTab'));
  });
}

function startRename(tab, nameEl){
  nameEl.contentEditable = 'true';
  nameEl.focus();
  document.execCommand('selectAll', false, null);
  function finish(){
    nameEl.contentEditable = 'false';
    const newName = nameEl.textContent.trim() || tab.name;
    tab.name = newName;
    renderTabBar();
    persist();
  }
  nameEl.addEventListener('blur', finish, {once:true});
  nameEl.addEventListener('keydown', function h(e){
    if(e.key==='Enter'){ e.preventDefault(); nameEl.blur(); }
    if(e.key==='Escape'){ nameEl.blur(); }
  });
}

/* ---------- 匯出 ---------- */
function exportLinesData(pageEl){
  return linesOf(pageEl).map(line=>{
    const indent = parseInt(line.dataset.indent,10)||0;
    const numbered = line.dataset.num==='1';
    const badge = line.querySelector(':scope > .badge');
    const number = badge ? badge.textContent : '';
    const text = getTxtSpan(line).textContent;
    return {indent, numbered, number, text};
  });
}
function formatAsText(lines){
  return lines.map(l=> '  '.repeat(l.indent) + (l.numbered? l.number+' ':'') + l.text).join('\n');
}
function formatAsHtml(lines, title){
  const body = lines.map(l=>{
    const style = 'margin-left:'+(l.indent*1.6)+'em';
    const prefix = l.numbered? '<span style="color:#bd8b2a;margin-right:.4em">'+escapeHtml(l.number)+'</span>':'';
    return '<div style="'+style+'">'+prefix+escapeHtml(l.text)+'</div>';
  }).join('\n');
  return '<!DOCTYPE html>\n<html lang="zh-Hant"><head><meta charset="UTF-8">\n'+
    '<meta name="viewport" content="width=device-width, initial-scale=1">\n'+
    '<title>'+escapeHtml(title)+'</title>\n'+
    '<style>body{background:#121315;color:#fcfbfa;font-family:"Noto Serif TC",serif;'+
    'font-size:20px;line-height:1.75;padding:24px;white-space:pre-wrap;word-break:break-word}</style>\n'+
    '</head><body>\n'+body+'\n</body></html>';
}
function currentContentFor(tab, targetExt){
  if(tab.type==='raw'){
    return tab.textarea.value;
  }
  const lines = exportLinesData(tab.pageEl);
  if(targetExt==='html') return formatAsHtml(lines, tab.name);
  return formatAsText(lines);
}
function extFromName(name){
  const m = /\.([a-zA-Z0-9]+)$/.exec(name);
  return m? m[1].toLowerCase() : null;
}

/* ---------- 開啟本機檔案 ---------- */
async function openFile(){
  if(window.showOpenFilePicker){
    try{
      const [handle] = await window.showOpenFilePicker({
        types:[{description:'文字檔', accept:{'text/plain':['.txt','.md','.markdown','.html','.htm']}}],
        excludeAcceptAllOption:false, multiple:false
      });
      const file = await handle.getFile();
      const text = await file.text();
      loadFileIntoTab(file.name, text, handle);
    }catch(e){ /* 使用者取消 */ }
  } else {
    $('#fileInput').click();
  }
}
$('#fileInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const text = await file.text();
  loadFileIntoTab(file.name, text, null);
  e.target.value='';
});

function loadFileIntoTab(filename, text, handle){
  const ext = extFromName(filename) || 'txt';
  if(ext==='html'||ext==='htm'){
    newTab({name:filename, ext:'html', type:'raw', rawText:text, fileHandle:handle});
  } else {
    const rawLines = text.replace(/\r\n/g,'\n').split('\n');
    const initialLines = rawLines.map(line=>{
      const m = /^(\s*)((\d+)[.)]\s+)?(.*)$/.exec(line);
      const indentSpaces = m? m[1].length : 0;
      const indent = Math.min(MAX_INDENT, Math.round(indentSpaces/2));
      const numbered = !!(m && m[2]);
      const rest = m? m[4] : line;
      return {indent, numbered, text:rest};
    });
    if(!initialLines.length) initialLines.push({indent:0,numbered:false,text:''});
    newTab({name:filename, ext:ext, type:'rich', initialLines:initialLines, fileHandle:handle});
  }
  toast('已開啟「'+filename+'」');
}

/* ---------- 儲存 ---------- */
async function quickSave(tab){
  if(!tab) return;
  if(tab.fileHandle){
    try{
      const targetExt = extFromName(tab.name) || tab.ext || 'txt';
      const content = currentContentFor(tab, targetExt);
      const writable = await tab.fileHandle.createWritable();
      await writable.write(content);
      await writable.close();
      tab.dirty = false;
      renderTabBar(); persist();
      toast('已儲存');
    }catch(e){
      toast('儲存失敗，請改用「另存新檔」');
    }
  } else {
    await saveAs(tab);
  }
}

async function saveAs(tab){
  if(!tab) return;
  if(window.showSaveFilePicker){
    try{
      const handle = await window.showSaveFilePicker({ suggestedName: tab.name });
      const targetExt = extFromName(handle.name) || tab.ext || 'txt';
      const content = currentContentFor(tab, targetExt);
      const writable = await handle.createWritable();
      await writable.write(content);
      await writable.close();
      tab.fileHandle = handle;
      tab.name = handle.name;
      tab.ext = targetExt;
      tab.dirty = false;
      renderTabBar(); persist();
      toast('已儲存為「'+handle.name+'」');
    }catch(e){ /* 使用者取消 */ }
  } else {
    openSaveFallback(tab);
  }
}

function openSaveFallback(tab){
  $('#saveFallbackName').value = tab.name;
  $('#saveFallbackOverlay').classList.add('show');
  $('#saveFallbackOverlay')._tab = tab;
}
$('#btnSaveFallbackGo').addEventListener('click', ()=>{
  const tab = $('#saveFallbackOverlay')._tab;
  const name = $('#saveFallbackName').value.trim() || tab.name;
  const targetExt = extFromName(name) || tab.ext || 'txt';
  const content = currentContentFor(tab, targetExt);
  const mime = targetExt==='html' ? 'text/html' : 'text/plain';
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  tab.name = name; tab.ext = targetExt; tab.dirty=false;
  renderTabBar(); persist();
  $('#saveFallbackOverlay').classList.remove('show');
  toast('已下載「'+name+'」');
});
$('#closeSaveFallback').addEventListener('click', ()=> $('#saveFallbackOverlay').classList.remove('show'));

/* ---------- 在瀏覽器執行（HTML 分頁） ---------- */
$('#btnRun').addEventListener('click', ()=>{
  const tab = getActiveTab();
  if(!tab || tab.type!=='raw') return;
  const blob = new Blob([tab.textarea.value], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
});

/* ---------- 工具列事件 ---------- */
// 避免點擊工具列/頁首按鈕時讓 contenteditable 分頁失去焦點與選取範圍
$('#toolbar').addEventListener('mousedown', (e)=>{ if(e.target.closest('[data-cmd]')) e.preventDefault(); });
$('.header-actions').addEventListener('mousedown', (e)=>{ if(e.target.closest('button')) e.preventDefault(); });

$('#toolbar').addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-cmd]');
  if(!btn) return;
  const tab = getActiveTab();
  if(!tab) return;
  const cmd = btn.dataset.cmd;
  if(tab.type==='rich'){
    if(cmd==='undo') undo(tab);
    else if(cmd==='redo') redo(tab);
    else if(cmd==='numlist'){ snapshot(tab); toggleNumbered(tab); markDirty(tab); }
    else if(cmd==='indent'){ snapshot(tab); indentSelected(tab,1); markDirty(tab); }
    else if(cmd==='outdent'){ snapshot(tab); indentSelected(tab,-1); markDirty(tab); }
    else if(cmd==='paste') doToolbarPaste(tab);
  } else {
    if(cmd==='undo') document.execCommand('undo');
    else if(cmd==='redo') document.execCommand('redo');
    else if(cmd==='paste') doToolbarPaste(tab);
    else if(cmd==='indent' || cmd==='outdent' || cmd==='numlist'){
      toast('此分頁為原始檔內容，不支援編號/縮排');
    }
  }
  if(cmd==='find') openFindPanel();
  else if(cmd==='saveas') saveAs(tab);
  else if(cmd==='closetab') closeTab(tab.id);
});

$('#btnOpenHeader').addEventListener('click', openFile);
$('#btnSaveHeader').addEventListener('click', ()=>{
  const tab = getActiveTab();
  if(tab) quickSave(tab);
});

async function doToolbarPaste(tab){
  try{
    const text = await navigator.clipboard.readText();
    if(tab.type==='rich'){
      snapshot(tab);
      const lines = linesOf(tab.pageEl);
      if(tab.savedCaret && lines[tab.savedCaret.lineIndex]){
        placeCaretAt(getTxtSpan(lines[tab.savedCaret.lineIndex]), tab.savedCaret.offset);
      } else if(lines.length){
        placeCaretAt(getTxtSpan(lines[lines.length-1]), getTxtSpan(lines[lines.length-1]).textContent.length);
      }
      insertMultilineAtCaret(tab.pageEl, text);
    } else {
      const ta = tab.textarea;
      const s = ta.selectionStart, en = ta.selectionEnd;
      ta.value = ta.value.slice(0,s)+text+ta.value.slice(en);
      ta.selectionStart = ta.selectionEnd = s+text.length;
    }
    markDirty(tab);
  }catch(e){
    toast('無法讀取剪貼簿，請直接使用系統貼上');
  }
}

$('#btnNewTab').addEventListener('click', ()=> newTab({}));

/* ---------- 設定面板 ---------- */
$('#btnSettings').addEventListener('click', ()=> $('#settingsOverlay').classList.add('show'));
$('#closeSettings').addEventListener('click', ()=> $('#settingsOverlay').classList.remove('show'));
$('#fontFamily').addEventListener('change', (e)=>{ settings.fontFamily=e.target.value; applySettings(); saveSettings(); });
$('#fontInc').addEventListener('click', ()=>{ settings.fontSize=Math.min(40,settings.fontSize+1); applySettings(); saveSettings(); });
$('#fontDec').addEventListener('click', ()=>{ settings.fontSize=Math.max(12,settings.fontSize-1); applySettings(); saveSettings(); });
$('#wrapToggle').addEventListener('change', (e)=>{ settings.wrap=e.target.checked; applySettings(); saveSettings(); });

/* ---------- 尋找與取代 ---------- */
function openFindPanel(){
  $('#findOverlay').classList.add('show');
  $('#findInput').focus();
}
$('#closeFind').addEventListener('click', ()=> $('#findOverlay').classList.remove('show'));

function buildFlatText(tab){
  if(tab.type==='raw') return tab.textarea.value;
  const lines = exportLinesData(tab.pageEl);
  return lines.map(l=>l.text).join('\n');
}
function makeMatcher(){
  const q = $('#findInput').value;
  const useRegex = $('#regexToggle').checked;
  if(!q) return null;
  try{
    return useRegex ? new RegExp(q,'g') : new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');
  }catch(e){ toast('正則式錯誤'); return null; }
}
let lastMatchEnd = 0;
function findNextMatch(tab){
  const re = makeMatcher();
  if(!re) return null;
  const text = buildFlatText(tab);
  re.lastIndex = lastMatchEnd;
  let m = re.exec(text);
  if(!m && $('#wrapSearchToggle').checked){
    re.lastIndex = 0;
    m = re.exec(text);
  }
  if(!m){ $('#findStatus').textContent='找不到相符內容'; return null; }
  lastMatchEnd = m.index + Math.max(m[0].length,1);
  $('#findStatus').textContent = '找到：位置 '+m.index+'，長度 '+m[0].length;
  highlightRange(tab, m.index, m[0].length);
  return {index:m.index, length:m[0].length, match:m};
}
function mapIndexToLineOffset(tab, globalIndex){
  if(tab.type==='raw') return null;
  const lines = linesOf(tab.pageEl);
  let acc = 0;
  for(let i=0;i<lines.length;i++){
    const len = getTxtSpan(lines[i]).textContent.length;
    if(globalIndex <= acc+len){
      return {lineEl:lines[i], offset: globalIndex-acc};
    }
    acc += len + 1; // +1 for \n
  }
  return {lineEl:lines[lines.length-1], offset:0};
}
function highlightRange(tab, index, length){
  if(tab.type==='raw'){
    const ta = tab.textarea;
    ta.focus(); ta.setSelectionRange(index, index+length);
    return;
  }
  const start = mapIndexToLineOffset(tab, index);
  const end = mapIndexToLineOffset(tab, index+length);
  if(!start||!end) return;
  const sel = window.getSelection();
  const range = document.createRange();
  getTxtSpan(start.lineEl).focus();
  const sNode = getTxtSpan(start.lineEl).firstChild || getTxtSpan(start.lineEl);
  const eNode = getTxtSpan(end.lineEl).firstChild || getTxtSpan(end.lineEl);
  try{
    range.setStart(sNode, start.offset);
    range.setEnd(eNode, end.offset);
    sel.removeAllRanges(); sel.addRange(range);
    end.lineEl.scrollIntoView({block:'center'});
  }catch(e){}
}
function replaceAtMatch(tab, index, length, replacement){
  if(tab.type==='raw'){
    const ta = tab.textarea;
    ta.value = ta.value.slice(0,index) + replacement + ta.value.slice(index+length);
    return;
  }
  const start = mapIndexToLineOffset(tab, index);
  const end = mapIndexToLineOffset(tab, index+length);
  if(!start||!end) return;
  if(start.lineEl===end.lineEl){
    const txt = getTxtSpan(start.lineEl);
    txt.textContent = txt.textContent.slice(0,start.offset)+replacement+txt.textContent.slice(end.offset);
  } else {
    // 跨行取代：合併為單行處理（簡化）
    const startTxt = getTxtSpan(start.lineEl);
    const endTxt = getTxtSpan(end.lineEl);
    startTxt.textContent = startTxt.textContent.slice(0,start.offset)+replacement+endTxt.textContent.slice(end.offset);
    let cur = start.lineEl.nextSibling;
    while(cur && cur!==end.lineEl.nextSibling){
      const toRemove = cur; cur = cur.nextSibling; toRemove.remove();
    }
  }
}
$('#btnFindNext').addEventListener('click', ()=>{
  const tab = getActiveTab(); if(!tab) return;
  findNextMatch(tab);
});
$('#btnReplaceOne').addEventListener('click', ()=>{
  const tab = getActiveTab(); if(!tab) return;
  const repl = $('#replaceInput').value;
  const re = makeMatcher(); if(!re) return;
  const text = buildFlatText(tab);
  re.lastIndex = Math.max(0,lastMatchEnd-1);
  const m = re.exec(text);
  if(!m){ toast('請先按「找下一個」定位'); return; }
  snapshot(tab); tab._inBurst=false;
  replaceAtMatch(tab, m.index, m[0].length, repl);
  if(tab.type==='rich') renumberAll(tab.pageEl);
  lastMatchEnd = m.index + repl.length;
  markDirty(tab);
  toast('已取代');
});
$('#btnReplaceAll').addEventListener('click', ()=>{
  const tab = getActiveTab(); if(!tab) return;
  const repl = $('#replaceInput').value;
  const re = makeMatcher(); if(!re) return;
  snapshot(tab); tab._inBurst=false;
  const text = buildFlatText(tab);
  const newText = text.replace(re, repl);
  applyFlatTextToTab(tab, newText);
  markDirty(tab);
  toast('已全部取代');
});
$('#btnReplaceSel').addEventListener('click', ()=>{
  const tab = getActiveTab(); if(!tab) return;
  const repl = $('#replaceInput').value;
  const re = makeMatcher(); if(!re) return;
  let selText='', selStart=0, selEnd=0;
  if(tab.type==='raw'){
    const ta = tab.textarea;
    selStart = ta.selectionStart; selEnd = ta.selectionEnd;
    selText = ta.value.slice(selStart, selEnd);
  } else {
    const sel = window.getSelection();
    selText = sel.toString();
    const full = buildFlatText(tab);
    selStart = full.indexOf(selText);
    selEnd = selStart + selText.length;
  }
  if(!selText){ toast('請先選取要取代的範圍'); return; }
  snapshot(tab); tab._inBurst=false;
  const replacedSel = selText.replace(re, repl);
  const full = buildFlatText(tab);
  const newText = full.slice(0,selStart) + replacedSel + full.slice(selEnd);
  applyFlatTextToTab(tab, newText);
  markDirty(tab);
  toast('已取代選取範圍');
});
function applyFlatTextToTab(tab, newText){
  if(tab.type==='raw'){
    tab.textarea.value = newText;
    return;
  }
  const oldLines = linesOf(tab.pageEl);
  const meta = oldLines.map(l=>({indent:parseInt(l.dataset.indent,10)||0, numbered:l.dataset.num==='1'}));
  const newLineTexts = newText.split('\n');
  tab.pageEl.innerHTML='';
  newLineTexts.forEach((t,i)=>{
    const m = meta[i] || meta[meta.length-1] || {indent:0,numbered:false};
    tab.pageEl.appendChild(createLineEl(m.indent, m.numbered, t));
  });
  renumberAll(tab.pageEl);
}

/* ---------- 持久化 ---------- */
function persist(){
  try{
    const data = tabs.map(t=>({
      id:t.id, name:t.name, ext:t.ext, type:t.type, dirty:t.dirty,
      content: t.type==='rich'? t.pageEl.innerHTML : t.textarea.value
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify({activeId, tabs:data}));
  }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') persist(); });
window.addEventListener('pagehide', persist);
function restore(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data.tabs || !data.tabs.length) return false;
    data.tabs.forEach(td=>{
      if(td.type==='rich'){
        const tab = newTab({name:td.name, ext:td.ext, type:'rich'});
        tab.pageEl.innerHTML = td.content;
        Array.from(tab.pageEl.querySelectorAll('.txt')).forEach(t=> t.contentEditable='true');
        Array.from(tab.pageEl.querySelectorAll('.badge')).forEach(b=> b.removeAttribute('contenteditable'));
        renumberAll(tab.pageEl);
        tab.dirty = !!td.dirty;
      } else {
        const tab = newTab({name:td.name, ext:td.ext, type:'raw', rawText:td.content});
        tab.dirty = !!td.dirty;
      }
    });
    if(data.activeId && tabs.some(t=>t.id===data.activeId)) switchTab(data.activeId);
    renderTabBar();
    return true;
  }catch(e){ return false; }
}

/* ---------- 離開頁面前提醒（未儲存） ---------- */
window.addEventListener('beforeunload', (e)=>{
  if(tabs.some(t=>t.dirty)){
    e.preventDefault(); e.returnValue='';
  }
});

/* ---------- Service Worker（PWA 安裝條件之一，需 https 或 localhost） ---------- */
if('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost')){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

/* ---------- 初始化 ---------- */
loadSettings();
applySettings();
if(!restore()){
  newTab({name:'未命名筆記'});
}
})();
