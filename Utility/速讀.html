/* ============ 步驟建構 ============ */
function estimateWordCount(text){
  // 整句 fallback 成單一 token 時，用這個估算「這個 token 該算幾個字」，
  // 避免整句只用一個 token 的時間播完，導致實際速度遠快於設定的 WPM。
  const trimmed = (text || '').trim();
  if(trimmed.length === 0) return 1;
  if(/\s/.test(trimmed)){
    // 英文等以空白分隔的語言：用空白數推估字數
    return Math.max(1, trimmed.split(/\s+/).filter(Boolean).length);
  }
  // 中文等無空白語言：粗略以字元數估算
  return Math.max(1, trimmed.length);
}
function buildTokenSteps(paragraphs){
  const steps = [];
  paragraphs.forEach((para, paraIdx)=>{
    para.clauses.forEach((clause, clauseIdx)=>{
      // tokens 為空時，視為只有一個 token，即整句
      const hasRealTokens = clause.tokens && clause.tokens.length > 0;
      const toks = hasRealTokens ? clause.tokens : [clause.text];
      toks.forEach((tok, tokIdx)=>{
        steps.push({
          paraIdx, clauseIdx, tokIdx,
          sectionIdx: para.sectionIdx,
          text: tok,
          isLastToken: tokIdx === toks.length-1,
          punctuation: clause.punctuation,
          // 真正的 token 每個算 1；fallback 整句則依估算字數給予對應的停留權重
          tokenCount: hasRealTokens ? 1 : estimateWordCount(tok)
        });
      });
    });
  });
  return steps;
}
function buildChunkSteps(tokenSteps, chunkSize){
  const chunks = [];
  let i=0;
  while(i<tokenSteps.length){
    const group = [];
    let punctuation = null, isLast=false;
    for(let k=0;k<chunkSize && i<tokenSteps.length;k++,i++){
      const st = tokenSteps[i];
      group.push(st);
      if(st.isLastToken){ punctuation = st.punctuation; isLast = true; i++; break; }
    }
    chunks.push({
      text: joinTokensForDisplay(group.map(g=>g.text)),
      tokenCount: group.reduce((a,g)=>a+(g.tokenCount||1), 0),
      isLastToken: isLast,
      punctuation: punctuation,
      sectionIdx: group[0].sectionIdx
    });
  }
  return chunks;
}
function buildClauseSteps(tokenSteps){
  const steps = [];
  let i = 0;
  while(i < tokenSteps.length){
    const group = [];
    while(i < tokenSteps.length){
      const st = tokenSteps[i];
      group.push(st);
      i++;
      if(st.isLastToken) break;
    }
    steps.push({
      tokens: group.map(g=>g.text),
      text: joinTokensForDisplay(group.map(g=>g.text)),
      tokenCount: group.reduce((a,g)=>a+(g.tokenCount||1), 0),
      isLastToken: true,
      punctuation: group[group.length-1].punctuation,
      sectionIdx: group[0].sectionIdx
    });
  }
  return steps;
}

/* ============ 朗讀播放 ============ */
function startReading(){
  const ch = currentChapter();
  const flat = flattenChapter(ch);
  const startIdx = state.startSectionIdx || 0;
  state.paragraphs = flat.paragraphs.filter(p => p.sectionIdx >= startIdx);
  state.sections = flat.sections;
  state.chapterSentenceList = buildChapterSentenceList(state.paragraphs);
  const tokenSteps = buildTokenSteps(state.paragraphs);
  state.totalTokens = tokenSteps.reduce((a,s)=>a+(s.tokenCount||1), 0);
  if(state.mode === 'chunk') state.steps = buildChunkSteps(tokenSteps, state.chunkSize);
  else if(state.mode === 'clause') state.steps = buildClauseSteps(tokenSteps);
  else state.steps = tokenSteps;
  state.stepIndex = 0;
  state.paused = false;
  state.lastParaIdx = -1;
  state.clauseSlotIndex = 0;
  state.startTime = Date.now();

  document.getElementById('reading-chapter-label').textContent = ch.title;
  document.getElementById('rsvp-display').style.display = state.mode==='rsvp' ? 'block' : 'none';
  document.getElementById('chunk-display').style.display = state.mode==='chunk' ? 'block' : 'none';
  document.getElementById('clause-pane').style.display = state.mode==='clause' ? 'block' : 'none';
  document.getElementById('window-pane').style.display = state.mode==='window' ? 'block' : 'none';
  document.getElementById('pause-btn').textContent = '暫停';
  document.getElementById('font-size-control').style.display = 'none';

  showScreen('screen-reading');
  playStep();
}

function baseInterval(){ return 60000 / state.wpm; }

function playStep(){
  if(state.paused) return;
  if(state.stepIndex >= state.steps.length){ finishReading(); return; }
  const step = state.steps[state.stepIndex];
  renderStep(step);
  updateProgressBar();

  let delay = baseInterval() * (step.tokenCount || 1);
  if(step.isLastToken) delay += pauseFor(step.punctuation);

  clearTimeout(state.timer);
  state.timer = setTimeout(()=>{
    const finishedSectionIdx = state.steps[state.stepIndex].sectionIdx;
    state.stepIndex++;
    const nextStep = state.steps[state.stepIndex];
    const nextSectionIdx = nextStep ? nextStep.sectionIdx : null;
    if(nextSectionIdx !== finishedSectionIdx){
      triggerSectionCheck(finishedSectionIdx);
    } else {
      playStep();
    }
  }, delay);
}

/* ============ 節間即時檢核：讀完一節先暫停問一題 ============ */
const SENTENCE_END_PUNCT = ['。','！','？'];
function collectFullSentences(section){
  // 完整句子：以句號／驚嘆號／問號結尾（不以逗號、頓號等結尾），且長度不少於 5 字
  return section.clauses.filter(c =>
    SENTENCE_END_PUNCT.includes(c.punctuation) && c.text.length >= 5
  );
}
function buildChapterSentenceList(paragraphs){
  // 依朗讀順序收集整章的「完整句子」，並標記所屬節，供上一句／下一句題型使用
  const list = [];
  paragraphs.forEach(para=>{
    para.clauses.forEach(c=>{
      if(SENTENCE_END_PUNCT.includes(c.punctuation) && c.text.length >= 5){
        list.push({ text:c.text, punctuation:c.punctuation, sectionIdx:para.sectionIdx });
      }
    });
  });
  return list;
}
function shuffleArray(arr){
  return arr.slice().sort(()=>Math.random()-0.5);
}
function generateAutoTrueFalseQuiz(sectionIdx){
  const section = state.sections[sectionIdx];
  const nextSection = state.sections[sectionIdx + 1] || null;
  const ownPool = collectFullSentences(section);
  const nextPool = nextSection ? collectFullSentences(nextSection) : [];
  if(ownPool.length === 0 && nextPool.length === 0) return null;

  let pickFromOwn;
  if(ownPool.length > 0 && nextPool.length > 0) pickFromOwn = Math.random() < 0.5;
  else pickFromOwn = ownPool.length > 0;

  const pool = pickFromOwn ? ownPool : nextPool;
  const picked = pool[Math.floor(Math.random() * pool.length)];
  return {
    autoGenerated: true,
    questions: [{
      id: 'auto_tf_' + section.id,
      type: 'true_false',
      question: '這句話出自本節：「' + picked.text + picked.punctuation + '」',
      answer: pickFromOwn,
      explanation: pickFromOwn ? '這句話確實出自本節。' : '這句話其實出自下一節，還沒讀到這裡。'
    }]
  };
}
function generateAutoNextSentenceQuiz(sectionIdx){
  const list = state.chapterSentenceList;
  const section = state.sections[sectionIdx];
  // 候選：屬於本節、且在整章句子清單中「有下一句」的句子
  const candidateIdx = [];
  list.forEach((s, i)=>{ if(s.sectionIdx === sectionIdx && i + 1 < list.length) candidateIdx.push(i); });
  if(candidateIdx.length === 0) return null;

  const si = candidateIdx[Math.floor(Math.random() * candidateIdx.length)];
  const target = list[si];
  const correctNext = list[si + 1];
  const prevSentence = si - 1 >= 0 ? list[si - 1] : null;

  const usedTexts = new Set([target.text, correctNext.text]);
  if(prevSentence) usedTexts.add(prevSentence.text);

  const options = [];
  options.push({ text: correctNext.text + correctNext.punctuation, isCorrect: true });
  if(prevSentence) options.push({ text: prevSentence.text + prevSentence.punctuation, isCorrect: false });

  // 本節其他任一句作為干擾選項，補到 4 個選項
  const sectionOthers = shuffleArray(list.filter(s => s.sectionIdx === sectionIdx && !usedTexts.has(s.text)));
  for(const s of sectionOthers){
    if(options.length >= 4) break;
    options.push({ text: s.text + s.punctuation, isCorrect: false });
    usedTexts.add(s.text);
  }
  // 若本節句子不夠，從全章其餘句子補足
  if(options.length < 4){
    const fallback = shuffleArray(list.filter(s => !usedTexts.has(s.text)));
    for(const s of fallback){
      if(options.length >= 4) break;
      options.push({ text: s.text + s.punctuation, isCorrect: false });
      usedTexts.add(s.text);
    }
  }
  if(options.length < 2) return null;

  const shuffled = shuffleArray(options);
  const answerIndex = shuffled.findIndex(o => o.isCorrect);

  return {
    autoGenerated: true,
    questions: [{
      id: 'auto_next_' + section.id,
      type: 'single_choice',
      question: '這句話的下一句是？「' + target.text + target.punctuation + '」',
      options: shuffled.map(o => o.text),
      answerIndex: answerIndex,
      explanation: '下一句其實是：「' + correctNext.text + correctNext.punctuation + '」'
    }]
  };
}
function generateAutoSectionQuiz(sectionIdx){
  const preferNextSentence = Math.random() < 0.5;
  let quiz = preferNextSentence ? generateAutoNextSentenceQuiz(sectionIdx) : generateAutoTrueFalseQuiz(sectionIdx);
  if(!quiz){
    quiz = preferNextSentence ? generateAutoTrueFalseQuiz(sectionIdx) : generateAutoNextSentenceQuiz(sectionIdx);
  }
  return quiz;
}

/* ============ 整章自動出題（供沒有作者預先設計章測驗的文章使用，預設 3 題）============ */
function buildNextSentenceQuestionAt(list, si, idSuffix){
  const target = list[si];
  const correctNext = list[si + 1];
  if(!correctNext) return null;
  const prevSentence = si - 1 >= 0 ? list[si - 1] : null;
  const usedTexts = new Set([target.text, correctNext.text]);
  if(prevSentence) usedTexts.add(prevSentence.text);

  const options = [{ text: correctNext.text + correctNext.punctuation, isCorrect: true }];
  if(prevSentence) options.push({ text: prevSentence.text + prevSentence.punctuation, isCorrect: false });
  const others = shuffleArray(list.filter(s => !usedTexts.has(s.text)));
  for(const s of others){
    if(options.length >= 4) break;
    options.push({ text: s.text + s.punctuation, isCorrect: false });
    usedTexts.add(s.text);
  }
  if(options.length < 2) return null;

  const shuffled = shuffleArray(options);
  const answerIndex = shuffled.findIndex(o => o.isCorrect);
  return {
    id: 'auto_ch_q_' + idSuffix,
    type: 'single_choice',
    question: '這句話的下一句是？「' + target.text + target.punctuation + '」',
    options: shuffled.map(o => o.text),
    answerIndex: answerIndex,
    explanation: '下一句其實是：「' + correctNext.text + correctNext.punctuation + '」'
  };
}
function generateAutoChapterQuiz(count){
  const list = state.chapterSentenceList;
  if(!list || list.length < 2) return null;
  const candidateIdx = [];
  for(let i = 0; i < list.length - 1; i++) candidateIdx.push(i);
  const shuffledIdx = shuffleArray(candidateIdx);
  const questions = [];
  for(const si of shuffledIdx){
    if(questions.length >= count) break;
    const q = buildNextSentenceQuestionAt(list, si, questions.length + 1);
    if(q) questions.push(q);
  }
  if(questions.length === 0) return null;
  return { autoGenerated: true, questions: questions };
}
function triggerSectionCheck(sectionIdx){
  clearTimeout(state.timer);
  const section = state.sections[sectionIdx];
  state.pendingResume = (state.stepIndex >= state.steps.length) ? 'finish' : 'continue';
  if(!section){
    if(state.pendingResume === 'finish') finishReading(); else playStep();
    return;
  }
  const quiz = section.quiz || generateAutoSectionQuiz(sectionIdx);
  if(!quiz){
    // 無法產生任何檢核題（本節與下節都沒有夠長的完整句子），直接接續播放
    if(state.pendingResume === 'finish') finishReading(); else playStep();
    return;
  }
  renderSectionCheck(section, quiz);
  showScreen('screen-section-check');
}
function renderSectionCheck(section, quiz){
  document.getElementById('section-check-eyebrow').textContent = quiz.autoGenerated ? '隨機抽問' : '本節小測驗';
  document.getElementById('section-check-title').textContent = section.title;
  const q = quiz.questions[0];
  const container = document.getElementById('section-check-question');
  let inner = '<div class="quiz-q"><div class="quiz-q-title">'+q.question+'</div>';
  if(q.type === 'single_choice'){
    inner += '<div class="opt-list">' + q.options.map((opt,oi)=>
      '<div class="opt" data-value="'+oi+'">' + opt + '</div>'
    ).join('') + '</div>';
  } else {
    inner += '<div class="tf-row">' +
      '<div class="opt" data-value="true">對</div>' +
      '<div class="opt" data-value="false">錯</div>' +
    '</div>';
  }
  inner += '<div class="explanation" style="display:none;"></div></div>';
  container.innerHTML = inner;

  document.getElementById('section-continue-btn').style.display = 'none';

  container.querySelectorAll('.opt').forEach(optEl=>{
    optEl.addEventListener('click', ()=>{
      if(optEl.parentElement.querySelector('.opt.correct, .opt.incorrect')) return;
      if(q.type === 'single_choice'){
        const selectedIdx = parseInt(optEl.dataset.value);
        container.querySelectorAll('.opt').forEach((o,oi)=>{
          if(oi === q.answerIndex) o.classList.add('correct');
          else if(oi === selectedIdx) o.classList.add('incorrect');
          o.style.pointerEvents = 'none';
        });
      } else {
        const boolSelected = optEl.dataset.value === 'true';
        container.querySelectorAll('.opt').forEach(o=>{
          const val = o.dataset.value === 'true';
          if(val === q.answer) o.classList.add('correct');
          else if(o === optEl) o.classList.add('incorrect');
          o.style.pointerEvents = 'none';
        });
      }
      if(q.explanation){
        const exp = container.querySelector('.explanation');
        exp.textContent = q.explanation;
        exp.style.display = 'block';
      }
      document.getElementById('section-continue-btn').style.display = 'block';
    });
  });
}
function resumeAfterSectionCheck(){
  if(state.pendingResume === 'finish'){
    finishReading();
  } else {
    showScreen('screen-reading');
    playStep();
  }
}
document.getElementById('section-continue-btn').addEventListener('click', resumeAfterSectionCheck);

function renderStep(step){
  if(state.mode === 'rsvp'){
    document.getElementById('rsvp-display').textContent = step.text;
  } else if(state.mode === 'chunk'){
    document.getElementById('chunk-display').textContent = step.text;
  } else if(state.mode === 'clause'){
    renderClauseStep(step);
  } else {
    renderWindowStep(step);
  }
}

function renderClauseStep(step){
  const container = document.getElementById('clause-pane');
  const totalSlots = 6;
  const slot = state.clauseSlotIndex % totalSlots;
  const topPct = 8 + slot * (84 / (totalSlots - 1));
  state.clauseSlotIndex++;

  const tokens = step.tokens && step.tokens.length ? step.tokens : [step.text];
  const inner = tokens.map((tok, idx)=>{
    const displayNum = idx + 1; // 1-indexed：奇數 = 1,3,5...
    return displayNum % 2 === 1
      ? '<span class="tok-odd">' + tok + '</span>'
      : '<span>' + tok + '</span>';
  }).join(tokenSeparator()) + '<span class="clause-punct">' + step.punctuation + '</span>';

  container.innerHTML = '<div class="clause-text" style="top:' + topPct + '%;">' + inner + '</div>';
}

function renderWindowParagraph(paraIdx){
  const para = state.paragraphs[paraIdx];
  const container = document.getElementById('window-pane');
  const sep = tokenSeparator();
  container.innerHTML = para.clauses.map((clause, cIdx)=>{
    const toks = (clause.tokens && clause.tokens.length > 0) ? clause.tokens : [clause.text];
    return toks.map((tok, tIdx)=>
      '<span class="tok" data-clause="'+cIdx+'" data-tok="'+tIdx+'">'+tok+'</span>'
    ).join(sep) + '<span class="punct">'+clause.punctuation+'</span>' + (sep ? ' ' : '');
  }).join('');
}
function renderWindowStep(step){
  if(state.lastParaIdx !== step.paraIdx){
    renderWindowParagraph(step.paraIdx);
    state.lastParaIdx = step.paraIdx;
  }
  const container = document.getElementById('window-pane');
  container.querySelectorAll('.tok').forEach(el=>{
    const cIdx = parseInt(el.dataset.clause), tIdx = parseInt(el.dataset.tok);
    el.classList.toggle('tok-read', cIdx < step.clauseIdx || (cIdx===step.clauseIdx && tIdx < step.tokIdx));
    el.classList.toggle('tok-active-clause', cIdx === step.clauseIdx);
    el.classList.toggle('tok-current', cIdx===step.clauseIdx && tIdx===step.tokIdx);
  });
  const current = container.querySelector('.tok-current');
  if(current) current.scrollIntoView({block:'center', behavior:'smooth'});
}

function updateProgressBar(){
  const pct = Math.round((state.stepIndex/state.steps.length)*100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = (state.stepIndex) + ' / ' + state.steps.length;
}

/* ============ 閱讀字型大小：暫停時可調整，並持久儲存供之後沿用 ============ */
const FONT_SCALE_KEY = 'sudu_font_scale';
function loadFontScale(){
  const v = parseFloat(localStorage.getItem(FONT_SCALE_KEY));
  return (!isNaN(v) && v > 0) ? v : 1;
}
function saveFontScale(v){
  try{ localStorage.setItem(FONT_SCALE_KEY, String(v)); }catch(e){}
}
let readingFontScale = loadFontScale();
function applyFontScale(){
  document.documentElement.style.setProperty('--font-scale', readingFontScale);
  const label = document.getElementById('font-scale-value');
  if(label) label.textContent = Math.round(readingFontScale * 100) + '%';
}
function changeFontScale(delta){
  readingFontScale = Math.min(2, Math.max(0.6, Math.round((readingFontScale + delta) * 100) / 100));
  saveFontScale(readingFontScale);
  applyFontScale();
}
applyFontScale(); // 一開始就套用上次儲存的字型大小

document.getElementById('font-size-minus').addEventListener('click', ()=>changeFontScale(-0.1));
document.getElementById('font-size-plus').addEventListener('click', ()=>changeFontScale(0.1));

document.getElementById('pause-btn').addEventListener('click', ()=>{
  state.paused = !state.paused;
  document.getElementById('pause-btn').textContent = state.paused ? '繼續' : '暫停';
  document.getElementById('font-size-control').style.display = state.paused ? 'flex' : 'none';
  if(!state.paused) playStep();
  else clearTimeout(state.timer);
});
document.getElementById('exit-reading-btn').addEventListener('click', ()=>{
  clearTimeout(state.timer);
  if(confirm('確定要離開本次練習嗎？進度將不會被記錄。')){
    renderLibrary(); showScreen('screen-library');
  } else {
    if(!state.paused) playStep();
  }
});

/* ============ 完成朗讀 → 進入測驗 ============ */
function finishReading(){
  const elapsedMs = Date.now() - state.startTime;
  const actualWpm = Math.round(state.totalTokens / (elapsedMs/60000));
  state.lastRun = {
    wpm: actualWpm,
    timeSpentSec: Math.round(elapsedMs/1000),
    mode: state.mode
  };
  if(state.wholeBookMode){
    state.quizScope = 'wholebook';
    showResults(0, 0, null);
    return;
  }
  state.quizScope = 'chapter';
  state.quizChapterIndex = state.chapterIndex;
  state.dynamicChapterQuiz = null;
  const ch = ARTICLE.content.chapters[state.chapterIndex];
  if(ch.quiz && ch.quiz.questions && ch.quiz.questions.length > 0){
    renderQuiz();
    showScreen('screen-quiz');
  } else {
    const autoQuiz = generateAutoChapterQuiz(3);
    if(autoQuiz){
      state.dynamicChapterQuiz = autoQuiz;
      renderQuiz();
      showScreen('screen-quiz');
    } else {
      showResults(0, 0, null);
    }
  }
}

/* ============ 整篇總測驗（不需重新朗讀） ============ */
function openOverallQuiz(){
  state.quizScope = 'article';
  state.lastRun = { wpm: 0, timeSpentSec: 0, mode: '-' };
  renderQuiz();
  showScreen('screen-quiz');
}

/* ============ 測驗畫面 ============ */
function currentQuiz(){
  if(state.quizScope === 'chapter'){
    if(state.dynamicChapterQuiz) return state.dynamicChapterQuiz;
    return ARTICLE.content.chapters[state.quizChapterIndex].quiz;
  }
  return ARTICLE.quiz;
}
function renderQuiz(){
  state.quizAnswers = {};
  const quiz = currentQuiz();
  document.getElementById('quiz-title').textContent =
    state.quizScope==='chapter' ? ARTICLE.content.chapters[state.quizChapterIndex].title + ' · 測驗' : '整篇文章 · 總測驗';

  const container = document.getElementById('quiz-questions');
  container.innerHTML = '';
  quiz.questions.forEach((q, qi)=>{
    const block = document.createElement('div');
    block.className = 'quiz-q';
    block.dataset.qid = q.id;
    let inner = '<div class="quiz-q-title"><span class="quiz-num">Q' + (qi+1) + '</span>' + q.question + '</div>';
    if(q.type === 'single_choice'){
      inner += '<div class="opt-list">' + q.options.map((opt,oi)=>
        '<div class="opt" data-value="'+oi+'">' + opt + '</div>'
      ).join('') + '</div>';
    } else if(q.type === 'true_false'){
      inner += '<div class="tf-row">' +
        '<div class="opt" data-value="true">對</div>' +
        '<div class="opt" data-value="false">錯</div>' +
      '</div>';
    }
    inner += '<div class="explanation" style="display:none;"></div>';
    block.innerHTML = inner;
    container.appendChild(block);
  });

  container.querySelectorAll('.opt').forEach(optEl=>{
    optEl.addEventListener('click', ()=>{
      const block = optEl.closest('.quiz-q');
      block.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
      optEl.classList.add('selected');
      state.quizAnswers[block.dataset.qid] = optEl.dataset.value;
      updateSubmitEnabled();
    });
  });
  document.getElementById('submit-quiz-btn').disabled = true;
  document.getElementById('submit-quiz-btn').textContent = '提交答案';
  document.getElementById('submit-quiz-btn').onclick = submitQuiz;
}
function updateSubmitEnabled(){
  const quiz = currentQuiz();
  const answered = quiz.questions.every(q => state.quizAnswers[q.id] !== undefined);
  document.getElementById('submit-quiz-btn').disabled = !answered;
}

function submitQuiz(){
  const quiz = currentQuiz();
  let correctCount = 0;
  quiz.questions.forEach(q=>{
    const block = document.querySelector('.quiz-q[data-qid="'+q.id+'"]');
    const selected = state.quizAnswers[q.id];
    let isCorrect = false;
    if(q.type === 'single_choice'){
      isCorrect = parseInt(selected) === q.answerIndex;
      block.querySelectorAll('.opt').forEach((o,oi)=>{
        if(oi === q.answerIndex) o.classList.add('correct');
        else if(String(oi) === selected) o.classList.add('incorrect');
        o.style.pointerEvents = 'none';
      });
    } else {
      const boolSelected = selected === 'true';
      isCorrect = boolSelected === q.answer;
      block.querySelectorAll('.opt').forEach(o=>{
        const val = o.dataset.value === 'true';
        if(val === q.answer) o.classList.add('correct');
        else if(o.dataset.value === selected) o.classList.add('incorrect');
        o.style.pointerEvents = 'none';
      });
    }
    if(isCorrect) correctCount++;
    const expEl = block.querySelector('.explanation');
    if(q.explanation){ expEl.textContent = q.explanation; expEl.style.display = 'block'; }
  });

  const score = Math.round((correctCount/quiz.questions.length)*100)/100;
  document.getElementById('submit-quiz-btn').textContent = '查看結果';
  document.getElementById('submit-quiz-btn').disabled = false;
  document.getElementById('submit-quiz-btn').onclick = ()=>showResults(correctCount, quiz.questions.length, score);
}

/* ============ 結果畫面 ============ */
function showResults(correctCount, totalQ, score){
  if(score === null){
    document.getElementById('result-score-big').textContent = '完成';
    document.getElementById('stat-accuracy').textContent = '—';
  } else {
    document.getElementById('result-score-big').textContent = correctCount + '/' + totalQ;
    document.getElementById('stat-accuracy').textContent = Math.round(score*100) + '%';
  }

  if(state.quizScope === 'chapter'){
    document.getElementById('stat-wpm').textContent = state.lastRun.wpm;
    document.getElementById('stat-time').textContent = state.lastRun.timeSpentSec + ' 秒';
    document.getElementById('stat-mode').textContent = MODE_INFO[state.lastRun.mode].label;

    const ch = ARTICLE.content.chapters[state.quizChapterIndex];
    progress.records.push({
      articleId: ARTICLE.id,
      chapterId: ch.id,
      date: new Date().toISOString().slice(0,10),
      mode: state.lastRun.mode,
      wpm: state.lastRun.wpm,
      timeSpentSec: state.lastRun.timeSpentSec,
      quizScope: 'chapter',
      quizScore: score
    });
    recomputeStats();
    saveProgress();

    const hasNext = state.quizChapterIndex < ARTICLE.content.chapters.length - 1;
    document.getElementById('next-btn').style.display = hasNext ? 'block' : 'none';
    document.getElementById('retry-btn').textContent = '重新練習本章';
    document.getElementById('retry-btn').onclick = ()=>{ openSetup(state.quizChapterIndex); };
    document.getElementById('next-btn').onclick = ()=>{ openSetup(state.quizChapterIndex+1); };
  } else if(state.quizScope === 'wholebook'){
    document.getElementById('stat-wpm').textContent = state.lastRun.wpm;
    document.getElementById('stat-time').textContent = state.lastRun.timeSpentSec + ' 秒';
    document.getElementById('stat-mode').textContent = MODE_INFO[state.lastRun.mode].label;

    progress.records.push({
      articleId: ARTICLE.id,
      chapterId: '__whole_book__',
      date: new Date().toISOString().slice(0,10),
      mode: state.lastRun.mode,
      wpm: state.lastRun.wpm,
      timeSpentSec: state.lastRun.timeSpentSec,
      quizScope: 'wholebook',
      quizScore: score
    });
    recomputeStats();
    saveProgress();

    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('retry-btn').textContent = '重新朗讀全書';
    document.getElementById('retry-btn').onclick = ()=>{ openWholeBookSetup(); };
  } else {
    document.getElementById('stat-wpm').textContent = '-';
    document.getElementById('stat-time').textContent = '-';
    document.getElementById('stat-mode').textContent = '總測驗';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('retry-btn').textContent = '重新測驗';
    document.getElementById('retry-btn').onclick = ()=>{ openOverallQuiz(); };
  }
  document.getElementById('lib-btn').onclick = ()=>{ renderLibrary(); showScreen('screen-library'); };
  showScreen('screen-results');
}

/* ============ 初始化 ============ */
renderLibrary();
</script>
