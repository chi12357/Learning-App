<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習資源</title>
    
    <!-- PWA 設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121315">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/attachments/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/attachments/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/attachments/icon-512.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Inter:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap');

        :root {
            --bg: #121315;
            --text: #fcfbfa;
            --accent-red: #942525;
            --accent-gold: #bd8b2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(18, 19, 21, 0.98);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(189, 139, 42, 0.25);
            padding: 1.6rem 0 1.4rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
            text-align: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.85rem;
            font-weight: 600;
            color: var(--accent-gold);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.1rem;
        }

        .logo::before { content: "⟡"; color: var(--accent-red); font-size: 1.4rem; }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            max-width: 520px;
            margin: 0 auto;
        }

        .nav-button {
            flex: 1; max-width: 240px;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1.08rem;
            min-height: 52px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-button.language { background: rgba(148,37,37,0.14); color: var(--accent-gold); border-color: rgba(189,139,42,0.5); }
        .nav-button.utility  { background: rgba(189,139,42,0.14); color: var(--accent-gold); border-color: rgba(189,139,42,0.4); }

        .nav-button:hover { transform: translateY(-3px); }

        main { flex: 1; max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; width: 100%; }

        .sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
            gap: 3rem;
            margin-top: 2rem;
        }

        .section {
            background: rgba(18,19,21,0.6);
            border: 1px solid rgba(189,139,42,0.15);
            border-radius: 12px;
            padding: 2.5rem;
        }

        .resource-card {
            background: rgba(252,251,250,0.05);
            border: 1px solid rgba(189,139,42,0.1);
            border-radius: 8px;
            padding: 1.3rem;
            text-decoration: none;
            color: var(--text);
            display: block;
        }

        .resource-card:hover {
            background: rgba(189,139,42,0.08);
            border-color: var(--accent-gold);
            transform: translateY(-4px);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/" class="logo">學習資源</a>
            <div class="nav-buttons">
                <a href="#language" class="nav-button language">🌐 語言</a>
                <a href="#utility" class="nav-button utility">🛠️ 工具</a>
            </div>
        </div>
    </header>

    <main>
        <div class="sections">
            <div class="section" id="language">
                <h2 style="color:var(--accent-gold); margin-bottom:1.5rem;">語言學習</h2>
                <div id="language-grid"></div>
            </div>

            <div class="section" id="utility">
                <h2 style="color:var(--accent-gold); margin-bottom:1.5rem;">工具資源</h2>
                <div id="utility-grid"></div>
            </div>
        </div>
    </main>

    <footer style="padding:2rem; text-align:center; color:rgba(252,251,250,0.5); font-size:0.9rem;">
        © 2026 學習資源 • 墨玄 ⋅ 硃砂紅 ⋅ 耀日金
    </footer>

    <script>
        // === 資源定義 ===
        const languageResources = [
            { name: "閱讀Brown Bear", path: "Language/閱讀.html", desc: "閱讀工具內含Brown bear" }
            { name: "TOEIC 學習", path: "Language/toeic.html", desc: "學習TOEIC字彙" }
        ];

        const utilityResources = [
            { name: "速讀", path: "Utility/速讀.html", desc: "速讀工具內含愛麗絲夢遊仙境中英文第一章" }
        ];

        // 渲染卡片
        function createCard(res) {
            const card = document.createElement('a');
            card.href = res.path;
            card.className = 'resource-card';
            card.innerHTML = `
                <div style="font-weight:600; margin-bottom:0.5rem;">${res.name}</div>
                <div style="font-size:0.9rem; color:rgba(252,251,250,0.65);">${res.desc}</div>
            `;
            return card;
        }

        document.getElementById('language-grid').append(...languageResources.map(createCard));
        document.getElementById('utility-grid').append(...utilityResources.map(createCard));

        // === PWA Service Worker 註冊 ===
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker 註冊成功'))
                .catch(err => console.log('Service Worker 註冊失敗', err));
        }
    </script>
</body>
</html>
