<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>學習與工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@400;600&display=swap');

  :root{
    --ink: #121315;
    --white-jade: #fcfbfa;
    --vermilion: #942525;
    --gold: #bd8b2a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--ink);
    color: var(--white-jade);
    font-family: 'Noto Serif TC', serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    min-height: 100vh;
    padding: 2.2rem 1.4rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.8rem;
  }

  header .eyebrow {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    margin-bottom: 0.6rem;
  }

  header h1 {
    font-size: 2.5rem;
    font-weight: 900;
    margin: 0;
    letter-spacing: 0.08em;
  }

  /* 印章式分隔線 */
  .seal-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.9rem;
    margin: 2.6rem 0;
  }
  .seal-divider .line {
    flex: 1;
    max-width: 5.5rem;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .seal-divider .line.right { background: linear-gradient(90deg, var(--gold), transparent); }
  .seal-divider .dot {
    width: 0.55rem;
    height: 0.55rem;
    background: var(--vermilion);
    transform: rotate(45deg);
  }

  section.category {
    margin-bottom: 1rem;
  }

  .category h2 {
    font-size: 1.85rem;
    font-weight: 700;
    margin: 0 0 1.1rem 0.2rem;
    color: var(--white-jade);
    border-bottom: 3px solid var(--vermilion);
    display: inline-block;
    padding-bottom: 0.35rem;
  }

  .category.utility h2 {
    border-bottom-color: var(--gold);
  }

  .app-list {
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
  }

  .app-list a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    color: var(--white-jade);
    background: rgba(252, 251, 250, 0.04);
    border: 1.5px solid rgba(189, 139, 42, 0.35);
    border-radius: 4px;
    padding: 1.35rem 1.5rem;
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    min-height: 3.2rem;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .category.language .app-list a:active {
    background: rgba(148, 37, 37, 0.28);
    border-color: var(--vermilion);
  }

  .category.utility .app-list a:active {
    background: rgba(189, 139, 42, 0.22);
    border-color: var(--gold);
  }

  .app-list a .arrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    color: var(--gold);
    margin-left: 0.8rem;
  }

  .category.language .app-list a .arrow { color: var(--vermilion); }

  footer {
    text-align: center;
    margin-top: 3.2rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(252, 251, 250, 0.45);
    letter-spacing: 0.12em;
  }
</style>
</head>
<body>

  <header>
    <span class="eyebrow">STUDY &amp; TOOLS</span>
    <h1>學習與工具</h1>
  </header>

  <section class="category language">
    <h2>語言</h2>
    <div class="app-list">
      <a href="Language/背單字.html">
        <span>背單字_TOEIC</span>
        <span class="arrow">›</span>
      </a>
      <a href="Language/閱讀.html">
        <span>閱讀</span>
        <span class="arrow">›</span>
      </a>
      <a href="Language/toeic.html">
        <span>TOEIC</span>
        <span class="arrow">›</span>
      </a>
    </div>
  </section>

  <div class="seal-divider">
    <span class="line"></span>
    <span class="dot"></span>
    <span class="line right"></span>
  </div>

  <section class="category utility">
    <h2>工具</h2>
    <div class="app-list">
      <a href="Utility/速讀.html">
        <span>速讀</span>
        <span class="arrow">›</span>
      </a>
      <a href="Utility/詩_田園.html">
        <span>詩．田園</span>
        <span class="arrow">›</span>
      </a>
    </div>
  </section>

  <footer>翰墨 · 微光</footer>

</body>
</html>
