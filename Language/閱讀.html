<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>學語言</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --charcoal:#121315;
  --charcoal-2:#1b1d20;
  --charcoal-3:#232529;
  --vermilion:#942525;
  --vermilion-light:#b84a3f;
  --gold:#bd8b2a;
  --gold-light:#d4ac5c;
  --cream:#fcfbfa;
  --cream-dim:#e8e4dc;
  --green:#4caf6d;
  --red:#c94f4f;
  --line:rgba(252,251,250,0.12);
  --line-strong:rgba(252,251,250,0.22);
  --quiz-fr-size:1.70775rem;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--charcoal);
  color:var(--cream);
  font-family:'Noto Serif TC','Inter',serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding-bottom:60px;
}
::selection{background:var(--gold);color:var(--charcoal);}
button{font-family:inherit;cursor:pointer;}
.fr-text{font-family:'Cormorant Garamond','Noto Serif TC',serif;}
.en-text{font-family:'Inter',sans-serif;}

/* ---------- Header (整個頁首固定) ---------- */
header.app-header{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(18,19,21,0.96);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 20px;
  max-width:900px;
  margin:0 auto;
}
.app-title{font-size:1.65rem;font-weight:700;letter-spacing:0.06em;color:var(--cream);}
.header-controls{display:flex;align-items:center;gap:12px;}
.import-btn{
  background:var(--charcoal-3);color:var(--cream);
  border:1px solid var(--line-strong);border-radius:999px;
  padding:9px 18px;font-size:0.85rem;font-weight:600;letter-spacing:0.04em;
  transition:background .2s;white-space:nowrap;
}
.import-btn:active{background:var(--charcoal);}
.import-btn input{display:none;}
.mode-toggle{
  display:flex;border:1px solid var(--line-strong);border-radius:999px;overflow:hidden;
}
.mode-toggle button{
  background:transparent;border:none;color:var(--cream-dim);
  padding:9px 20px;font-size:1rem;font-weight:600;letter-spacing:0.05em;
  transition:background .2s,color .2s;
}
.mode-toggle button.active{background:var(--vermilion);color:var(--cream);}

/* ---------- 學習模式 - 章節選單 (上方) ---------- */
.learn-chapter-wrap{
  padding:10px 20px 6px;
  max-width:900px;
  margin:0 auto;
}
.learn-chapter-wrap select{
  background:var(--charcoal-3);
  color:var(--cream);
  border:1px solid var(--line-strong);
  border-radius:10px;
  padding:11px 14px;
  font-size:1.05rem;
  font-family:'Noto Serif TC',serif;
  -webkit-appearance:none;appearance:none;
  width:100%;
}

/* ---------- 學習模式控制列 (匯入 + 翻譯 + 隱藏詳解) ---------- */
.learn-controls{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:6px 20px 10px;
  max-width:900px;
  margin:0 auto;
  flex-wrap:wrap;
  border-top:1px solid var(--line);
}
.learn-controls .learn-actions{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.learn-controls .learn-actions .translate-btn{
  background:var(--gold);
  color:var(--charcoal);
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-size:0.95rem;
  font-weight:700;
  white-space:nowrap;
}
.learn-controls .learn-actions .translate-btn:active{transform:scale(0.97);}
.learn-controls .toggle-analysis-btn{
  background:var(--charcoal-3);
  color:var(--cream-dim);
  border:1px solid var(--line-strong);
  border-radius:10px;
  padding:10px 16px;
  font-size:0.95rem;
  font-weight:600;
  white-space:nowrap;
}
.learn-controls .toggle-analysis-btn:active{transform:scale(0.97);}
.learn-controls .spacer{flex:1;}

/* ---------- 翻譯區 (固定在 header 內部) ---------- */
.top-panel{
  padding:0 20px 10px;
  max-width:900px;
  margin:0 auto;
  display:block;
}
.top-panel-inner{
  background:var(--charcoal-2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 16px;
  display:flex;
  align-items:flex-start;
  gap:12px;
  min-height:80px;
  max-height:80px;
  overflow-y:auto;
}
.top-panel-text{
  flex:1;
  text-align:right;
  font-size:1.6rem;
  line-height:1.5;
  color:var(--cream-dim);
}
.top-panel-text.placeholder{
  color:rgba(252,251,250,0.35);
  font-size:1rem;
  font-family:'Inter',sans-serif;
}
.top-panel.quiz-mode{display:none;}

/* ---------- 測驗模式過濾列 (僅章節選單) ---------- */
.filter-bar{
  display:flex;
  gap:10px;
  align-items:center;
  padding:10px 20px;
  max-width:900px;
  margin:0 auto;
  border-top:1px solid var(--line);
  flex-wrap:wrap;
}
.quiz-filters{display:flex;gap:10px;width:100%;flex-wrap:wrap;}
.quiz-filters select{flex:1 1 auto;}
.quiz-filters .quiz-type-select{display:none !important;}
.quiz-filters .quiz-chapter-select-wrap{flex:1 1 100%;}
.quiz-filters .quiz-chapter-select-wrap select{
  background:var(--charcoal-3);
  color:var(--cream);
  border:1px solid var(--line-strong);
  border-radius:10px;
  padding:11px 14px;
  font-size:1.05rem;
  font-family:'Noto Serif TC',serif;
  -webkit-appearance:none;appearance:none;
  width:100%;
}
.hidden{display:none !important;}

/* ---------- 測驗頂部欄 ---------- */
.quiz-topbar-inner{
  display:none;
  gap:10px;
  align-items:center;
  padding:8px 20px 10px;
  max-width:900px;
  margin:0 auto;
  border-top:1px solid var(--line);
  flex-wrap:wrap;
}
.quiz-topbar-inner.visible{display:flex;}
.quiz-topbar-inner .quiz-progress{
  font-weight:700;
  color:var(--cream);
  font-size:0.95rem;
  flex:0 0 auto;
}
.quiz-topbar-inner .quiz-actions{
  display:flex;
  align-items:center;
  gap:6px;
  flex:1 1 auto;
  justify-content:flex-end;
}
.quiz-topbar-inner .qa-translate,
.quiz-topbar-inner .qa-next{
  border:none;
  border-radius:8px;
  padding:7px 14px;
  font-size:0.85rem;
  font-weight:600;
  white-space:nowrap;
  cursor:pointer;
}
.quiz-topbar-inner .qa-translate{background:var(--gold);color:var(--charcoal);}
.quiz-topbar-inner .qa-next{background:var(--vermilion);color:var(--cream);}
.quiz-topbar-inner .qa-score{
  font-size:0.95rem;
  font-weight:700;
  color:var(--gold-light);
  padding:0 6px;
  white-space:nowrap;
  min-width:44px;
  text-align:center;
}

/* ---------- Main ---------- */
main{max-width:900px;margin:0 auto;padding:0 20px 40px;}

.section-block{margin-bottom:34px;}
.section-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
  padding-bottom:8px;
  border-bottom:1px solid var(--line);
}
.section-title{font-size:1.1rem;color:var(--gold-light);letter-spacing:0.05em;font-weight:600;}
.mark-read-btn{
  background:transparent;
  border:1px solid var(--line-strong);
  color:var(--cream-dim);
  border-radius:8px;
  padding:7px 14px;
  font-size:0.9rem;
}
.mark-read-btn.read{background:var(--green);border-color:var(--green);color:var(--charcoal);font-weight:700;}

.sentence-card{
  background:var(--charcoal-2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px 18px 14px;
  margin-bottom:14px;
  cursor:pointer;
}
.sentence-card:active{transform:scale(0.99);}
.sentence-row{display:flex;align-items:flex-start;gap:10px;}
.sentence-fr{font-size:1.51875rem;line-height:1.6;flex:1;word-wrap:break-word;user-select:none;}
.sentence-en{display:none;}
.seg-phrase,.seg-word{
  text-decoration:underline;
  text-decoration-color:var(--gold);
  text-underline-offset:5px;
  text-decoration-thickness:1.5px;
  cursor:pointer;
  border-radius:3px;
  padding:0 1px;
  transition:background 0.15s;
}
.seg-phrase{text-decoration-color:var(--vermilion-light);}
.seg-word{text-decoration-color:var(--gold);}
.seg-phrase.selected,.seg-word.selected{background:rgba(189,139,42,0.25);}

.analysis-panel{
  margin-top:16px;
  padding-top:14px;
  border-top:1px dashed var(--line-strong);
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.analysis-row{margin-bottom:8px;font-size:0.95rem;line-height:1.6;}
.analysis-label{color:var(--gold-light);font-weight:600;font-size:0.82rem;letter-spacing:0.04em;display:block;margin-bottom:2px;}
.analysis-en{color:var(--cream);font-family:'Inter',sans-serif;}
.vocab-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.vocab-tag{background:var(--charcoal-3);border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-size:0.85rem;}
.vocab-tag b{color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-weight:700;}
.q-list{margin:4px 0 0 0;padding-left:20px;}
.q-list li{margin-bottom:3px;}

/* 測驗卡片 */
.quiz-wrap{
  max-width:640px;
  margin:0 auto;
  position:relative;
  z-index:30;
  padding-top:6px;
}
.quiz-card{
  background:var(--charcoal-2);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px 20px 18px;
  position:relative;
  min-height:260px;
}
.quiz-card.correct{border-color:var(--green);box-shadow:0 0 0 2px rgba(76,175,109,0.35);}
.quiz-card.wrong{border-color:var(--red);box-shadow:0 0 0 2px rgba(201,79,79,0.35);}
.quiz-question{
  text-align:center;
  font-size:1.6875rem;
  line-height:1.35;
  margin:10px 0 16px;
  min-height:3.7em;
  max-height:3.7em;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:pointer;
}
.quiz-question-inner{
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:2;
  overflow:hidden;
}
.quiz-question .speaker-icon-big{font-size:2.4rem;}
.quiz-question-inner .fr-text{font-size:var(--quiz-fr-size);}
.quiz-opt-inner.fr-text{font-size:var(--quiz-fr-size);}
.quiz-options{display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.quiz-opt{
  background:var(--charcoal-3);
  border:1px solid var(--line-strong);
  border-radius:10px;
  padding:13px 16px;
  font-size:1.5525rem;
  text-align:left;
  color:var(--cream);
  transition:background .15s,border-color .15s;
  display:flex;
  align-items:center;
  overflow:hidden;
}
.quiz-opt.opt-line-1{min-height:2.9em;max-height:2.9em;}
.quiz-opt.opt-line-2{min-height:4.6em;max-height:4.6em;}
.quiz-opt-inner{
  display:-webkit-box;
  -webkit-box-orient:vertical;
  overflow:hidden;
  width:100%;
  line-height:1.3;
}
.quiz-opt.opt-line-1 .quiz-opt-inner{-webkit-line-clamp:1;}
.quiz-opt.opt-line-2 .quiz-opt-inner{-webkit-line-clamp:2;}
.quiz-opt:active{transform:scale(0.99);}
.quiz-opt.correct-answer{border-color:var(--green);background:rgba(76,175,109,0.15);}
.quiz-opt.wrong-answer{border-color:var(--red);background:rgba(201,79,79,0.15);}

.quiz-summary{
  background:var(--charcoal-2);
  border:1px solid var(--line);
  border-radius:18px;
  padding:30px 22px;
  text-align:center;
}
.quiz-score{font-size:3rem;font-weight:900;color:var(--gold-light);font-family:'Cormorant Garamond',serif;}
.quiz-score-label{color:var(--cream-dim);font-size:0.95rem;margin-bottom:6px;}
.wrong-list{text-align:left;margin:20px 0;padding:14px 16px;background:var(--charcoal-3);border-radius:12px;}
.wrong-list-item{padding:8px 0;border-bottom:1px solid var(--line);font-size:1rem;}
.wrong-list-item:last-child{border-bottom:none;}
.wrong-list-item .wfr{font-family:'Cormorant Garamond',serif;font-size:1.2rem;cursor:pointer;color:var(--gold-light);}
.wrong-list-item .wen{color:var(--cream-dim);font-size:0.9rem;font-family:'Inter',sans-serif;}
.summary-actions{display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.summary-actions button{
  border:none;
  border-radius:10px;
  padding:12px 22px;
  font-size:1rem;
  font-weight:700;
}
.btn-retest{background:var(--vermilion);color:var(--cream);}
.btn-next10{background:var(--gold);color:var(--charcoal);}
.all-clear{color:var(--green);font-weight:700;font-size:1.1rem;margin:10px 0;}
</style>
</head>
<body>

<header class="app-header">
  <!-- 頂部 -->
  <div class="header-top">
    <div class="app-title">學語言</div>
    <div class="header-controls">
      <div class="mode-toggle">
        <button id="btn-mode-learn" class="active">學習</button>
        <button id="btn-mode-quiz">測驗</button>
      </div>
    </div>
  </div>

  <!-- 學習模式 - 章節下拉選單 (上方) -->
  <div id="learn-chapter-wrap" class="learn-chapter-wrap">
    <select id="learn-chapter-select"></select>
  </div>

  <!-- 學習模式控制列 (匯入 + 翻譯 + 隱藏詳解) 在章節下方 -->
  <div id="learn-controls" class="learn-controls">
    <div class="learn-actions">
      <label class="import-btn">📂 匯入 JSON <input type="file" id="jsonFileInput" accept=".json"></label>
      <button id="top-translate-btn" class="translate-btn">🌐 翻譯</button>
    </div>
    <div class="learn-actions">
      <button id="toggle-analysis-btn" class="toggle-analysis-btn">隱藏詳解</button>
    </div>
  </div>

  <!-- 翻譯區 (在 header 內部，與 header 一起固定) -->
  <div id="top-panel" class="top-panel">
    <div class="top-panel-inner">
      <div id="top-panel-text" class="top-panel-text placeholder">點擊片語、字詞或整句朗讀圖示，這裡會顯示對應的翻譯內容。</div>
    </div>
  </div>

  <!-- 測驗模式過濾列 (僅章節選單，無題型) -->
  <div id="filter-bar" class="filter-bar">
    <div id="sel-mode-quiz" class="quiz-filters hidden">
      <div class="quiz-chapter-select-wrap">
        <select id="quiz-chapter-select" class="chapter-select"></select>
      </div>
    </div>
  </div>

  <!-- 測驗頂部欄 -->
  <div id="quiz-topbar-inner" class="quiz-topbar-inner">
    <div class="quiz-progress" id="quiz-progress-inner">0/0</div>
    <div class="quiz-actions">
      <button class="qa-translate" id="qa-translate-inner">🌐 翻譯</button>
      <button class="qa-next" id="qa-next-inner">下一題</button>
      <span class="qa-score" id="qa-score-inner">0%</span>
    </div>
  </div>
</header>

<main id="main-learn"></main>
<main id="main-quiz" class="hidden"></main>

let DATA = null;
function loadDefaultData() { DATA = JSON.parse(JSON.stringify(DEFAULT_DATA)); }

// 匯入 JSON
function setupFileInput(inputId) {
  document.getElementById(inputId).addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        let raw = ev.target.result;
        if (raw.charCodeAt(0) === 0xFEFF) raw = raw.substring(1);
        let imported = JSON.parse(raw);
        if (imported.chapters && Array.isArray(imported.chapters)) {
          DATA = imported;
          rebuildBanks();
          populateChapterSelects();
          state.learnChapterFilter = "all";
          state.quizChapterFilter = "all";
          document.getElementById("learn-chapter-select").value = "all";
          document.getElementById("quiz-chapter-select").value = "all";
          saveState();
          if (mode === 'learn') renderLearn();
          else renderQuiz();
          quizRound = null;
          collapseAllAnalysis();
          alert("✅ 匯入成功！已載入 " + DATA.chapters.length + " 個章節。");
        } else alert("❌ 無效的 JSON 格式：缺少 chapters 陣列。");
      } catch(err) { alert("❌ JSON 解析錯誤：" + err.message); console.error(err); }
      e.target.value = '';
    };
    reader.readAsText(file);
  });
}

// ============================================================
// 語言偵測 - fr 優先於 en
// ============================================================
const LANG_FIELDS = ['fr', 'en', 'zh', 'ja', 'es', 'de', 'it', 'pt', 'ru', 'ar', 'ko', 'vi', 'th'];

function detectOriginalField(s) {
  for (const f of LANG_FIELDS) { if (s[f]) return f; }
  return 'en';
}
function detectTranslationField(s, originalField) {
  for (const f of LANG_FIELDS) { if (f !== originalField && s[f]) return f; }
  return originalField;
}
function getOriginalText(s) { const f = detectOriginalField(s); return s[f] || ''; }
function getTranslationText(s) {
  const orig = detectOriginalField(s);
  const trans = detectTranslationField(s, orig);
  return s[trans] || '';
}
function getOriginalLang(s) { return detectOriginalField(s); }
function getTranslationLang(s) {
  const orig = detectOriginalField(s);
  return detectTranslationField(s, orig);
}

// ============================================================
// 檢查斷句是否為自動生成的
// ============================================================
function isAutoGeneratedSegment(seg, originalLang) {
  let hasTranslation = false;
  for (const f of LANG_FIELDS) {
    if (f !== originalLang && seg[f] && seg[f].trim()) {
      hasTranslation = true;
      break;
    }
  }
  if (hasTranslation) return false;
  if (seg.note && seg.note.trim()) return false;
  return true;
}

// ============================================================
// 剪貼簿功能
// ============================================================
function copyToClipboard(text) {
  if (!text) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}

// ============================================================
// Google 翻譯
// ============================================================
function openGoogleTranslate(text, targetLang) {
  if (!text) return;
  copyToClipboard(text);
  const langMap = {
    'fr': 'fr', 'en': 'en', 'zh': 'zh-TW',
    'ja': 'ja', 'es': 'es', 'de': 'de', 'it': 'it',
    'pt': 'pt', 'ru': 'ru', 'ar': 'ar', 'ko': 'ko',
    'vi': 'vi', 'th': 'th'
  };
  const tl = langMap[targetLang] || 'en';
  const encoded = encodeURIComponent(text);
  const url = "https://translate.google.com/?sl=auto&tl=" + tl + "&text=" + encoded + "&op=translate";
  const isAndroid = /Android/i.test(navigator.userAgent);
  if(isAndroid){
    const intentUrl = "intent://translate.google.com/?sl=auto&tl=" + tl + "&text=" + encoded + "&op=translate"
      + "#Intent;scheme=https;package=com.google.android.apps.translate;S.browser_fallback_url="
      + encodeURIComponent(url) + ";end";
    window.location.href = intentUrl;
  } else {
    window.open(url, "_blank");
  }
}

// ============================================================
// 自動生成斷句
// ============================================================
function generateSegments(text) {
  if (!text) return [];
  const segments = [];
  let buffer = '';
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === ' ' || ch === ',' || ch === '.' || ch === '?' || ch === '!' || ch === ';' || ch === ':') {
      if (buffer.trim()) {
        segments.push({ t: buffer.trim(), type: 'phrase' });
        buffer = '';
      }
      if (ch === ',' || ch === '.' || ch === '?' || ch === '!' || ch === ';' || ch === ':') {
        segments.push({ t: ch, type: 'plain' });
      }
      if (ch === ' ' && i < text.length - 1 && text[i + 1] !== ' ') {
        segments.push({ t: ' ', type: 'plain' });
      }
    } else {
      buffer += ch;
    }
  }
  if (buffer.trim()) {
    segments.push({ t: buffer.trim(), type: 'phrase' });
  }
  if (segments.length === 0) {
    segments.push({ t: text.trim(), type: 'phrase' });
  }
  return segments;
}

function ensureSegments(sentence) {
  if (sentence.segments && sentence.segments.length > 0) {
    const origLang = getOriginalLang(sentence);
    let hasAnyTranslationOrNote = false;
    for (const seg of sentence.segments) {
      if (seg.type === 'phrase' || seg.type === 'word') {
        for (const f of LANG_FIELDS) {
          if (f !== origLang && seg[f] && seg[f].trim()) {
            hasAnyTranslationOrNote = true;
            break;
          }
        }
        if (seg.note && seg.note.trim()) hasAnyTranslationOrNote = true;
        if (hasAnyTranslationOrNote) break;
      }
    }
    if (!hasAnyTranslationOrNote) {
      return { ...sentence, _autoSegments: true };
    }
    return sentence;
  }
  const original = getOriginalText(sentence);
  const segs = generateSegments(original);
  return { ...sentence, segments: segs, _autoSegments: true };
}

function allSections(){
  if (!DATA || !DATA.chapters) return [];
  const list = [];
  DATA.chapters.forEach(ch => {
    if (ch.sections) ch.sections.forEach(sec => list.push({chapter:ch, section:sec}));
  });
  return list;
}
function isSectionRead(secId){ return !!state.readSections[secId]; }

// ============================================================
// 建立測驗題庫
// ============================================================
function buildBanks(){
  const words = [], sentences = [], segments = [], seen = new Set();
  allSections().forEach(({section}) => {
    if (section.sentences) {
      section.sentences.forEach(s => {
        const enriched = ensureSegments(s);
        const origLang = getOriginalLang(enriched);
        const transLang = getTranslationLang(enriched);
        enriched.originalLang = origLang;
        enriched.translationLang = transLang;
        enriched.original = getOriginalText(enriched);
        enriched.translation = getTranslationText(enriched);
        enriched.sectionId = section.id;
        enriched.kind = "sentence";
        sentences.push(enriched);

        if (enriched.segments && enriched.segments.length > 0) {
          enriched.segments.forEach((seg, idx) => {
            if (seg.type === "phrase" || seg.type === "word") {
              const segText = seg.t.trim();
              let segTrans = '';
              for (const f of LANG_FIELDS) {
                if (f !== origLang && seg[f]) { segTrans = seg[f]; break; }
              }
              if (segText && segTrans) {
                const key = segText + '|' + segTrans;
                if (!seen.has(key)) {
                  seen.add(key);
                  segments.push({
                    id: s.id + '-seg-' + idx,
                    original: segText,
                    translation: segTrans,
                    originalLang: origLang,
                    translationLang: transLang,
                    sectionId: section.id,
                    kind: "segment",
                    sentenceId: s.id,
                    note: seg.note || ''
                  });
                }
              }
            }
          });
        }

        (s.vocab||[]).forEach(v => {
          const o = detectOriginalField(v);
          const t = detectTranslationField(v, o);
          const key = (v[o]||'') + '|' + (v[t]||'');
          if (!seen.has(key)) {
            seen.add(key);
            words.push({
              id:"w-"+seen.size, original: v[o]||'', translation: v[t]||'',
              originalLang: o, translationLang: t, sectionId: section.id, kind: "word"
            });
          }
        });
      });
    }
  });
  return { words, sentences, segments };
}
let BANKS = buildBanks();
function rebuildBanks() { BANKS = buildBanks(); }

let voiceMap = {};
function pickVoices(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  const map = { 'fr':'fr-FR', 'en':'en-US', 'zh':'zh-TW', 'ja':'ja-JP', 'es':'es-ES', 'de':'de-DE', 'it':'it-IT', 'pt':'pt-PT', 'ru':'ru-RU', 'ar':'ar-SA', 'ko':'ko-KR', 'vi':'vi-VN', 'th':'th-TH' };
  for (const [lang, tag] of Object.entries(map)) {
    voiceMap[lang] = voices.find(v => v.lang && v.lang.toLowerCase().startsWith(tag.toLowerCase().substring(0,2))) || null;
  }
}
if(window.speechSynthesis){ pickVoices(); window.speechSynthesis.onvoiceschanged = pickVoices; }
function speakText(text, lang){
  if(!window.speechSynthesis || !text) return;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    const map = { 'fr':'fr-FR', 'en':'en-US', 'zh':'zh-TW', 'ja':'ja-JP', 'es':'es-ES', 'de':'de-DE', 'it':'it-IT', 'pt':'pt-PT', 'ru':'ru-RU', 'ar':'ar-SA', 'ko':'ko-KR', 'vi':'vi-VN', 'th':'th-TH' };
    u.lang = map[lang] || 'en-US';
    if(voiceMap[lang]) u.voice = voiceMap[lang];
    u.rate = 0.92;
    window.speechSynthesis.speak(u);
  }, 30);
}

function renderSentenceCard(s){
  const card = document.createElement("div");
  card.className = "sentence-card";
  card.dataset.sentenceId = s.id;
  
  card.addEventListener("click", function(e) {
    if (e.target.classList.contains('seg-phrase') || e.target.classList.contains('seg-word')) return;
    speakText(s.original, s.originalLang);
    copyToClipboard(s.original);
    setTopPanel(s.original, s.translation, s.originalLang, s.translationLang);
  });
  
  const row = document.createElement("div"); row.className = "sentence-row";
  const frDiv = document.createElement("div");
  const lang = s.originalLang;
  frDiv.className = "sentence-fr " + (lang === 'fr' ? 'fr-text' : (lang === 'en' ? 'en-text' : ''));
  
  if (s.segments && Array.isArray(s.segments) && s.segments.length > 0) {
    s.segments.forEach((seg, idx) => {
      if (seg.type === "plain") {
        frDiv.appendChild(document.createTextNode(seg.t));
      } else {
        const span = document.createElement("span");
        span.className = seg.type === "phrase" ? "seg-phrase" : "seg-word";
        span.textContent = seg.t;
        span.dataset.segIdx = idx;
        span.addEventListener("click", (e) => {
          e.stopPropagation();
          onSegmentClick(span, s, idx);
        });
        frDiv.appendChild(span);
      }
    });
  } else {
    frDiv.textContent = s.original;
  }
  
  row.appendChild(frDiv); 
  card.appendChild(row);
  const enDiv = document.createElement("div"); enDiv.className = "sentence-en"; enDiv.textContent = s.translation; card.appendChild(enDiv);
  const ac = document.createElement("div"); ac.className = "analysis-container"; card.appendChild(ac);
  return card;
}

function onSegmentClick(span, s, idx){
  const seg = s.segments[idx];
  const segText = seg.t.trim();
  if (!segText) return;
  const lang = s.originalLang;
  if (isAutoGeneratedSegment(seg, lang)) {
    speakText(segText, lang);
    copyToClipboard(segText);
    setTopPanel(segText, '', lang, s.translationLang);
    return;
  }
  if(selectedSegmentEl){ selectedSegmentEl.classList.remove("selected"); }
  span.classList.add("selected"); selectedSegmentEl = span;
  speakText(segText, lang);
  copyToClipboard(segText);
  let segTrans = '';
  for (const f of LANG_FIELDS) {
    if (f !== lang && seg[f]) { segTrans = seg[f]; break; }
  }
  if (!segTrans) segTrans = '';
  setTopPanel(segText, segTrans || '', lang, s.translationLang);
  const card = span.closest(".sentence-card");
  const container = card.querySelector(".analysis-container");
  container.innerHTML = "";
  const panel = document.createElement("div"); panel.className = "analysis-panel";
  panel.appendChild(analysisRow("片語 / 字詞", `<span style="font-size:1.1rem;">${escapeHtml(segText)}</span>${segTrans ? ' — <span class="analysis-en">' + escapeHtml(segTrans) + '</span>' : ''}`));
  if(seg.note) panel.appendChild(analysisRow("說明", `<span class="analysis-en">${escapeHtml(seg.note)}</span>`));
  if(s.syntax) panel.appendChild(analysisRow("句法結構", `<span class="analysis-en">${escapeHtml(s.syntax)}</span>`));
  if(s.grammar) panel.appendChild(analysisRow("語法重點", `<span class="analysis-en">${escapeHtml(s.grammar)}</span>`));
  if(s.culture) panel.appendChild(analysisRow("文化 / 語境註釋", `<span class="analysis-en">${escapeHtml(s.culture)}</span>`));
  if(s.questions && s.questions.length > 0) {
    const qRow = document.createElement("div"); qRow.className = "analysis-row";
    qRow.innerHTML = `<span class="analysis-label">理解性問題</span>`;
    const ul = document.createElement("ul"); ul.className = "q-list analysis-en";
    s.questions.forEach(q => { const li=document.createElement("li"); li.textContent=q; ul.appendChild(li); });
    qRow.appendChild(ul); panel.appendChild(qRow);
  }
  if(s.vocab && s.vocab.length > 0) {
    const vRow = document.createElement("div"); vRow.className = "analysis-row";
    vRow.innerHTML = `<span class="analysis-label">詞彙總結</span>`;
    const tagWrap = document.createElement("div"); tagWrap.className = "vocab-tags";
    s.vocab.forEach(v => {
      const tag = document.createElement("span"); tag.className = "vocab-tag";
      const o = detectOriginalField(v); const t = detectTranslationField(v, o);
      tag.innerHTML = `<b>${escapeHtml(v[o]||'')}</b> — ${escapeHtml(v[t]||'')}`;
      tagWrap.appendChild(tag);
    });
    vRow.appendChild(tagWrap); panel.appendChild(vRow);
  }
  container.appendChild(panel);
}
function analysisRow(label, html){ const d=document.createElement("div"); d.className="analysis-row"; d.innerHTML=`<span class="analysis-label">${label}</span>${html}`; return d; }
function escapeHtml(str){ const d=document.createElement("div"); d.textContent=str; return d.innerHTML; }

// ============================================================
// 測驗模式
// ============================================================
let quizRound = null;
let currentQ = null;

function getEligibleSections(filter){
  const secs = allSections().map(x => x.section);
  if(filter === "all") return secs.map(s=>s.id);
  if(filter === "read") return secs.filter(s=>isSectionRead(s.id)).map(s=>s.id);
  return [filter];
}
function getPool(){
  const ids = getEligibleSections(state.quizChapterFilter || "all");
  const allItems = [];
  BANKS.sentences.forEach(s => { if (ids.includes(s.sectionId)) allItems.push(s); });
  BANKS.segments.forEach(seg => { if (ids.includes(seg.sectionId)) allItems.push(seg); });
  BANKS.words.forEach(w => { if (ids.includes(w.sectionId)) allItems.push(w); });
  return allItems;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(a,n){ if(a.length<=n){ const out=[]; while(out.length<n) out.push(a[Math.floor(Math.random()*a.length)]); return out; } return shuffle(a).slice(0,n); }
function pickQType(){ return ["original_to_translation", "translation_to_original", "listen"][Math.floor(Math.random()*3)]; }

function buildQuestion(item, poolSameKind){
  const qtype = pickQType();
  const origLang = item.originalLang || 'en';
  const transLang = item.translationLang || 'en';
  const original = item.original || '';
  const translation = item.translation || '';
  let question = { item, qtype, origLang, transLang, original, translation };

  if(qtype === "original_to_translation"){
    question.promptType = "text-original";
    question.promptText = original;
    const distractors = sample(poolSameKind.filter(x => x.id !== item.id), 3);
    const opts = shuffle([item, ...distractors]).map(it => ({ text: it.translation || it.original, itemId: it.id }));
    question.options = opts;
    question.displayLang = origLang;
  } else if(qtype === "translation_to_original"){
    question.promptType = "text-translation";
    question.promptText = translation || original;
    const distractors = sample(poolSameKind.filter(x => x.id !== item.id), 3);
    const opts = shuffle([item, ...distractors]).map(it => ({ text: it.original, itemId: it.id }));
    question.options = opts;
    question.displayLang = 'en';
  } else {
    question.promptType = "speaker";
    const showOriginal = Math.random() < 0.5;
    question.optShowOriginal = showOriginal;
    if (showOriginal) {
      question.promptText = translation || original;
      const distractors = sample(poolSameKind.filter(x => x.id !== item.id), 3);
      const opts = shuffle([item, ...distractors]).map(it => ({ text: it.original, itemId: it.id }));
      question.options = opts;
      question.answerDisplayText = original;
      question.answerDisplayLang = origLang;
      question.displayLang = 'en';
    } else {
      question.promptText = original;
      const distractors = sample(poolSameKind.filter(x => x.id !== item.id), 3);
      const opts = shuffle([item, ...distractors]).map(it => ({ text: it.translation || it.original, itemId: it.id }));
      question.options = opts;
      question.answerDisplayText = translation || original;
      question.answerDisplayLang = 'en';
      question.displayLang = origLang;
    }
  }
  question.correctIndex = question.options.findIndex(o => o.itemId === item.id);
  question.userAnswerIndex = null;
  question.answered = false;
  return question;
}

function startNewRound(specificItems, isRetest){
  const pool = getPool();
  const poolSame = pool;
  let items = specificItems || sample(pool, Math.min(10, pool.length) || 0);
  if(pool.length < 10 && pool.length > 0) items = sample(pool, 10);
  const questions = items.map(it => buildQuestion(it, poolSame));
  quizRound = { questions, currentIndex:0, correctCount:0, answeredCount:0, finished:false, isRetest:!!isRetest };
  currentQ = null;
}
function resetQuizRound(){ quizRound = null; }

function renderQuiz(){
  mainQuiz.innerHTML = "";
  const pool = getPool();
  if(pool.length === 0){
    const empty = document.createElement("div");
    empty.style.textAlign="center"; empty.style.color="var(--cream-dim)"; empty.style.padding="40px 0";
    empty.textContent = "此篩選條件下沒有可測驗的內容。";
    mainQuiz.appendChild(empty);
    return;
  }
  if(!quizRound) startNewRound();
  if(quizRound.finished) renderQuizSummary();
  else renderQuizQuestion();
}

function renderQuizQuestion(){
  const q = quizRound.questions[quizRound.currentIndex];
  currentQ = q;
  updateInnerTopbar(q);
  const wrap = document.createElement("div"); wrap.className = "quiz-wrap";
  const card = document.createElement("div"); card.className = "quiz-card";
  if(q.answered) card.classList.add(q.userAnswerIndex === q.correctIndex ? "correct" : "wrong");
  const qDiv = document.createElement("div"); qDiv.className = "quiz-question";
  let innerHtml;
  if(!q.answered){
    if(q.promptType === "speaker") innerHtml = `<span class="speaker-icon-big">🔊</span>`;
    else if(q.promptType === "text-original"){ const cls = q.origLang === 'fr' ? 'fr-text' : (q.origLang === 'en' ? 'en-text' : ''); innerHtml = `<span class="${cls}">${escapeHtml(q.promptText)}</span>`; }
    else innerHtml = `<span class="en-text">${escapeHtml(q.promptText)}</span>`;
  } else {
    if(q.promptType === "speaker"){ const displayText = q.optShowOriginal ? q.translation || q.original : q.original; const displayLang = q.optShowOriginal ? 'en' : q.origLang; const cls = displayLang === 'fr' ? 'fr-text' : (displayLang === 'en' ? 'en-text' : ''); innerHtml = `<span class="${cls}">${escapeHtml(displayText)}</span>`; }
    else if(q.promptType === "text-original"){ const cls = q.origLang === 'fr' ? 'fr-text' : (q.origLang === 'en' ? 'en-text' : ''); innerHtml = `<span class="${cls}">${escapeHtml(q.promptText)}</span>`; }
    else innerHtml = `<span class="en-text">${escapeHtml(q.promptText)}</span>`;
  }
  qDiv.innerHTML = `<span class="quiz-question-inner">${innerHtml}</span>`;
  qDiv.addEventListener("click", ()=>{ speakText(q.original, q.origLang); copyToClipboard(q.original); });
  card.appendChild(qDiv);

  if(!q.answered && !q._played && q.promptType === "speaker"){
    q._played = true;
    setTimeout(()=> { speakText(q.original, q.origLang); copyToClipboard(q.original); }, 400);
  }

  const optionsDiv = document.createElement("div"); optionsDiv.className = "quiz-options";
  const lineClass = (q.item.kind === "sentence" || q.item.kind === "segment") ? "opt-line-2" : "opt-line-1";
  q.options.forEach((opt, idx) => {
    const btn = document.createElement("button"); btn.className = "quiz-opt " + lineClass;
    const isOrig = (q.optShowOriginal === true || q.promptType === "text-original");
    const displayLang = isOrig ? q.origLang : 'en';
    const cls = displayLang === 'fr' ? 'fr-text' : (displayLang === 'en' ? 'en-text' : '');
    btn.innerHTML = `<span class="quiz-opt-inner ${cls}"></span>`;
    btn.querySelector(".quiz-opt-inner").textContent = opt.text;
    if(q.answered){
      if(idx === q.correctIndex) btn.classList.add("correct-answer");
      else if(idx === q.userAnswerIndex) btn.classList.add("wrong-answer");
    }
    btn.addEventListener("click", ()=>{
      if(q.answered){ speakText(q.original, q.origLang); copyToClipboard(q.original); return; }
      submitAnswer(idx);
    });
    optionsDiv.appendChild(btn);
  });
  card.appendChild(optionsDiv);
  wrap.appendChild(card);
  mainQuiz.appendChild(wrap);
}

function updateInnerTopbar(q){
  if(!q) return;
  const progressEl = document.getElementById("quiz-progress-inner");
  const scoreEl = document.getElementById("qa-score-inner");
  const translateBtn = document.getElementById("qa-translate-inner");
  const nextBtn = document.getElementById("qa-next-inner");
  if(!q.answered) progressEl.textContent = (quizRound.currentIndex+1) + "/" + quizRound.questions.length;
  else progressEl.textContent = quizRound.correctCount + "/" + quizRound.questions.length;
  const pct = Math.round((quizRound.correctCount / quizRound.questions.length) * 100);
  scoreEl.textContent = pct + "%";
  translateBtn.onclick = function(){ const targetLang = q.transLang || 'en'; openGoogleTranslate(q.original, targetLang); };
  nextBtn.textContent = q.answered ? "下一題" : "跳過";
  nextBtn.onclick = nextQuestion;
}

function submitAnswer(idx){
  const q = quizRound.questions[quizRound.currentIndex];
  q.userAnswerIndex = idx; q.answered = true;
  quizRound.answeredCount++;
  if(idx === q.correctIndex) quizRound.correctCount++;
  speakText(q.original, q.origLang);
  copyToClipboard(q.original);
  renderQuiz();
}
function nextQuestion(){
  if(quizRound.currentIndex < quizRound.questions.length - 1) quizRound.currentIndex++;
  else quizRound.finished = true;
  renderQuiz();
}

function renderQuizSummary(){
  document.getElementById("quiz-topbar-inner").classList.remove("visible");
  const wrong = quizRound.questions.filter(q => q.userAnswerIndex !== q.correctIndex);
  const score = Math.round((quizRound.correctCount / quizRound.questions.length) * 100);
  const wrap = document.createElement("div"); wrap.className = "quiz-wrap";
  const box = document.createElement("div"); box.className = "quiz-summary";
  const label = document.createElement("div"); label.className = "quiz-score-label";
  label.textContent = quizRound.isRetest ? "重測結果" : "本次測驗得分";
  box.appendChild(label);
  const scoreEl = document.createElement("div"); scoreEl.className = "quiz-score";
  scoreEl.textContent = score; box.appendChild(scoreEl);
  if(wrong.length === 0){
    const clear = document.createElement("div"); clear.className = "all-clear";
    clear.textContent = "🎉 全數消滅，答對所有題目！"; box.appendChild(clear);
  } else {
    const listWrap = document.createElement("div"); listWrap.className = "wrong-list";
    wrong.forEach(q => {
      const item = document.createElement("div"); item.className = "wrong-list-item";
      const fr = document.createElement("div"); fr.className = "wfr";
      fr.textContent = q.original;
      const lang = q.origLang;
      fr.style.fontFamily = lang === 'fr' ? "'Cormorant Garamond',serif" : (lang === 'en' ? "'Inter',sans-serif" : '');
      fr.addEventListener("click", ()=> { speakText(q.original, lang); copyToClipboard(q.original); });
      const en = document.createElement("div"); en.className = "wen";
      en.textContent = q.translation || q.original;
      const tag = document.createElement("span");
      tag.style.cssText = "display:inline-block;font-size:0.7rem;color:var(--gold-light);background:var(--charcoal-3);padding:2px 8px;border-radius:4px;margin-right:8px;";
      tag.textContent = q.item.kind === "sentence" ? "句子" : (q.item.kind === "segment" ? "片語" : "單詞");
      item.appendChild(tag);
      item.appendChild(fr);
      item.appendChild(en);
      listWrap.appendChild(item);
    });
    box.appendChild(listWrap);
  }
  const actions = document.createElement("div"); actions.className = "summary-actions";
  if(wrong.length > 0){
    const retestBtn = document.createElement("button"); retestBtn.className = "btn-retest";
    retestBtn.textContent = "重測錯題 (" + wrong.length + ")";
    retestBtn.addEventListener("click", ()=>{
      const wrongItems = wrong.map(q => q.item);
      startNewRound(wrongItems, true);
      document.getElementById("quiz-topbar-inner").classList.add("visible");
      renderQuiz();
    });
    actions.appendChild(retestBtn);
  }
  const nextBtn = document.createElement("button"); nextBtn.className = "btn-next10";
  nextBtn.textContent = "下 10 題";
  nextBtn.addEventListener("click", ()=>{ startNewRound(); document.getElementById("quiz-topbar-inner").classList.add("visible"); renderQuiz(); });
  actions.appendChild(nextBtn);
  box.appendChild(actions);
  wrap.appendChild(box);
  mainQuiz.appendChild(wrap);
}

// ============================================================
// INIT
// ============================================================
loadDefaultData();
setupFileInput("jsonFileInput");
rebuildBanks();
populateChapterSelects();

// 初始顯示學習模式
document.getElementById("learn-chapter-wrap").style.display = "block";
document.getElementById("learn-controls").style.display = "flex";
document.getElementById("filter-bar").style.display = "none";
document.getElementById("sel-mode-quiz").classList.add("hidden");
renderLearn();
</script>
