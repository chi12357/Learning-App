<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>法文學習 · Les Trois Petits Cochons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --charcoal:#121315;
  --charcoal-2:#1b1d20;
  --charcoal-3:#232529;
  --vermilion:#942525;
  --vermilion-light:#b84a3f;
  --gold:#bd8b2a;
  --gold-light:#d4ac5c;
  --cream:#fcfbfa;
  --cream-dim:#e8e4dc;
  --green:#4caf6d;
  --red:#c94f4f;
  --line:rgba(252,251,250,0.12);
  --line-strong:rgba(252,251,250,0.22);
  --quiz-fr-size:1.70775rem;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--charcoal);
  color:var(--cream);
  font-family:'Noto Serif TC','Inter',serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding-bottom:60px;
}
::selection{background:var(--gold);color:var(--charcoal);}
button{font-family:inherit;cursor:pointer;}
.fr-text{font-family:'Cormorant Garamond','Noto Serif TC',serif;}
.en-text{font-family:'Inter',sans-serif;}

/* ---------- Header ---------- */
header.app-header{
  position:sticky;top:0;z-index:50;
  background:rgba(18,19,21,0.96);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  max-width:900px;margin:0 auto;
}
.app-title{
  font-size:1.65rem;font-weight:700;letter-spacing:0.06em;
  color:var(--cream);
}
.mode-toggle{
  display:flex;border:1px solid var(--line-strong);border-radius:999px;overflow:hidden;
}
.mode-toggle button{
  background:transparent;border:none;color:var(--cream-dim);
  padding:9px 20px;font-size:1rem;font-weight:600;letter-spacing:0.05em;
  transition:background .2s,color .2s;
}
.mode-toggle button.active{
  background:var(--vermilion);color:var(--cream);
}

/* ---------- Filter bar ---------- */
.filter-bar{
  display:flex;gap:10px;align-items:center;
  padding:10px 20px;max-width:900px;margin:0 auto;
  border-top:1px solid var(--line);
}
.filter-bar select{
  background:var(--charcoal-3);
  color:var(--cream);
  border:1px solid var(--line-strong);
  border-radius:10px;
  padding:11px 14px;
  font-size:1.05rem;
  font-family:'Noto Serif TC',serif;
  -webkit-appearance:none;appearance:none;
}
.sel-mode-learn{display:flex;gap:10px;width:100%;}
.filter-bar .sel-mode-learn select{flex:1 1 auto;width:auto;}
.filter-bar .quiz-filters{display:flex;gap:6px;width:100%;}
.filter-bar .quiz-type-select{flex:1 1 0;min-width:0;}
.filter-bar .quiz-section-select{flex:1 1 0;min-width:0;}
.filter-bar .quiz-speed-select{flex:1 1 0;min-width:0;}
.quiz-filters select{padding:11px 6px;font-size:0.92rem;text-overflow:ellipsis;}
.hidden{display:none !important;}
.toggle-analysis-btn{
  flex:0 0 auto;
  background:var(--charcoal-3);color:var(--cream-dim);
  border:1px solid var(--line-strong);border-radius:10px;
  padding:11px 14px;font-size:0.95rem;font-weight:600;white-space:nowrap;
}
.toggle-analysis-btn:active{transform:scale(0.97);}

/* ---------- Top translation panel (learn mode only, part of sticky header) ---------- */
.top-panel{
  padding:10px 20px 14px;
  max-width:900px;margin:0 auto;
}
.top-panel-inner{
  background:var(--charcoal-2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px 18px;
  display:flex;align-items:flex-start;gap:12px;
  min-height:118px;max-height:118px;overflow-y:auto;
}
.top-panel-text{
  flex:1;text-align:right;
  font-size:1.35rem;line-height:1.55;
  color:var(--cream-dim);
}
.top-panel-text.placeholder{
  color:rgba(252,251,250,0.35);font-size:1rem;font-family:'Inter',sans-serif;
}
.translate-btn{
  flex:0 0 auto;
  background:var(--gold);color:var(--charcoal);
  border:none;border-radius:10px;
  padding:10px 14px;font-size:0.95rem;font-weight:700;
  white-space:nowrap;
}
.translate-btn:active{transform:scale(0.97);}

/* ---------- Main content ---------- */
main{max-width:900px;margin:0 auto;padding:18px 20px 40px;}

.section-block{
  margin-bottom:34px;
}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-bottom:8px;
  border-bottom:1px solid var(--line);
}
.section-title{
  font-size:1.1rem;color:var(--gold-light);letter-spacing:0.05em;font-weight:600;
}
.mark-read-btn{
  background:transparent;border:1px solid var(--line-strong);color:var(--cream-dim);
  border-radius:8px;padding:7px 14px;font-size:0.9rem;
}
.mark-read-btn.read{
  background:var(--green);border-color:var(--green);color:var(--charcoal);font-weight:700;
}

.sentence-card{
  background:var(--charcoal-2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px 18px 14px;
  margin-bottom:14px;
}
.sentence-row{
  display:flex;align-items:flex-start;gap:10px;
}
.speaker-btn{
  flex:0 0 auto;background:transparent;border:1px solid var(--line-strong);
  color:var(--gold-light);border-radius:50%;width:38px;height:38px;
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;
}
.speaker-btn:active{transform:scale(0.93);}
.sentence-fr{
  font-size:1.51875rem;line-height:1.6;flex:1;
}
.sentence-en{
  margin-top:8px;margin-left:48px;
  font-size:1rem;color:var(--cream-dim);font-family:'Inter',sans-serif;
  opacity:0.85;
}
.seg-phrase,.seg-word{
  text-decoration:underline;text-decoration-color:var(--gold);
  text-underline-offset:5px;text-decoration-thickness:1.5px;
  cursor:pointer;border-radius:3px;padding:0 1px;
}
.seg-phrase{text-decoration-color:var(--vermilion-light);}
.seg-word{text-decoration-color:var(--gold);}
.seg-phrase.selected,.seg-word.selected{background:rgba(189,139,42,0.25);}

/* Analysis panel */
.analysis-panel{
  margin-top:16px;padding-top:14px;border-top:1px dashed var(--line-strong);
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.analysis-row{margin-bottom:8px;font-size:0.95rem;line-height:1.6;}
.analysis-label{
  color:var(--gold-light);font-weight:600;font-size:0.82rem;
  letter-spacing:0.04em;display:block;margin-bottom:2px;
}
.analysis-en{color:var(--cream);font-family:'Inter',sans-serif;}
.vocab-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.vocab-tag{
  background:var(--charcoal-3);border:1px solid var(--line);
  border-radius:8px;padding:4px 9px;font-size:0.85rem;
}
.vocab-tag b{color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-weight:700;}
.q-list{margin:4px 0 0 0;padding-left:20px;}
.q-list li{margin-bottom:3px;}

/* ---------- Quiz mode ---------- */
.quiz-wrap{
  max-width:640px;margin:0 auto;
  position:sticky;top:var(--sticky-top,110px);z-index:30;
}
.quiz-card{
  background:var(--charcoal-2);border:1px solid var(--line);
  border-radius:18px;padding:22px 20px 20px;
  position:relative;min-height:280px;
}
.quiz-card.correct{border-color:var(--green);box-shadow:0 0 0 2px rgba(76,175,109,0.35);}
.quiz-card.wrong{border-color:var(--red);box-shadow:0 0 0 2px rgba(201,79,79,0.35);}
.quiz-topbar{
  display:flex;align-items:center;justify-content:space-between;
  min-height:34px;margin-bottom:10px;
}
.quiz-progress{font-weight:700;color:var(--cream);font-size:1rem;}
.quiz-correct-count{font-weight:700;color:var(--green);font-size:1.1rem;}
.quiz-actions{
  position:absolute;left:50%;top:16px;transform:translateX(-50%);
  display:flex;gap:8px;
}
.quiz-actions button{
  border:none;border-radius:8px;padding:8px 14px;font-size:0.85rem;font-weight:600;
}
.quiz-actions .qa-translate{background:var(--gold);color:var(--charcoal);}
.quiz-timer{
  position:absolute;left:50%;top:16px;transform:translateX(-50%);
  font-weight:700;font-size:1rem;color:var(--gold-light);
  font-variant-numeric:tabular-nums;
}
.quiz-timer.low{color:var(--red);}
.quiz-actions .qa-next{background:var(--vermilion);color:var(--cream);}
.quiz-question{
  text-align:center;font-size:1.6875rem;line-height:1.35;
  margin:26px 0 24px;min-height:3.7em;max-height:3.7em;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  cursor:pointer;
}
.quiz-question-inner{
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;
}
.quiz-question .speaker-icon-big{font-size:2.4rem;}
.quiz-question-inner .fr-text{font-size:var(--quiz-fr-size);}
.quiz-opt-inner.fr-text{font-size:var(--quiz-fr-size);}
.quiz-options{display:flex;flex-direction:column;gap:10px;}
.quiz-opt{
  background:var(--charcoal-3);border:1px solid var(--line-strong);
  border-radius:10px;padding:13px 16px;font-size:1.5525rem;text-align:left;color:var(--cream);
  transition:background .15s,border-color .15s;
  display:flex;align-items:center;overflow:hidden;
}
.quiz-opt.opt-line-1{min-height:2.9em;max-height:2.9em;}
.quiz-opt.opt-line-2{min-height:4.6em;max-height:4.6em;}
.quiz-opt-inner{
  display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;width:100%;line-height:1.3;
}
.quiz-opt.opt-line-1 .quiz-opt-inner{-webkit-line-clamp:1;}
.quiz-opt.opt-line-2 .quiz-opt-inner{-webkit-line-clamp:2;}
.quiz-opt:active{transform:scale(0.99);}
.quiz-opt.correct-answer{border-color:var(--green);background:rgba(76,175,109,0.15);}
.quiz-opt.wrong-answer{border-color:var(--red);background:rgba(201,79,79,0.15);}

.quiz-summary{
  background:var(--charcoal-2);border:1px solid var(--line);border-radius:18px;
  padding:30px 22px;text-align:center;
}
.quiz-score{font-size:3rem;font-weight:900;color:var(--gold-light);font-family:'Cormorant Garamond',serif;}
.quiz-score-label{color:var(--cream-dim);font-size:0.95rem;margin-bottom:6px;}
.wrong-list{text-align:left;margin:20px 0;padding:14px 16px;background:var(--charcoal-3);border-radius:12px;}
.wrong-list-item{padding:8px 0;border-bottom:1px solid var(--line);font-size:1rem;}
.wrong-list-item:last-child{border-bottom:none;}
.wrong-list-item .wfr{font-family:'Cormorant Garamond',serif;font-size:1.2rem;cursor:pointer;color:var(--gold-light);}
.wrong-list-item .wen{color:var(--cream-dim);font-size:0.9rem;font-family:'Inter',sans-serif;}
.summary-actions{display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.summary-actions button{
  border:none;border-radius:10px;padding:12px 22px;font-size:1rem;font-weight:700;
}
.btn-retest{background:var(--vermilion);color:var(--cream);}
.btn-next10{background:var(--gold);color:var(--charcoal);}
.all-clear{color:var(--green);font-weight:700;font-size:1.1rem;margin:10px 0;}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="app-title">法文學習</div>
    <div class="mode-toggle">
      <button id="btn-mode-learn" class="active">學習</button>
      <button id="btn-mode-quiz">測驗</button>
    </div>
  </div>
  <div class="filter-bar">
    <div id="sel-mode-learn" class="sel-mode-learn">
      <select id="learn-chapter-select"></select>
      <button id="toggle-analysis-btn" class="toggle-analysis-btn">隱藏詳解</button>
    </div>
    <div id="sel-mode-quiz" class="quiz-filters hidden">
      <select id="quiz-type-select" class="quiz-type-select">
        <option value="all">全部</option>
        <option value="fr2en">法翻英</option>
        <option value="en2fr">英翻法</option>
        <option value="listen">法文音聽</option>
      </select>
      <select id="quiz-chapter-select" class="quiz-section-select"></select>
      <select id="quiz-speed-select" class="quiz-speed-select">
        <option value="unlimited">不限時</option>
        <option value="slow">慢100</option>
        <option value="medium">中150</option>
        <option value="fast">快225</option>
      </select>
    </div>
  </div>
  <div id="top-panel" class="top-panel">
    <div class="top-panel-inner">
      <div id="top-panel-text" class="top-panel-text placeholder">點擊片語、字詞或整句朗讀圖示，這裡會顯示對應的翻譯內容。</div>
      <button id="top-translate-btn" class="translate-btn">🌐 翻譯</button>
    </div>
  </div>
</header>

<main id="main-learn"></main>
<main id="main-quiz" class="hidden"></main>

  }catch(e){}
  return { readSections:{}, learnChapterFilter:"all", quizChapterFilter:"all", quizTypeFilter:"all", quizSpeedFilter:"unlimited", lastReadSectionId:null };
}

  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}

/* =========================================================
   HELPERS: sections, sentences, vocab & sentence banks
   ========================================================= */
function allSections(){
  const list = [];
  DATA.chapters.forEach(ch => ch.sections.forEach(sec => list.push({chapter:ch, section:sec})));
  return list;
}
function isSectionRead(secId){ return !!state.readSections[secId]; }

function cleanPhraseText(t){
  return t.replace(/^[\s,;:.!?«»]+|[\s,;:.!?«»]+$/g, "");
}

function buildBanks(){
  const words = [];
  const phrases = [];
  const sentences = [];
  const wordSeen = new Set();
  const phraseSeen = new Set();
  allSections().forEach(({section}) => {
    section.sentences.forEach(s => {
      sentences.push({ id:s.id, fr:s.fr.replace(/«|»/g,"").trim(), en:s.en, sectionId:section.id, kind:"sentence" });
      (s.vocab||[]).forEach(v => {
        const key = v.fr+"|"+v.en;
        if(!wordSeen.has(key)){
          wordSeen.add(key);
          words.push({ id:"w-"+wordSeen.size, fr:v.fr, en:v.en, sectionId:section.id, kind:"word" });
        }
      });
      (s.segments||[]).forEach(seg => {
        if(seg.type !== "phrase" || !seg.en) return;
        const fr = cleanPhraseText(seg.t);
        const en = cleanPhraseText(seg.en);
        if(!fr || !en) return;
        const key = fr+"|"+en;
        if(!phraseSeen.has(key)){
          phraseSeen.add(key);
          phrases.push({ id:"p-"+phraseSeen.size, fr, en, sectionId:section.id, kind:"phrase" });
        }
      });
    });
  });
  return { words, phrases, sentences };
}
const BANKS = buildBanks();

let frVoice = null;
function pickFrenchVoice(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  frVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("fr")) || null;
}
if(window.speechSynthesis){
  pickFrenchVoice();
  window.speechSynthesis.onvoiceschanged = pickFrenchVoice;
  // keep speech synthesis alive on some browsers
  setInterval(()=>{ if(window.speechSynthesis.speaking){ window.speechSynthesis.pause(); window.speechSynthesis.resume(); } }, 4000);
}
function speakFrench(text){
  if(!window.speechSynthesis || !text) return;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "fr-FR";
    if(frVoice) u.voice = frVoice;
    u.rate = 0.92;
    window.speechSynthesis.speak(u);
  }, 30);
}

/* =========================================================
   CLIPBOARD + GOOGLE TRANSLATE
   ========================================================= */
function copyToClipboard(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}
function translateAndOpen(text){
  if(!text) return;
  copyToClipboard(text);
  const encoded = encodeURIComponent(text);
  const webUrl = "https://translate.google.com/?sl=fr&tl=en&text=" + encoded + "&op=translate";
  const isAndroid = /Android/i.test(navigator.userAgent);
  if(isAndroid){
    // Android: use an intent URI so Chrome hands off to the installed Google Translate app
    // (package com.google.android.apps.translate) if present, falling back to the web page otherwise.
    const intentUrl = "intent://translate.google.com/?sl=fr&tl=en&text=" + encoded + "&op=translate"
      + "#Intent;scheme=https;package=com.google.android.apps.translate;S.browser_fallback_url="
      + encodeURIComponent(webUrl) + ";end";
    window.location.href = intentUrl;
  } else {
    // iOS / desktop: navigating directly to translate.google.com lets the OS hand off to the
    // Google Translate app via Universal Links if it's installed; otherwise it opens the web page.
    window.open(webUrl, "_blank");
  }
}

function renderLearn(){
  mainLearn.innerHTML = "";
  const filter = state.learnChapterFilter;
  allSections().forEach(({chapter, section}) => {
    if(filter === "read" && !isSectionRead(section.id)) return;
    if(filter !== "all" && filter !== "read" && filter !== section.id) return;

    const block = document.createElement("div");
    block.className = "section-block";

    const header = document.createElement("div");
    header.className = "section-header";
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = chapter.title + " · " + section.title;
    const markBtn = document.createElement("button");
    markBtn.className = "mark-read-btn" + (isSectionRead(section.id) ? " read" : "");
    markBtn.textContent = isSectionRead(section.id) ? "✓ 已讀" : "標記已讀";
    markBtn.addEventListener("click", ()=>{
      state.readSections[section.id] = !state.readSections[section.id];
      if(state.readSections[section.id]){
        state.lastReadSectionId = section.id;
      }
      saveState();
      renderLearn();
    });
    header.appendChild(title);
    header.appendChild(markBtn);

    section.sentences.forEach(sentence => {
      block.appendChild(renderSentenceCard(sentence, section.id));
    });

    const empty = document.createElement("div");

function renderSentenceCard(sentence, sectionId){
  const card = document.createElement("div");
  card.className = "sentence-card";
  card.dataset.sentenceId = sentence.id;

  const row = document.createElement("div");
  row.className = "sentence-row";

  const speaker = document.createElement("button");
  speaker.className = "speaker-btn";
  speaker.innerHTML = "🔊";
  speaker.title = "朗讀整句";
  speaker.addEventListener("click", (e)=>{
    e.stopPropagation();
    speakFrench(sentence.fr);
    setTopPanel(sentence.fr, sentence.en);
    markLastReadSection(sectionId);
  });

  const frDiv = document.createElement("div");
  frDiv.className = "sentence-fr fr-text";
  sentence.segments.forEach((seg, idx) => {
    if(seg.type === "plain"){
      frDiv.appendChild(document.createTextNode(seg.t));
    } else {
      const span = document.createElement("span");
      span.className = seg.type === "phrase" ? "seg-phrase" : "seg-word";
      span.textContent = seg.t;
      span.addEventListener("click", (e)=>{
        e.stopPropagation();
        onSegmentClick(span, sentence, idx);
        markLastReadSection(sectionId);
      });
      frDiv.appendChild(span);
    }
  });

  row.appendChild(speaker);
  row.appendChild(frDiv);
  card.appendChild(row);

  const enDiv = document.createElement("div");
  enDiv.className = "sentence-en en-text";
  enDiv.textContent = sentence.en;
  card.appendChild(enDiv);

  const analysisContainer = document.createElement("div");
  analysisContainer.className = "analysis-container";
  card.appendChild(analysisContainer);

  return card;
}

function onSegmentClick(span, sentence, segIdx){
  if(selectedSegmentEl){ selectedSegmentEl.classList.remove("selected"); }
  span.classList.add("selected");
  selectedSegmentEl = span;

  const seg = sentence.segments[segIdx];
  speakFrench(seg.t.trim());
  setTopPanel(seg.t.trim(), seg.en || "");

  const card = span.closest(".sentence-card");
  const container = card.querySelector(".analysis-container");
  container.innerHTML = "";
  const panel = document.createElement("div");
  panel.className = "analysis-panel";

  panel.appendChild(analysisRow("片語 / 字詞", `<span class="fr-text" style="font-size:1.1rem;">${escapeHtml(seg.t.trim())}</span> — <span class="analysis-en">${escapeHtml(seg.en||"")}</span>`));
  if(seg.note) panel.appendChild(analysisRow("說明", `<span class="analysis-en">${escapeHtml(seg.note)}</span>`));
  panel.appendChild(analysisRow("句法結構", `<span class="analysis-en">${escapeHtml(sentence.syntax)}</span>`));
  panel.appendChild(analysisRow("語法重點", `<span class="analysis-en">${escapeHtml(sentence.grammar)}</span>`));
  panel.appendChild(analysisRow("文化 / 語境註釋", `<span class="analysis-en">${escapeHtml(sentence.culture)}</span>`));

  const qRow = document.createElement("div");
  qRow.className = "analysis-row";
  qRow.innerHTML = `<span class="analysis-label">理解性問題</span>`;
  const ul = document.createElement("ul");
  ul.className = "q-list analysis-en";
  sentence.questions.forEach(q => { const li=document.createElement("li"); li.textContent=q; ul.appendChild(li); });
  qRow.appendChild(ul);
  panel.appendChild(qRow);

  const vRow = document.createElement("div");
  vRow.className = "analysis-row";
  vRow.innerHTML = `<span class="analysis-label">詞彙總結</span>`;
  const tagWrap = document.createElement("div");
  tagWrap.className = "vocab-tags";
  sentence.vocab.forEach(v => {
    const tag = document.createElement("span");
    tag.className = "vocab-tag";
    tag.innerHTML = `<b class="fr-text">${escapeHtml(v.fr)}</b> — ${escapeHtml(v.en)}`;
    tagWrap.appendChild(tag);
  });
  vRow.appendChild(tagWrap);
  panel.appendChild(vRow);

  container.appendChild(panel);
}

function analysisRow(label, htmlContent){
  const div = document.createElement("div");
  div.className = "analysis-row";
  div.innerHTML = `<span class="analysis-label">${label}</span>${htmlContent}`;
  return div;
}
function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

/* =========================================================

   ========================================================= */
let quizRound = null;
let quizTimerHandle = null;

const SPEED_RATES_CPM = { slow: 100, medium: 150, fast: 150 * 1.5 }; // characters per minute
const QUIZ_TIME_MIN = 4;   // seconds floor, so short words are still answerable
const QUIZ_TIME_MAX = 60;  // seconds ceiling, so long sentences don't run forever

function computeTimeLimit(frText){
  const cpm = SPEED_RATES_CPM[state.quizSpeedFilter];
  if(!cpm) return null; // "unlimited" -> no timer
  const chars = frText.length;
  const seconds = (chars / cpm) * 60;
  return Math.min(QUIZ_TIME_MAX, Math.max(QUIZ_TIME_MIN, Math.round(seconds)));
}

function clearQuizTimer(){
  if(quizTimerHandle){
    clearInterval(quizTimerHandle);
    quizTimerHandle = null;
  }
}

quizRound = {

  questions: [ {item, qtype, options[], correctIndex, userAnswerIndex, correct} ],
  currentIndex: 0,
  correctCount: 0,
  answeredCount: 0,
  finished: false,
  isRetest: false,
  retestSourceWrongItems: []
}

function getEligibleSections(filterValue){
  const secs = allSections().map(x => x.section);
  if(filterValue === "all") return secs.map(s=>s.id);
  if(filterValue === "read") return secs.filter(s=>isSectionRead(s.id)).map(s=>s.id);
  return [filterValue];
}

function getPool(){
  const secIds = getEligibleSections(state.quizChapterFilter);
  const words = BANKS.words.filter(w => secIds.includes(w.sectionId));
  const phrases = BANKS.phrases.filter(p => secIds.includes(p.sectionId));
  const sentences = BANKS.sentences.filter(s => secIds.includes(s.sectionId));
  return words.concat(phrases, sentences);
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function sample(arr, n){
  if(arr.length <= n) {
    // allow repeats if pool smaller than needed
    const out = [];
    while(out.length < n){ out.push(arr[Math.floor(Math.random()*arr.length)]); }
    return out;
  }
  return shuffle(arr).slice(0,n);
}

function pickQType(){
  const f = state.quizTypeFilter;
  if(f !== "all") return f;
  const options = ["fr2en","en2fr","listen"];
  return options[Math.floor(Math.random()*options.length)];
}

function buildOptions(correctItem, poolSameKind, displayLang){
  // displayLang: 'en' or 'fr' -> language of the option text
  const distractorsPool = poolSameKind.filter(x => x.id !== correctItem.id);
  const distractors = sample(distractorsPool, Math.min(3, distractorsPool.length));
  const items = shuffle([correctItem].concat(distractors));
  return items.map(it => ({ text: displayLang==="en" ? it.en : it.fr, itemId: it.id }));
}

function buildQuestion(item, poolByKind){
  const poolSameKind = poolByKind[item.kind] || [];
  const qtype = pickQType();
  let question = { item, qtype };

  if(qtype === "fr2en"){
    question.promptType = "text-fr";
    question.promptText = item.fr;
    question.options = buildOptions(item, poolSameKind, "en");
  } else if(qtype === "en2fr"){
    question.promptType = "text-en";
    question.promptText = item.en;
    question.options = buildOptions(item, poolSameKind, "fr");
  } else { // listen
    question.promptType = "speaker";
    const optLang = Math.random() < 0.5 ? "fr" : "en";
    question.optLang = optLang;
    question.options = buildOptions(item, poolSameKind, optLang);
  }
  question.correctIndex = question.options.findIndex(o => o.itemId === item.id);
  question.userAnswerIndex = null;
  question.answered = false;
  return question;
}

function startNewRound(specificItems, isRetest){
  const pool = getPool();
  const poolByKind = {
    word: pool.filter(p=>p.kind==="word"),
    phrase: pool.filter(p=>p.kind==="phrase"),
    sentence: pool.filter(p=>p.kind==="sentence"),
  };

  let items;
  if(specificItems){
    items = specificItems;
  } else {
    items = sample(pool, Math.min(10, pool.length) || 0);
    if(pool.length < 10 && pool.length > 0){
      items = sample(pool, 10);
    }
  }

  const questions = items.map(it => buildQuestion(it, poolByKind));

  quizRound = {
    questions,
    currentIndex: 0,
    correctCount: 0,
    answeredCount: 0,
    finished: false,
    isRetest: !!isRetest
  };
}

function resetQuizRound(){ quizRound = null; }

function renderQuiz(){
  mainQuiz.innerHTML = "";
  const pool = getPool();
  if(pool.length === 0){
    const empty = document.createElement("div");
    empty.style.textAlign="center"; empty.style.color="var(--cream-dim)"; empty.style.padding="40px 0";
    empty.textContent = "此篩選條件下沒有可測驗的內容。";
    mainQuiz.appendChild(empty);
    return;
  }
  if(!quizRound){ startNewRound(); }
  if(quizRound.finished){
    renderQuizSummary();
  } else {
    renderQuizQuestion();
  }
}

function renderQuizQuestion(){
  clearQuizTimer();
  const wrap = document.createElement("div");
  wrap.className = "quiz-wrap";
  const q = quizRound.questions[quizRound.currentIndex];

  const card = document.createElement("div");
  card.className = "quiz-card";
  if(q.answered) card.classList.add(q.userAnswerIndex === q.correctIndex ? "correct" : "wrong");

  const topbar = document.createElement("div");
  topbar.className = "quiz-topbar";

  const progress = document.createElement("div");
  progress.className = "quiz-progress";
  if(!q.answered){
    progress.textContent = (quizRound.currentIndex+1) + "/" + quizRound.questions.length;
  } else {
    const pct = quizRound.answeredCount > 0 ? Math.round((quizRound.correctCount/quizRound.answeredCount)*100) : 0;
    progress.textContent = quizRound.answeredCount + "  " + pct + "%";
  }

  const correctCount = document.createElement("div");
  correctCount.className = "quiz-correct-count";
  correctCount.textContent = quizRound.correctCount;

  topbar.appendChild(progress);

  if(q.answered){
    const actions = document.createElement("div");
    actions.className = "quiz-actions";
    const tBtn = document.createElement("button");
    tBtn.className = "qa-translate";
    tBtn.textContent = "🌐 Google翻譯";
    tBtn.addEventListener("click", ()=> translateAndOpen(q.item.fr));
    const nBtn = document.createElement("button");
    nBtn.className = "qa-next";
    nBtn.textContent = "下一題";
    nBtn.addEventListener("click", nextQuestion);
    actions.appendChild(tBtn);
    actions.appendChild(nBtn);
    topbar.appendChild(actions);
  } else {
    const timeLimit = computeTimeLimit(q.item.fr);
    if(timeLimit !== null){
      if(q._timeRemaining === undefined) q._timeRemaining = timeLimit;
      const timerEl = document.createElement("div");
      timerEl.className = "quiz-timer";
      timerEl.id = "quiz-timer-display";
      timerEl.textContent = "⏱ " + q._timeRemaining + "s";
      if(q._timeRemaining <= 3) timerEl.classList.add("low");
      topbar.appendChild(timerEl);
    }
  }

  topbar.appendChild(correctCount);
  card.appendChild(topbar);

  const qDiv = document.createElement("div");
  qDiv.className = "quiz-question";
  let qInnerHtml;
  if(!q.answered){
    if(q.promptType === "speaker"){
      qInnerHtml = `<span class="speaker-icon-big">🔊</span>`;
    } else if(q.promptType === "text-fr"){
      qInnerHtml = `<span class="fr-text">${escapeHtml(q.promptText)}</span>`;
    } else {
      qInnerHtml = `<span class="en-text">${escapeHtml(q.promptText)}</span>`;
    }
  } else {
    if(q.promptType === "speaker"){
      const revealText = q.optLang === "fr" ? q.item.en : q.item.fr;
      qInnerHtml = q.optLang === "fr" ? `<span class="en-text">${escapeHtml(revealText)}</span>` : `<span class="fr-text">${escapeHtml(revealText)}</span>`;
    } else if(q.promptType === "text-fr"){
      qInnerHtml = `<span class="fr-text">${escapeHtml(q.promptText)}</span>`;
    } else {
      qInnerHtml = `<span class="en-text">${escapeHtml(q.promptText)}</span>`;
    }
  }
  qDiv.innerHTML = `<span class="quiz-question-inner">${qInnerHtml}</span>`;
  qDiv.addEventListener("click", ()=>{
    if(q.answered){ speakFrench(q.item.fr); }
    else if(q.promptType === "text-fr" || q.promptType === "speaker"){ speakFrench(q.item.fr); }
  });
  card.appendChild(qDiv);

  // auto play audio for fr2en and listen prompts when first shown
  if(!q.answered && !q._played && (q.promptType === "text-fr" || q.promptType === "speaker")){
    q._played = true;
    setTimeout(()=> speakFrench(q.item.fr), 200);
  }

  const optionsDiv = document.createElement("div");
  optionsDiv.className = "quiz-options";
  const lineClass = (q.item.kind === "sentence" || q.item.kind === "phrase") ? "opt-line-2" : "opt-line-1";
  q.options.forEach((opt, idx) => {
    const btn = document.createElement("button");
    btn.className = "quiz-opt " + lineClass;
    const langClass = (q.promptType === "en2fr" || (q.promptType==="speaker" && q.optLang==="fr")) ? "fr-text" : "en-text";
    btn.innerHTML = `<span class="quiz-opt-inner ${langClass}"></span>`;
    btn.querySelector(".quiz-opt-inner").textContent = opt.text;
    if(q.answered){
      if(idx === q.correctIndex) btn.classList.add("correct-answer");
      else if(idx === q.userAnswerIndex) btn.classList.add("wrong-answer");
    }
    btn.addEventListener("click", ()=>{
      if(q.answered){
        speakFrench(q.item.fr);
        return;
      }
      submitAnswer(idx);
    });
    optionsDiv.appendChild(btn);
  });
  card.appendChild(optionsDiv);

  wrap.appendChild(card);
  mainQuiz.appendChild(wrap);

  if(!q.answered){
    const timeLimit = computeTimeLimit(q.item.fr);
    if(timeLimit !== null){
      quizTimerHandle = setInterval(()=>{
        q._timeRemaining--;
        const el = document.getElementById("quiz-timer-display");
        if(el){
          el.textContent = "⏱ " + Math.max(0, q._timeRemaining) + "s";
          el.classList.toggle("low", q._timeRemaining <= 3);
        }
        if(q._timeRemaining <= 0){
          clearQuizTimer();
          timeUpAnswer();
        }
      }, 1000);
    }
  }
}

function submitAnswer(idx){
  clearQuizTimer();
  const q = quizRound.questions[quizRound.currentIndex];
  q.userAnswerIndex = idx;
  q.answered = true;
  quizRound.answeredCount++;
  if(idx === q.correctIndex) quizRound.correctCount++;
  speakFrench(q.item.fr);
  copyToClipboard(q.item.fr);
  renderQuiz();
}

function timeUpAnswer(){
  const q = quizRound.questions[quizRound.currentIndex];
  if(q.answered) return;
  q.userAnswerIndex = -1;
  q.answered = true;
  quizRound.answeredCount++;
  speakFrench(q.item.fr);
  copyToClipboard(q.item.fr);
  renderQuiz();
}

function nextQuestion(){
  if(quizRound.currentIndex < quizRound.questions.length - 1){
    quizRound.currentIndex++;
  } else {
    quizRound.finished = true;
  }
  renderQuiz();
}

function renderQuizSummary(){
  const wrong = quizRound.questions.filter(q => q.userAnswerIndex !== q.correctIndex);
  const score = Math.round((quizRound.correctCount / quizRound.questions.length) * 100);

  const wrap = document.createElement("div");
  wrap.className = "quiz-wrap";
  const box = document.createElement("div");
  box.className = "quiz-summary";

  const label = document.createElement("div");
  label.className = "quiz-score-label";
  label.textContent = quizRound.isRetest ? "重測結果" : "本次測驗得分";
  box.appendChild(label);

  const scoreEl = document.createElement("div");
  scoreEl.className = "quiz-score";
  scoreEl.textContent = score;
  box.appendChild(scoreEl);

  if(wrong.length === 0){
    const clear = document.createElement("div");
    clear.className = "all-clear";
    clear.textContent = "🎉 全數消滅，答對所有題目！";
    box.appendChild(clear);
  } else {
    const listWrap = document.createElement("div");
    listWrap.className = "wrong-list";
    wrong.forEach(q => {
      const item = document.createElement("div");
      item.className = "wrong-list-item";
      const fr = document.createElement("div");
      fr.className = "wfr fr-text";
      fr.textContent = q.item.fr;
      fr.addEventListener("click", ()=> speakFrench(q.item.fr));
      const en = document.createElement("div");
      en.className = "wen";
      en.textContent = q.item.en;
      item.appendChild(fr);
      item.appendChild(en);
      listWrap.appendChild(item);
    });
    box.appendChild(listWrap);
  }

  const actions = document.createElement("div");
  actions.className = "summary-actions";

  if(wrong.length > 0){
    const retestBtn = document.createElement("button");
    retestBtn.className = "btn-retest";
    retestBtn.textContent = "重測錯題 (" + wrong.length + ")";
    retestBtn.addEventListener("click", ()=>{
      const wrongItems = wrong.map(q => q.item);
      startNewRound(wrongItems, true);
      renderQuiz();
    });
    actions.appendChild(retestBtn);
  }

  const nextBtn = document.createElement("button");
  nextBtn.className = "btn-next10";
  nextBtn.textContent = "下 10 題";
  nextBtn.addEventListener("click", ()=>{
    startNewRound();
    renderQuiz();
  });
  actions.appendChild(nextBtn);

  box.appendChild(actions);
  wrap.appendChild(box);
  mainQuiz.appendChild(wrap);
}

/* =========================================================
   INIT
   ========================================================= */
if(state.lastReadSectionId){
  const validIds = allSections().map(x => x.section.id);
  if(validIds.includes(state.lastReadSectionId)){
    state.learnChapterFilter = state.lastReadSectionId;
  }
}
populateChapterSelects();
renderLearn();
updateStickyTop();
</script>
