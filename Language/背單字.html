<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>商用詞彙 · TOEIC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#121315;
    --ink-card:#1b1c1e;
    --ink-card-2:#232427;
    --vermilion:#942525;
    --gold:#bd8b2a;
    --jade:#3f7a5c;
    --white:#fcfbfa;
    --white-dim:#fcfbfa99;
    --white-faint:#fcfbfa4d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--ink);
    color:var(--white);
    font-family:'Inter',sans-serif;
    overscroll-behavior:none;
  }
  body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 24px 14px;
    flex-shrink:0;
  }
  .title-zh{
    font-family:'Noto Serif TC',serif;
    font-size:22px;
    font-weight:600;
    letter-spacing:0.08em;
  }
  .title-zh span{
    color:var(--gold);
  }
  .seal{
    width:56px;height:56px;border-radius:50%;
    border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;
    font-family:'Noto Serif TC',serif;
    flex-shrink:0;
  }
  .seal .n{font-size:17px;font-weight:700;line-height:1;color:var(--gold);}
  .seal .d{font-size:10px;line-height:1.4;color:var(--white-dim);margin-top:2px;}

  .icon-btn{
    width:44px;height:44px;
    border-radius:50%;
    border:1.5px solid var(--white-faint);
    background:transparent;
    color:var(--white-dim);
    font-size:19px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* ---------- Top action ---------- */
  .top-action{
    padding:4px 24px 18px;
    flex-shrink:0;
  }

  /* ---------- Card ---------- */
  .main-area{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6px 20px 20px;
    min-height:0;
  }
  .card{
    width:100%;
    max-width:520px;
    height:100%;
    max-height:640px;
    background:linear-gradient(180deg,var(--ink-card),var(--ink-card-2));
    border:1px solid #fcfbfa14;
    border-radius:22px;
    padding:34px 30px 26px;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    box-shadow:0 20px 50px -20px #00000090;
  }
  .pos-tag{
    align-self:flex-start;
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--ink);
    background:var(--white-dim);
    padding:4px 12px;
    border-radius:100px;
    letter-spacing:0.05em;
  }
  .headword{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:600;
    font-size:60px;
    line-height:1.05;
    border-bottom:2px solid var(--gold);
    display:inline-block;
    padding-bottom:6px;
    width:fit-content;
    margin-bottom:10px;
    cursor:pointer;
  }
  .ipa{
    font-size:18px;
    color:var(--white-dim);
    margin-bottom:26px;
    font-family:'Inter',sans-serif;
  }

  .reveal-btn{
    align-self:flex-start;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    font-family:'Noto Serif TC',serif;
    font-size:16px;
    padding:12px 22px;
    border-radius:100px;
    cursor:pointer;
    margin-bottom:22px;
  }

  .zh-block{display:none;}
  .zh-block.show{display:block;}

  .translation{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:37px;
    color:var(--gold);
    margin-bottom:6px;
    line-height:1.3;
  }
  .definition-en{
    font-size:18px;
    color:var(--white-dim);
    margin-bottom:24px;
    line-height:1.55;
  }

  .section-label{
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--white-faint);
    letter-spacing:0.15em;
    margin-bottom:8px;
    margin-top:4px;
  }

  .example{
    background:#00000030;
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:20px;
    cursor:pointer;
  }
  .example-en{
    font-size:19px;
    line-height:1.6;
    margin-bottom:8px;
  }
  .ex-highlight{
    text-decoration:underline;
    text-decoration-color:var(--gold);
    text-decoration-thickness:2px;
    text-underline-offset:3px;
    font-weight:700;
  }
  .example-zh{
    font-family:'Noto Serif TC',serif;
    font-size:18px;
    color:var(--white-dim);
    line-height:1.7;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
  }
  .chip{
    font-family:'Noto Serif TC',serif;
    font-size:17px;
    padding:6px 4px;
    border-bottom:2px solid var(--vermilion);
    cursor:pointer;
  }
  .chip.syn{border-bottom-color:var(--gold);}
  .chip.ant{border-bottom-color:var(--gold); border-bottom-style:dashed;}

  .root-item{
    display:flex;
    gap:14px;
    align-items:baseline;
    margin-bottom:8px;
    font-family:'Noto Serif TC',serif;
  }
  .root-part{
    color:var(--gold);
    font-weight:700;
    font-size:16px;
    min-width:78px;
    flex-shrink:0;
  }
  .root-meaning{
    color:var(--white-dim);
    font-size:15px;
    line-height:1.5;
  }

  /* ---------- Quiz ---------- */
  .quiz-choices{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-top:14px;
  }
  .quiz-choice-btn{
    width:100%;
    text-align:left;
    padding:20px 22px;
    border-radius:16px;
    border:1.5px solid var(--white-faint);
    background:transparent;
    color:var(--white);
    font-family:'Noto Serif TC',serif;
    font-size:20px;
    cursor:pointer;
  }
  .quiz-choice-btn.correct{
    border-color:var(--gold);
    background:#bd8b2a22;
    color:var(--gold);
  }
  .quiz-choice-btn.wrong{
    border-color:var(--vermilion);
    background:#94252522;
    color:var(--vermilion);
  }
  .quiz-choice-btn:disabled{cursor:default;}

  .quiz-result-block{text-align:center;padding-top:30px;}

  /* ---------- Progress tab ---------- */
  .progress-stats{
    display:flex;
    gap:12px;
    margin-bottom:24px;
  }
  .sim-date-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:16px;
    font-family:'Inter',sans-serif;
    font-size:12px;
    color:var(--white-faint);
  }
  .sim-date-row input[type="date"]{
    background:#00000030;
    border:1px solid var(--white-faint);
    color:var(--white-dim);
    border-radius:8px;
    padding:5px 8px;
    font-size:12px;
    font-family:'Inter',sans-serif;
    color-scheme: dark;
  }
  .sim-date-row button{
    background:transparent;
    border:1px solid var(--white-faint);
    color:var(--white-faint);
    border-radius:8px;
    padding:5px 10px;
    font-size:12px;
    cursor:pointer;
  }
  .stat-item{
    flex:1;
    text-align:center;
    background:#00000030;
    border-radius:14px;
    padding:16px 8px;
  }
  .stat-num{
    font-family:'Noto Serif TC',serif;
    font-size:30px;
    font-weight:700;
    color:var(--gold);
  }
  .stat-label{
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--white-dim);
    margin-top:4px;
  }
  .stepper{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:6px;
  }
  .stepper button{
    width:52px;height:52px;border-radius:50%;
    border:1.5px solid var(--gold);
    background:transparent;
    color:var(--gold);
    font-size:24px;
    cursor:pointer;
  }
  .stepper-value{
    font-family:'Noto Serif TC',serif;
    font-size:26px;
    font-weight:700;
    min-width:36px;
    text-align:center;
  }
  .days-estimate{
    font-family:'Noto Serif TC',serif;
    font-size:14px;
    color:var(--white-dim);
    margin-top:10px;
  }
  .days-estimate .num{
    color:var(--gold);
    font-weight:700;
  }
  .word-status-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 0;
    border-bottom:1px solid #fcfbfa14;
    font-family:'Noto Serif TC',serif;
    font-size:15px;
  }
  .status-badge{
    font-size:12px;
    padding:4px 11px;
    border-radius:100px;
    border:1px solid var(--white-faint);
    color:var(--white-dim);
    white-space:nowrap;
  }
  .status-badge.learning{border-color:var(--vermilion);color:var(--vermilion);}
  .status-badge.remembered{background:var(--jade);border-color:var(--jade);color:var(--ink);}
  .reveal-btn:disabled{opacity:0.4;cursor:default;}

  /* ---------- Nav ---------- */
  .nav-area{
    display:flex;
    gap:14px;
    padding:0 24px 30px;
    flex-shrink:0;
  }
  .nav-area button{
    flex:1;
    padding:20px 0;
    border-radius:16px;
    border:none;
    font-family:'Noto Serif TC',serif;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
    letter-spacing:0.05em;
  }
  #prevBtn{
    background:transparent;
    border:1.5px solid var(--white-faint);
    color:var(--white);
  }
  #nextBtn{
    background:var(--gold);
    color:var(--ink);
  }
  #prevBtn:disabled{opacity:0.3;}
  .nav-area button:disabled{opacity:0.35;cursor:default;}
  #quizNextBtn{
    background:var(--gold);
    color:var(--ink);
  }
  #quizNextBtn:disabled{opacity:0.35;}

  /* ---------- Primary CTA ---------- */
  #startStudyBtn{
    background:var(--gold);
    color:var(--ink);
    border:none;
    font-size:21px;
    font-weight:700;
    padding:24px 0;
    width:100%;
    border-radius:18px;
    box-shadow:0 14px 32px -10px #bd8b2a80;
    margin-top:4px;
    letter-spacing:0.05em;
  }
  #startStudyBtn:disabled{
    opacity:0.35;
    box-shadow:none;
  }

  /* ---------- Answer feedback frame on headword ---------- */
  .headword.answer-correct{
    border:2px solid var(--jade);
    border-bottom:2px solid var(--jade);
    border-radius:12px;
    padding:10px 18px;
  }
  .headword.answer-wrong{
    border:2px solid var(--vermilion);
    border-bottom:2px solid var(--vermilion);
    border-radius:12px;
    padding:10px 18px;
  }

  /* ---------- Remembered tag ---------- */
  .tag-row{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:18px;
  }
  .remembered-tag{
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--ink);
    background:var(--jade);
    padding:4px 12px;
    border-radius:100px;
    letter-spacing:0.05em;
  }

</style>
</head>
<body>

<header>
  <div class="title-zh">商用詞彙 <span>· TOEIC</span></div>
  <div style="display:flex; align-items:center; gap:10px;">
    <button class="icon-btn" id="importJsonBtn" title="匯入詞庫 JSON">📁</button>
    <div class="seal">
      <div class="n" id="idxNum">1</div>
      <div class="d" id="idxTotal">/ 20</div>
    </div>
  </div>
</header>
<input type="file" id="importFileInput" accept="application/json,.json" style="display:none;">

<div class="top-action" id="topAction">
  <button id="startStudyBtn">開始今日學習</button>
</div>

<main class="main-area" id="flashcardMain">
  <div class="card" id="card">
    <div class="tag-row">
      <div class="pos-tag" id="posTag">名詞</div>
      <div class="remembered-tag" id="rememberedTag" style="display:none;">✓ 已記得</div>
    </div>
    <div class="headword" id="headword">—</div>
    <div class="ipa" id="ipa">—</div>

    <div class="quiz-choices" id="studyChoices" style="display:none;"></div>

    <button class="reveal-btn" id="revealBtn">顯示中文翻譯</button>

    <div class="zh-block" id="zhBlock">
      <div class="translation" id="translation">—</div>
      <div class="definition-en" id="definitionEn">—</div>

      <div class="section-label">例句</div>
      <div class="example" id="exampleBox">
        <div class="example-en" id="exampleEn">—</div>
        <div class="example-zh" id="exampleZh">—</div>
      </div>

      <div id="rootsBlock">
        <div class="section-label">字根解析</div>
        <div id="rootsList"></div>
      </div>

      <div id="synBlock">
        <div class="section-label">同義詞</div>
        <div class="chips" id="synChips"></div>
      </div>

      <div id="antBlock">
        <div class="section-label">反義詞</div>
        <div class="chips" id="antChips"></div>
      </div>

      <div id="phraseBlock">
        <div class="section-label">常用片語</div>
        <div class="chips" id="phraseChips"></div>
      </div>
    </div>
  </div>
</main>

<nav class="nav-area" id="flashcardNav">
  <button id="prevBtn">上一個</button>
  <button id="nextBtn">下一個</button>
</nav>

<div class="main-area" id="quizMain" style="display:none;">
  <div class="card" id="quizCard">
    <div class="section-label" id="quizPrompt">看英文，選出正確的中文意思</div>
    <div class="headword" id="quizWord">—</div>

    <div class="quiz-choices" id="quizChoices"></div>

    <div class="quiz-result-block" id="quizResult" style="display:none;">
      <div class="translation" id="quizScoreText">—</div>
      <button class="reveal-btn" id="quizRestartBtn">重新測驗</button>
    </div>
  </div>
</div>

<div class="nav-area" id="quizNav" style="display:none;">
  <button id="quizNextBtn" disabled>下一題</button>
</div>

<div class="main-area" id="progressMain" style="display:none;">
  <div class="card" id="progressCard">
    <div class="section-label">今日進度</div>
    <div class="sim-date-row">
      <span>模擬日期（測試用，之後可能移除）</span>
      <input type="date" id="simDateInput">
      <button id="simDateReset">今天</button>
    </div>
    <div class="progress-stats">
      <div class="stat-item"><div class="stat-num" id="statDue">0</div><div class="stat-label">待複習</div></div>
      <div class="stat-item"><div class="stat-num" id="statNew">0</div><div class="stat-label">新詞</div></div>
      <div class="stat-item"><div class="stat-num" id="statMastered">0</div><div class="stat-label">已記得</div></div>
    </div>

    <div class="section-label" style="margin-top:28px;">每日新詞數量</div>
    <div class="stepper">
      <button id="stepDown">－</button>
      <div class="stepper-value" id="stepValue">5</div>
      <button id="stepUp">＋</button>
    </div>
    <div class="days-estimate" id="daysEstimate">—</div>
    <div class="days-estimate" id="daysEstimateFull">—</div>

    <div class="section-label" style="margin-top:24px;">全部詞彙狀態</div>
    <div id="wordStatusList"></div>

    <button class="reveal-btn" id="resetProgressBtn" style="margin-top:22px;border-color:var(--vermilion);color:var(--vermilion);">重置學習紀錄</button>
  </div>
</div>

<script>
const vocab = [
  {pos:"動詞", word:"negotiate", ipa:"/nɪˈɡoʊʃieɪt/", zh:"談判；協商",
   def:"to discuss something in order to reach an agreement",
   exEn:"Both companies agreed to negotiate a new contract before the deadline.",
   exZh:"兩家公司同意在截止日期前針對新合約進行談判。",
   syn:["discuss","bargain"], phrase:["negotiate a deal","negotiate terms"],
   roots:[{part:"neg-",meaning:"不"},{part:"otium",meaning:"閒暇"}]},
  {pos:"名詞", word:"invoice", ipa:"/ˈɪnvɔɪs/", zh:"發票；請款單",
   def:"a document listing goods or services and requesting payment",
   exEn:"Please send the invoice to the accounting department by Friday.",
   exZh:"請於週五前將發票寄給會計部門。",
   syn:["bill","receipt"], phrase:["issue an invoice","invoice number"]},
  {pos:"動詞", word:"reimburse", ipa:"/ˌriːɪmˈbɜːrs/", zh:"償還；報銷",
   def:"to pay back money that someone has spent",
   exEn:"The company will reimburse employees for approved travel expenses.",
   exZh:"公司將為員工報銷已核准的差旅費用。",
   syn:["repay","compensate"], phrase:["reimburse expenses","get reimbursed"],
   roots:[{part:"re-",meaning:"再次，回"},{part:"im-",meaning:"進入"},{part:"bursa",meaning:"錢包"}]},
  {pos:"名詞", word:"inventory", ipa:"/ˈɪnvəntɔːri/", zh:"存貨；庫存",
   def:"the amount of goods a business currently has in stock",
   exEn:"The warehouse conducts a full inventory check every quarter.",
   exZh:"倉庫每季會進行一次完整的庫存盤點。",
   syn:["stock","supply"], phrase:["inventory check","manage inventory"]},
  {pos:"名詞", word:"deadline", ipa:"/ˈdedlaɪn/", zh:"截止日期",
   def:"the latest time by which something must be finished",
   exEn:"We need to move the deadline because of the shipping delay.",
   exZh:"由於出貨延遲，我們必須調整截止日期。",
   syn:["due date","cutoff"], phrase:["meet a deadline","miss a deadline"]},
  {pos:"名詞", word:"merger", ipa:"/ˈmɜːrdʒər/", zh:"合併",
   def:"the joining of two companies to form one",
   exEn:"The merger between the two firms was finalized last month.",
   exZh:"這兩間公司的合併案於上個月正式完成。",
   syn:["consolidation"], ant:["divestiture"], phrase:["merger agreement","announce a merger"]},
  {pos:"名詞", word:"subsidiary", ipa:"/səbˈsɪdieri/", zh:"子公司",
   def:"a company controlled by another, larger company",
   exEn:"The subsidiary operates independently but reports to headquarters.",
   exZh:"該子公司獨立營運，但需向總部回報。",
   syn:["affiliate"], ant:["parent company"], phrase:["wholly-owned subsidiary"],
   roots:[{part:"sub-",meaning:"在...之下"},{part:"sedere",meaning:"坐，位於"}]},
  {pos:"名詞", word:"revenue", ipa:"/ˈrevənuː/", zh:"營收",
   def:"the total income a business generates from its activities",
   exEn:"Quarterly revenue increased by twelve percent this year.",
   exZh:"今年本季營收成長了百分之十二。",
   syn:["income","earnings"], ant:["expense"], phrase:["revenue growth","generate revenue"],
   roots:[{part:"re-",meaning:"回，再"},{part:"venire",meaning:"來，come"}]},
  {pos:"名詞", word:"contract", ipa:"/ˈkɑːntrækt/", zh:"合約",
   def:"a written agreement that is legally binding",
   exEn:"Both parties signed the contract after weeks of review.",
   exZh:"雙方在審閱數週後簽署了合約。",
   syn:["agreement"], phrase:["sign a contract","breach of contract"],
   roots:[{part:"con-",meaning:"共同，一起"},{part:"tract",meaning:"拉，draw"}]},
  {pos:"名詞", word:"logistics", ipa:"/ləˈdʒɪstɪks/", zh:"物流",
   def:"the planning and handling of the movement of goods",
   exEn:"The logistics team rerouted shipments to avoid the storm.",
   exZh:"物流團隊為避開風暴而重新規劃了出貨路線。",
   syn:["distribution"], phrase:["logistics chain","logistics provider"]},
  {pos:"名詞", word:"procurement", ipa:"/prəˈkjʊrmənt/", zh:"採購",
   def:"the process of obtaining goods or services for a business",
   exEn:"The procurement department negotiates prices with suppliers.",
   exZh:"採購部門負責與供應商協商價格。",
   syn:["purchasing"], phrase:["procurement process","procurement policy"],
   roots:[{part:"pro-",meaning:"向前，為了"},{part:"cur / cura",meaning:"照顧，處理"}]},
  {pos:"形容詞", word:"quarterly", ipa:"/ˈkwɔːrtərli/", zh:"季度的",
   def:"happening or produced once every three months",
   exEn:"The board reviews quarterly reports before making decisions.",
   exZh:"董事會在做決策前會審閱季度報告。",
   syn:[], phrase:["quarterly report","quarterly earnings"]},
  {pos:"名詞", word:"shareholder", ipa:"/ˈʃerhoʊldər/", zh:"股東",
   def:"a person who owns shares in a company",
   exEn:"Shareholders voted to approve the new dividend policy.",
   exZh:"股東們投票通過了新的股利政策。",

function defaultProgress(){
  return { status:'new', streak:0, ease:2.5, interval:0, nextReview: todayStr(), totalAttempts:0, totalCorrect:0 };
}

function updateProgress(word, correct){
  const p = progress[word] ? Object.assign({}, progress[word]) : defaultProgress();
  p.totalAttempts += 1;
  if(correct) p.totalCorrect += 1;

  if(p.status === 'remembered'){
    if(correct){
      p.interval = Math.max(1, Math.round((p.interval || 1) * p.ease));
      p.ease = Math.min(2.8, p.ease + 0.1);
    } else {
      p.status = 'learning';
      p.streak = 0;
      p.interval = 1;
      p.ease = Math.max(1.3, p.ease - 0.2);
    }
  } else {
    if(correct){
      p.streak += 1;
      if(p.streak >= 3){
        p.status = 'remembered';
        p.interval = 4;
        p.ease = Math.min(2.8, p.ease + 0.1);
      } else {
        p.status = 'learning';
        p.interval = p.streak;
      }
    } else {
      p.status = 'learning';
      p.streak = 0;
      p.interval = 1;
      p.ease = Math.max(1.3, p.ease - 0.2);
    }
  }

  const base = new Date(todayStr() + 'T00:00:00');
  const next = new Date(base);
  next.setDate(next.getDate() + p.interval);
  p.nextReview = next.getFullYear() + '-' + String(next.getMonth()+1).padStart(2,'0') + '-' + String(next.getDate()).padStart(2,'0');
  progress[word] = p;
  saveProgress();
}

function getTodayQueue(){
  const today = todayStr();
  const due = vocab.filter(v => {
    const p = progress[v.word];
    return p && (p.status === 'learning' || p.status === 'remembered') && p.nextReview <= today;
  });
  const newOnes = vocab.filter(v => !progress[v.word] || progress[v.word].status === 'new').slice(0, dailyNewCount);
  return due.concat(newOnes);
}

function speak(text){
  try{
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    window.speechSynthesis.speak(utter);
  }catch(e){}
}

function highlightWord(sentence, word){
  const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('\\b(' + escaped + 's?)\\b', 'i');
  return sentence.replace(re, '<span class="ex-highlight">$1</span>');
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------------- Study queue (Ebbinghaus scheduling) ----------------
let queue = [];
let queueIndex = 0;

function estimateFastestDaysToComplete(){
  const today = todayStr();
  const startDate = new Date(today + 'T00:00:00');

  const state = vocab.map(v => {
    const p = progress[v.word];
    if(p && p.status === 'remembered'){
      return { done: true };
    }
    if(p && p.status === 'learning'){
      const nr = new Date(p.nextReview + 'T00:00:00');
      let dueDay = Math.round((nr - startDate) / 86400000) + 1; // 1 = today
      if(dueDay < 1) dueDay = 1;
      return { done: false, streak: p.streak, dueDay: dueDay, started: true };
    }
    return { done: false, streak: 0, dueDay: null, started: false };
  });

  if(state.every(s => s.done)) return 0;

  const maxDays = 3650;
  let day = 1;
  while(day <= maxDays){
    state.forEach(s => {
      if(s.done || !s.started) return;
      if(s.dueDay === day){
        s.streak += 1;
        if(s.streak >= 3){ s.done = true; }
        else { s.dueDay = day + s.streak; }
      }
    });

    let introducedToday = 0;
    for(const s of state){
      if(s.done || s.started) continue;
      if(introducedToday >= dailyNewCount) break;
      s.started = true;
      s.streak = 1;
      s.dueDay = day + 1;
      introducedToday++;
    }

    if(state.every(s => s.done)) return day;
    day++;
  }
  return null;
}

function renderProgressTab(){

  });
  const newWords = vocab.filter(v => !progress[v.word] || progress[v.word].status === 'new');
  const rememberedWords = vocab.filter(v => progress[v.word] && progress[v.word].status === 'remembered');

  $('statDue').textContent = dueWords.length;

    $('daysEstimate').innerHTML = '剩 ' + newWords.length + ' 個新詞未開始，依此速度約 <span class="num">' + daysNeeded + '</span> 天可以學完所有新詞（不含複習到「記得」所需的天數）';
  }

  const fastestDays = estimateFastestDaysToComplete();
  if(fastestDays === 0){

  } else if(fastestDays === null){

  }

  const saved = loadSession();
  const hasSavedSession = saved && saved.queueIndex < saved.queue.length;
  const todayQueue = getTodayQueue();

  if(hasSavedSession){
    const remaining = saved.queue.length - saved.queueIndex;

    $('startStudyBtn').disabled = false;

    $('startStudyBtn').disabled = true;
  }

  const statusLabel = { new:'新詞', learning:'學習中', remembered:'記得' };
  const listEl = $('wordStatusList');
  listEl.innerHTML = '';
  vocab.forEach(v => {
    const p = progress[v.word];
    const status = p ? p.status : 'new';
    const row = document.createElement('div');
    row.className = 'word-status-row';

    const wordSpan = document.createElement('span');
    wordSpan.textContent = v.word;

    const badge = document.createElement('span');
    badge.className = 'status-badge ' + status;
    let badgeText = statusLabel[status];
    if(p && p.totalAttempts > 0){
      badgeText += ' ' + p.totalCorrect + '/' + p.totalAttempts;
    }
    badge.textContent = badgeText;

    row.appendChild(wordSpan);
    row.appendChild(badge);
    listEl.appendChild(row);
  });
}

$('stepDown').addEventListener('click', () => {
  dailyNewCount = Math.max(1, dailyNewCount - 1);
  saveDailyNewCount();
  renderProgressTab();
});

$('stepUp').addEventListener('click', () => {
  dailyNewCount = Math.min(20, dailyNewCount + 1);
  saveDailyNewCount();
  renderProgressTab();
});

$('startStudyBtn').addEventListener('click', () => {
  const saved = loadSession();
  if(saved && saved.queueIndex < saved.queue.length){
    queue = saved.queue.map(item => ({ v: vocab.find(x => x.word === item.word), retried: item.retried }));
    queueIndex = saved.queueIndex;
    studyScore = saved.studyScore;
    studyTotal = saved.studyTotal;
  } else {
    const todayQueue = getTodayQueue();
    if(todayQueue.length === 0) return;
    queue = todayQueue.map(v => ({ v: v, retried: false }));
    queueIndex = 0;
    studyScore = 0;
    studyTotal = 0;
  }
  studyState = 'study';
  $('flashcardMain').style.display = 'flex';
  $('flashcardNav').style.display = 'flex';
  $('quizMain').style.display = 'none';
  $('quizNav').style.display = 'none';
  $('progressMain').style.display = 'none';
  $('topAction').style.display = 'none';
  saveSession();
  renderStudyCard();
});

$('resetProgressBtn').addEventListener('click', () => {
  if(confirm('確定要重置所有學習紀錄嗎？此動作無法復原。')){
    progress = {};
    saveProgress();
    renderProgressTab();
  }
});

$('simDateInput').addEventListener('change', (e) => {
  simulatedDate = e.target.value || null;
  try{
    if(simulatedDate){ localStorage.setItem('toeic_sim_date', simulatedDate); }
    else{ localStorage.removeItem('toeic_sim_date'); }
  }catch(err){}
  renderProgressTab();
});

$('simDateReset').addEventListener('click', () => {
  simulatedDate = null;
  try{ localStorage.removeItem('toeic_sim_date'); }catch(err){}
  renderProgressTab();
});

</script>

</body>
</html>
