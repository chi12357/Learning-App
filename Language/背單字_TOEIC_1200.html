<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>商用詞彙 · TOEIC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#121315;
    --ink-card:#1b1c1e;
    --ink-card-2:#232427;
    --vermilion:#942525;
    --gold:#bd8b2a;
    --jade:#3f7a5c;
    --white:#fcfbfa;
    --white-dim:#fcfbfa99;
    --white-faint:#fcfbfa4d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--ink);
    color:var(--white);
    font-family:'Inter',sans-serif;
    overscroll-behavior:none;
  }
  body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 24px 14px;
    flex-shrink:0;
  }
  .title-zh{
    font-family:'Noto Serif TC',serif;
    font-size:22px;
    font-weight:600;
    letter-spacing:0.08em;
  }
  .title-zh span{
    color:var(--gold);
  }
  .seal{
    width:56px;height:56px;border-radius:50%;
    border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;
    font-family:'Noto Serif TC',serif;
    flex-shrink:0;
  }
  .seal .n{font-size:17px;font-weight:700;line-height:1;color:var(--gold);}
  .seal .d{font-size:10px;line-height:1.4;color:var(--white-dim);margin-top:2px;}

  .icon-btn{
    width:44px;height:44px;
    border-radius:50%;
    border:1.5px solid var(--white-faint);
    background:transparent;
    color:var(--white-dim);
    font-size:19px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* ---------- Top action ---------- */
  .top-action{
    padding:4px 24px 18px;
    flex-shrink:0;
  }

  /* ---------- Card ---------- */
  .main-area{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6px 20px 20px;
    min-height:0;
  }
  .card{
    width:100%;
    max-width:520px;
    height:100%;
    max-height:640px;
    background:linear-gradient(180deg,var(--ink-card),var(--ink-card-2));
    border:1px solid #fcfbfa14;
    border-radius:22px;
    padding:34px 30px 26px;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    box-shadow:0 20px 50px -20px #00000090;
  }
  .glossary-back-bar{
    margin-bottom:16px;
  }
  .glossary-back-bar button{
    background:transparent;
    border:none;
    color:var(--gold);
    font-family:'Noto Serif TC',serif;
    font-size:15px;
    cursor:pointer;
    padding:6px 0;
  }

  .pos-tag{
    align-self:flex-start;
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--ink);
    background:var(--white-dim);
    padding:4px 12px;
    border-radius:100px;
    letter-spacing:0.05em;
  }
  .headword{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:600;
    font-size:60px;
    line-height:1.05;
    border-bottom:2px solid var(--gold);
    display:inline-block;
    padding-bottom:6px;
    width:fit-content;
    margin-bottom:10px;
    cursor:pointer;
  }
  .ipa{
    font-size:18px;
    color:var(--white-dim);
    margin-bottom:26px;
    font-family:'Inter',sans-serif;
  }

  .reveal-btn{
    align-self:flex-start;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    font-family:'Noto Serif TC',serif;
    font-size:16px;
    padding:12px 22px;
    border-radius:100px;
    cursor:pointer;
    margin-bottom:22px;
  }

  .zh-block{display:none;}
  .zh-block.show{display:block;}

  .translation{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:37px;
    color:var(--gold);
    margin-bottom:6px;
    line-height:1.3;
  }
  .definition-en{
    font-size:18px;
    color:var(--white-dim);
    margin-bottom:24px;
    line-height:1.55;
  }

  .section-label{
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--white-faint);
    letter-spacing:0.15em;
    margin-bottom:8px;
    margin-top:4px;
  }

  .example{
    background:#00000030;
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:20px;
    cursor:pointer;
  }
  .example-en{
    font-size:19px;
    line-height:1.6;
    margin-bottom:8px;
  }
  .ex-highlight{
    text-decoration:underline;
    text-decoration-color:var(--gold);
    text-decoration-thickness:2px;
    text-underline-offset:3px;
    font-weight:700;
  }
  .example-zh{
    font-family:'Noto Serif TC',serif;
    font-size:18px;
    color:var(--white-dim);
    line-height:1.7;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
  }
  .phrase-list{
    margin-bottom:20px;
  }
  .phrase-item{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:14px;
    padding:9px 2px;
    border-bottom:1px solid #fcfbfa14;
    cursor:pointer;
    font-family:'Noto Serif TC',serif;
  }
  .phrase-item:last-child{border-bottom:none;}
  .phrase-en{
    font-size:17px;
    border-bottom:2px solid var(--vermilion);
    padding-bottom:2px;
    flex-shrink:0;
  }
  .phrase-zh{
    font-size:15px;
    color:var(--white-dim);
    text-align:right;
  }
  .chip{
    font-family:'Noto Serif TC',serif;
    font-size:17px;
    padding:6px 4px;
    border-bottom:2px solid var(--vermilion);
    cursor:pointer;
  }
  .chip.syn{border-bottom-color:var(--gold);}
  .chip.ant{border-bottom-color:var(--gold); border-bottom-style:dashed;}

  .root-item{
    display:flex;
    gap:14px;
    align-items:baseline;
    margin-bottom:8px;
    font-family:'Noto Serif TC',serif;
  }
  .root-part{
    color:var(--gold);
    font-weight:700;
    font-size:16px;
    min-width:78px;
    flex-shrink:0;
  }
  .root-meaning{
    color:var(--white-dim);
    font-size:15px;
    line-height:1.5;
  }

  /* ---------- Quiz ---------- */
  .quiz-choices{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-top:14px;
  }
  .quiz-choice-btn{
    width:100%;
    text-align:left;
    padding:20px 22px;
    border-radius:16px;
    border:1.5px solid var(--white-faint);
    background:transparent;
    color:var(--white);
    font-family:'Noto Serif TC',serif;
    font-size:20px;
    cursor:pointer;
  }
  .quiz-choice-btn.correct{
    border-color:var(--gold);
    background:#bd8b2a22;
    color:var(--gold);
  }
  .quiz-choice-btn.wrong{
    border-color:var(--vermilion);
    background:#94252522;
    color:var(--vermilion);
  }
  .quiz-choice-btn:disabled{cursor:default;}

  .quiz-result-block{text-align:center;padding-top:30px;}

  /* ---------- Progress tab ---------- */
  .progress-stats{
    display:flex;
    gap:12px;
    margin-bottom:24px;
  }
  .sim-date-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:16px;
    font-family:'Inter',sans-serif;
    font-size:12px;
    color:var(--white-faint);
  }
  .sim-date-row input[type="date"]{
    background:#00000030;
    border:1px solid var(--white-faint);
    color:var(--white-dim);
    border-radius:8px;
    padding:5px 8px;
    font-size:12px;
    font-family:'Inter',sans-serif;
    color-scheme: dark;
  }
  .sim-date-row button{
    background:transparent;
    border:1px solid var(--white-faint);
    color:var(--white-faint);
    border-radius:8px;
    padding:5px 10px;
    font-size:12px;
    cursor:pointer;
  }
  .stat-item{
    flex:1;
    text-align:center;
    background:#00000030;
    border-radius:14px;
    padding:16px 8px;
  }
  .stat-num{
    font-family:'Noto Serif TC',serif;
    font-size:30px;
    font-weight:700;
    color:var(--gold);
  }
  .stat-label{
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--white-dim);
    margin-top:4px;
  }
  .stepper{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:6px;
  }
  .stepper button{
    width:52px;height:52px;border-radius:50%;
    border:1.5px solid var(--gold);
    background:transparent;
    color:var(--gold);
    font-size:24px;
    cursor:pointer;
  }
  .stepper-value{
    font-family:'Noto Serif TC',serif;
    font-size:26px;
    font-weight:700;
    min-width:64px;
    width:64px;
    text-align:center;
    background:transparent;
    border:none;
    border-bottom:1.5px solid var(--white-faint);
    color:var(--white);
    padding:4px 0;
  }
  .stepper-value:focus{
    outline:none;
    border-bottom-color:var(--gold);
  }
  .stepper-value::-webkit-inner-spin-button,
  .stepper-value::-webkit-outer-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .completion-callout{
    background:linear-gradient(135deg, #bd8b2a22, #bd8b2a08);
    border:1.5px solid var(--gold);
    border-radius:16px;
    padding:16px 20px;
    margin-top:18px;
    text-align:center;
  }
  .completion-label{
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--white-dim);
    margin-bottom:6px;
    letter-spacing:0.05em;
  }
  .completion-date{
    font-family:'Noto Serif TC',serif;
    font-size:24px;
    font-weight:700;
    color:var(--gold);
  }

  .days-estimate{
    font-family:'Noto Serif TC',serif;
    font-size:14px;
    color:var(--white-dim);
    margin-top:10px;
  }
  .days-estimate .num{
    color:var(--gold);
    font-weight:700;
  }
  .jump-btn{
    width:52px;height:52px;
    border-radius:50%;
    border:1.5px solid var(--gold);
    background:transparent;
    color:var(--gold);
    font-family:'Noto Serif TC',serif;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    flex-shrink:0;
    margin-left:auto;
  }
  .word-status-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 0;
    border-bottom:1px solid #fcfbfa14;
    font-family:'Noto Serif TC',serif;
    font-size:15px;
    transition:background-color 0.4s ease;
    cursor:pointer;
  }
  .word-status-row.highlight-row{
    background-color:#bd8b2a33;
    border-radius:8px;
    padding-left:8px;
    padding-right:8px;
  }
  .status-badge{
    font-size:12px;
    padding:4px 11px;
    border-radius:100px;
    border:1px solid var(--white-faint);
    color:var(--white-dim);
    white-space:nowrap;
  }
  .status-badge.learning{border-color:var(--vermilion);color:var(--vermilion);}
  .status-badge.remembered{background:var(--jade);border-color:var(--jade);color:var(--ink);}
  .reveal-btn:disabled{opacity:0.4;cursor:default;}

  /* ---------- Nav ---------- */
  .nav-area{
    display:flex;
    gap:14px;
    padding:0 24px 30px;
    flex-shrink:0;
  }
  .nav-area button{
    flex:1;
    padding:20px 0;
    border-radius:16px;
    border:none;
    font-family:'Noto Serif TC',serif;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
    letter-spacing:0.05em;
  }
  #prevBtn{
    background:transparent;
    border:1.5px solid var(--white-faint);
    color:var(--white);
  }
  #nextBtn{
    background:var(--gold);
    color:var(--ink);
  }
  #prevBtn:disabled{opacity:0.3;}
  .nav-area button:disabled{opacity:0.35;cursor:default;}
  #quizNextBtn{
    background:var(--gold);
    color:var(--ink);
  }
  #quizNextBtn:disabled{opacity:0.35;}

  /* ---------- Primary CTA ---------- */
  #startStudyBtn{
    background:var(--gold);
    color:var(--ink);
    border:none;
    font-size:21px;
    font-weight:700;
    padding:24px 0;
    width:100%;
    border-radius:18px;
    box-shadow:0 14px 32px -10px #bd8b2a80;
    margin-top:4px;
    letter-spacing:0.05em;
  }
  #startStudyBtn:disabled{
    opacity:0.35;
    box-shadow:none;
  }

  /* ---------- Answer feedback frame on headword ---------- */
  .headword.answer-correct{
    border:2px solid var(--jade);
    border-bottom:2px solid var(--jade);
    border-radius:12px;
    padding:10px 18px;
  }
  .headword.answer-wrong{
    border:2px solid var(--vermilion);
    border-bottom:2px solid var(--vermilion);
    border-radius:12px;
    padding:10px 18px;
  }

  /* ---------- Remembered tag ---------- */
  .tag-row{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:18px;
  }
  .remembered-tag{
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--ink);
    background:var(--jade);
    padding:4px 12px;
    border-radius:100px;
    letter-spacing:0.05em;
  }
  .lang-info-tag{
    font-family:'Noto Serif TC',serif;
    font-size:13px;
    color:var(--white-dim);
    border:1px solid var(--white-faint);
    padding:3px 11px;
    border-radius:100px;
    letter-spacing:0.05em;
  }

</style>
</head>
<body>

<header>
  <div class="title-zh">商用詞彙 <span>· TOEIC</span></div>
  <div style="display:flex; align-items:center; gap:10px;">
    <button class="icon-btn" id="importJsonBtn" title="匯入詞庫 JSON">📁</button>
    <div class="seal">
      <div class="n" id="idxNum">1</div>
      <div class="d" id="idxTotal">/ 20</div>
    </div>
  </div>
</header>
<input type="file" id="importFileInput" accept="application/json,.json" style="display:none;">

<div class="top-action" id="topAction">
  <button id="startStudyBtn">開始今日學習</button>
</div>

<main class="main-area" id="flashcardMain">
  <div class="card" id="card">
    <div class="glossary-back-bar" id="glossaryBackBar" style="display:none;">
      <button id="glossaryBackBtn">← 返回生字表</button>
    </div>
    <div class="tag-row">
      <div class="pos-tag" id="posTag">名詞</div>
      <div class="lang-info-tag" id="langInfoTag" style="display:none;"></div>
      <div class="remembered-tag" id="rememberedTag" style="display:none;">✓ 已記得</div>
    </div>
    <div class="headword" id="headword">—</div>
    <div class="ipa" id="ipa">—</div>

    <div class="quiz-choices" id="studyChoices" style="display:none;"></div>

    <button class="reveal-btn" id="revealBtn">顯示翻譯</button>

    <div class="zh-block" id="zhBlock">
      <div class="translation" id="translation">—</div>
      <div class="definition-en" id="definitionEn">—</div>

      <div class="section-label">例句</div>
      <div class="example" id="exampleBox">
        <div class="example-en" id="exampleEn">—</div>
        <div class="example-zh" id="exampleZh">—</div>
      </div>

      <div id="rootsBlock">
        <div class="section-label">字根解析</div>
        <div id="rootsList"></div>
      </div>

      <div id="synBlock">
        <div class="section-label">同義詞</div>
        <div class="chips" id="synChips"></div>
      </div>

      <div id="antBlock">
        <div class="section-label">反義詞</div>
        <div class="chips" id="antChips"></div>
      </div>

      <div id="phraseBlock">
        <div class="section-label">常用片語</div>
        <div class="phrase-list" id="phraseChips"></div>
      </div>
    </div>
  </div>
</main>

<nav class="nav-area" id="flashcardNav">
  <button id="prevBtn">上一個</button>
  <button id="nextBtn">下一個</button>
</nav>

<div class="main-area" id="quizMain" style="display:none;">
  <div class="card" id="quizCard">
    <div class="section-label" id="quizPrompt">選出正確的意思</div>
    <div class="headword" id="quizWord">—</div>

    <div class="quiz-choices" id="quizChoices"></div>

    <div class="quiz-result-block" id="quizResult" style="display:none;">
      <div class="translation" id="quizScoreText">—</div>
      <button class="reveal-btn" id="quizRestartBtn">重新測驗</button>
    </div>
  </div>
</div>

<div class="nav-area" id="quizNav" style="display:none;">
  <button id="quizNextBtn" disabled>下一題</button>
</div>

<div class="main-area" id="progressMain" style="display:none;">
  <div class="card" id="progressCard">
    <div class="section-label">今日進度</div>
    <div class="sim-date-row">
      <span>模擬日期（測試用，之後可能移除）</span>
      <input type="date" id="simDateInput">
      <button id="simDateReset">今天</button>
    </div>
    <div class="progress-stats">
      <div class="stat-item"><div class="stat-num" id="statDue">0</div><div class="stat-label">待複習</div></div>
      <div class="stat-item"><div class="stat-num" id="statNew">0</div><div class="stat-label">新詞</div></div>
      <div class="stat-item"><div class="stat-num" id="statMastered">0</div><div class="stat-label">已記得</div></div>
    </div>

    <div class="section-label" style="margin-top:28px;">每日新詞數量</div>
    <div class="stepper">
      <button id="stepDown">－</button>
      <input type="number" class="stepper-value" id="stepValue" min="1" max="100" value="5" inputmode="numeric">
      <button id="stepUp">＋</button>
      <button class="jump-btn" id="jumpTodayBtn" title="跳到今日第一個">詞</button>
    </div>

    <div class="completion-callout" id="completionCallout">
      <div class="completion-label">最快全部學會（記得）日期</div>
      <div class="completion-date" id="completionDate">—</div>
    </div>


    <div class="section-label" style="margin-top:24px;">全部詞彙狀態（點擊查看詳解）</div>
    <div id="wordStatusList"></div>

    <button class="reveal-btn" id="resetProgressBtn" style="margin-top:22px;border-color:var(--vermilion);color:var(--vermilion);">重置學習紀錄</button>
  </div>
</div>

<script>
const vocab = [
  {
    "pos": "動詞",
    "word": "accelerate",
    "ipa": "/əkˈseləreɪt/",
    "zh": "加速；促進",
    "def": "to make something happen faster or earlier",
    "exEn": "The company plans to accelerate its expansion into Asian markets.",
    "exZh": "該公司計畫加速其亞洲市場的擴張。",
    "syn": [
      "hasten",
      "expedite",
      "speed up"
    ],
    "ant": [
      "decelerate",
      "slow down",
      "delay"
    ],
    "phrase": [
      {
        "en": "accelerate growth",
        "zh": "加速成長"
      },
      {
        "en": "accelerate the process",
        "zh": "加速過程"
      }
    ],
    "roots": [
      {
        "part": "ac-",
        "meaning": "向，加強"
      },
      {
        "part": "celer",
        "meaning": "快速"
      }
    ]
  },
  {
    "pos": "動詞",
    "word": "accumulate",
    "ipa": "/əˈkjuːmjəleɪt/",
    "zh": "累積；積聚",
    "def": "to gather together or pile up over time",
    "exEn": "She has accumulated a large collection of antique furniture.",
    "exZh": "她已累積了大量的古董家具收藏。",
    "syn": [
      "amass",
      "collect",
      "gather"
    ],
    "ant": [
      "disperse",
      "scatter",
      "dissipate"
    ],
    "phrase": [
      {
        "en": "accumulate wealth",
        "zh": "累積財富"
      },
      {
        "en": "accumulated experience",
        "zh": "累積的經驗"
      }
    ],
    "roots": [
      {
        "part": "ad-",
        "meaning": "向"
      },
      {
        "part": "cumulus",
        "meaning": "堆積"
      }
    ]
  },
  {
    "pos": "名詞",

const STORAGE_PREFIX = 'toeic_1200_';

function normalizeVocabItem(item){
  return Object.assign({}, item, {
    pos: item.pos || '',
    word: item.word || '',
    ipa: item.ipa || '',
    zh: item.zh || '',
    def: item.def || '',
    exEn: item.exEn || '',
    exZh: item.exZh || '',
    syn: item.syn || [],
    ant: item.ant || [],
    phrase: item.phrase || [],
    roots: item.roots || [],
    gender: item.gender || null,
    conjugation_group: item.conjugation_group || null,
    lang: item.lang || 'en-US'
  });
}

function saveVocab(){
  try{ localStorage.setItem(STORAGE_PREFIX + 'vocab', JSON.stringify(vocab)); }catch(e){}
}

function loadStoredVocab(){
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX + 'vocab');
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(Array.isArray(data) && data.length > 0) return data;
    return null;
  }catch(e){ return null; }
}

const storedVocab = loadStoredVocab();
if(storedVocab){
  vocab.length = 0;
  storedVocab.forEach(item => vocab.push(normalizeVocabItem(item)));
}

let current = 0;
let revealed = false;
let studyState = 'browse'; // 'browse' | 'study' | 'studyComplete'
let studyAnswered = false;
let studyScore = 0;
let studyTotal = 0;
let currentWord = null;
let currentLang = null;

const $ = id => document.getElementById(id);

$('importJsonBtn').addEventListener('click', () => {
  $('importFileInput').click();
});

$('importFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    let data;
    try{
      data = JSON.parse(evt.target.result);
    }catch(err){
      alert('無法解析 JSON 檔案，請確認格式是否正確。');
      e.target.value = '';
      return;
    }
    if(!Array.isArray(data) || data.length === 0){
      alert('JSON 格式不正確，請確認內容是一個詞彙陣列。');
      e.target.value = '';
      return;
    }
    if(confirm('匯入後將取代目前的詞庫（共 ' + data.length + ' 個詞），並清除今日學習進度，確定要繼續嗎？')){
      vocab.length = 0;
      data.forEach(item => vocab.push(normalizeVocabItem(item)));
      saveVocab();
      progress = {};
      saveProgress();
      clearSession();
      queue = [];
      queueIndex = 0;
      studyScore = 0;
      studyTotal = 0;
      current = 0;
      switchTab('progress');
      alert('已匯入 ' + vocab.length + ' 個詞彙！');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

let simulatedDate = localStorage.getItem(STORAGE_PREFIX + 'sim_date') || null;

function todayStr(){
  if(simulatedDate) return simulatedDate;
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX + 'progress');
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveProgress(){
  try{ localStorage.setItem(STORAGE_PREFIX + 'progress', JSON.stringify(progress)); }catch(e){}
}
let progress = loadProgress();
let dailyNewCount = parseInt(localStorage.getItem(STORAGE_PREFIX + 'daily_new')) || 5;
function saveDailyNewCount(){
  try{ localStorage.setItem(STORAGE_PREFIX + 'daily_new', String(dailyNewCount)); }catch(e){}
}

function saveSession(){
  try{
    localStorage.setItem(STORAGE_PREFIX + 'session', JSON.stringify({
      date: todayStr(),
      queue: queue.map(e => ({ word: e.v.word, retried: e.retried })),
      queueIndex: queueIndex,
      studyScore: studyScore,
      studyTotal: studyTotal
    }));
  }catch(e){}
}
function loadSession(){
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX + 'session');
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(data.date !== todayStr()) return null;
    return data;
  }catch(e){ return null; }
}
function clearSession(){
  try{ localStorage.removeItem(STORAGE_PREFIX + 'session'); }catch(e){}
}

function defaultProgress(){
  return { status:'new', streak:0, ease:2.5, interval:0, nextReview: todayStr(), totalAttempts:0, totalCorrect:0 };
}

function updateProgress(word, correct){
  const p = progress[word] ? Object.assign({}, progress[word]) : defaultProgress();
  p.totalAttempts += 1;
  if(correct) p.totalCorrect += 1;

  if(p.status === 'remembered'){
    if(correct){
      p.interval = Math.max(1, Math.round((p.interval || 1) * p.ease));
      p.ease = Math.min(2.8, p.ease + 0.1);
    } else {
      p.status = 'learning';
      p.streak = 0;
      p.interval = 1;
      p.ease = Math.max(1.3, p.ease - 0.2);
    }
  } else {
    if(correct){
      p.streak += 1;
      if(p.streak >= 3){
        p.status = 'remembered';
        p.interval = 4;
        p.ease = Math.min(2.8, p.ease + 0.1);
      } else {
        p.status = 'learning';
        p.interval = p.streak;
      }
    } else {
      p.status = 'learning';
      p.streak = 0;
      p.interval = 1;
      p.ease = Math.max(1.3, p.ease - 0.2);
    }
  }

  const base = new Date(todayStr() + 'T00:00:00');
  const next = new Date(base);
  next.setDate(next.getDate() + p.interval);
  p.nextReview = next.getFullYear() + '-' + String(next.getMonth()+1).padStart(2,'0') + '-' + String(next.getDate()).padStart(2,'0');
  progress[word] = p;
  saveProgress();
}

function getTodayQueue(){
  const today = todayStr();
  const due = vocab.filter(v => {
    const p = progress[v.word];
    return p && (p.status === 'learning' || p.status === 'remembered') && p.nextReview <= today;
  });
  const newOnes = vocab.filter(v => !progress[v.word] || progress[v.word].status === 'new').slice(0, dailyNewCount);
  return due.concat(newOnes);
}

function speak(text, lang){
  try{
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang || 'en-US';
    window.speechSynthesis.speak(utter);
  }catch(e){}
}

function highlightWord(sentence, word){
  const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('\\b(' + escaped + 's?)\\b', 'i');
  return sentence.replace(re, '<span class="ex-highlight">$1</span>');
}

function setLangInfoTag(v){
  const parts = [];
  if(v.gender) parts.push(v.gender);
  if(v.conjugation_group) parts.push(v.conjugation_group);
  const tag = $('langInfoTag');
  if(parts.length){
    tag.textContent = parts.join(' · ');
    tag.style.display = 'inline-block';
  } else {
    tag.style.display = 'none';
  }
}

function fillCardContent(v){
  $('posTag').textContent = v.pos;
  currentWord = v.word;
  currentLang = v.lang;
  $('headword').textContent = v.word;
  $('ipa').textContent = v.ipa;
  $('translation').textContent = v.zh;
  $('definitionEn').textContent = v.def;

  const p = progress[v.word];
  $('rememberedTag').style.display = (p && p.status === 'remembered') ? 'inline-block' : 'none';
  setLangInfoTag(v);
  $('exampleEn').innerHTML = highlightWord(v.exEn, v.word);
  $('exampleZh').textContent = v.exZh;
  $('exampleBox').onclick = () => speak(v.exEn, v.lang);

  const rootsList = $('rootsList');

  if(v.roots && v.roots.length){
    $('rootsBlock').style.display = 'block';
    v.roots.forEach(r => {
      const item = document.createElement('div');

      const part = document.createElement('span');
      part.className = 'root-part';
      part.textContent = r.part;
      const meaning = document.createElement('span');
      meaning.className = 'root-meaning';
      meaning.textContent = r.meaning;
      item.appendChild(part);
      item.appendChild(meaning);
      rootsList.appendChild(item);
    });
  } else {
    $('rootsBlock').style.display = 'none';
  }

  const synChips = $('synChips');
  synChips.innerHTML = '';
  if(v.syn.length){
    $('synBlock').style.display = 'block';
    v.syn.forEach(s => {
      const c = document.createElement('span');
      c.className = 'chip syn';
      c.textContent = s;
      c.addEventListener('click', () => speak(s, v.lang));
      synChips.appendChild(c);
    });
  } else {
    $('synBlock').style.display = 'none';
  }

  const antChips = $('antChips');
  antChips.innerHTML = '';
  if(v.ant && v.ant.length){
    $('antBlock').style.display = 'block';
    v.ant.forEach(a => {
      const c = document.createElement('span');
      c.className = 'chip ant';
      c.textContent = a;
      c.addEventListener('click', () => speak(a, v.lang));
      antChips.appendChild(c);
    });
  } else {
    $('antBlock').style.display = 'none';
  }

  const phraseChips = $('phraseChips');
  phraseChips.innerHTML = '';
  if(v.phrase.length){
    $('phraseBlock').style.display = 'block';
    v.phrase.forEach(ph => {
      const en = (typeof ph === 'string') ? ph : ph.en;
      const zh = (typeof ph === 'string') ? '' : (ph.zh || '');
      const item = document.createElement('div');
      item.className = 'phrase-item';
      const enSpan = document.createElement('span');
      enSpan.className = 'phrase-en';
      enSpan.textContent = en;
      item.appendChild(enSpan);
      if(zh){
        const zhSpan = document.createElement('span');
        zhSpan.className = 'phrase-zh';
        zhSpan.textContent = zh;
        item.appendChild(zhSpan);
      }
      item.addEventListener('click', () => speak(en, v.lang));
      phraseChips.appendChild(item);

  } else {
    $('phraseBlock').style.display = 'none';
  }

  revealed = false;
  $('zhBlock').classList.remove('show');
  $('revealBtn').textContent = '顯示翻譯';

function render(){
  studyState = 'browse';
  $('prevBtn').style.display = '';
  $('nextBtn').style.display = '';
  $('revealBtn').style.display = '';
  $('studyChoices').style.display = 'none';

  fillCardContent(v);
  $('idxNum').textContent = current + 1;
  $('idxTotal').textContent = '/ ' + vocab.length;
  $('prevBtn').textContent = '上一個';
  $('nextBtn').textContent = current === vocab.length - 1 ? '重新開始' : '下一個';
  $('prevBtn').disabled = current === 0;
  $('nextBtn').disabled = false;
}

function renderStudyCard(){
  if(queueIndex >= queue.length){
    studyState = 'studyComplete';
    renderStudyComplete();
    return;
  }
  studyAnswered = false;
  const entry = queue[queueIndex];
  const v = entry.v;

  $('posTag').textContent = v.pos;
  setLangInfoTag(v);
  currentWord = v.word;
  currentLang = v.lang;
  $('headword').textContent = v.word;
  $('headword').classList.remove('answer-correct','answer-wrong');
  $('rememberedTag').style.display = 'none';
  $('ipa').textContent = v.ipa;
  $('idxNum').textContent = queueIndex + 1;
  $('idxTotal').textContent = '/ ' + queue.length;

  $('revealBtn').style.display = 'none';
  $('zhBlock').classList.remove('show');
  $('card').scrollTop = 0;

  $('studyChoices').style.display = 'flex';
  const container = $('studyChoices');
  container.innerHTML = '';
  const others = vocab.filter(item => item.word !== v.word);
  const distractors = shuffle(others).slice(0, 3).map(item => item.zh);
  const choices = shuffle([v.zh, ...distractors]);
  choices.forEach(choiceText => {
    const btn = document.createElement('button');
    btn.className = 'quiz-choice-btn';
    btn.textContent = choiceText;
    btn.addEventListener('click', () => handleStudyAnswer(btn, choiceText, v));
    container.appendChild(btn);
  });

  $('prevBtn').style.display = 'none';
  $('nextBtn').style.display = '';
  $('nextBtn').textContent = '下一題';
  $('nextBtn').disabled = true;
}

function handleStudyAnswer(btn, choiceText, v){
  if(studyAnswered) return;
  studyAnswered = true;
  const correct = choiceText === v.zh;

  updateProgress(v.word, correct);
  studyTotal++;
  if(correct){
    studyScore++;
  } else {
    const entry = queue[queueIndex];
    if(!entry.retried){
      queue.push({ v: v, retried: true });
    }
  }
  saveSession();

  $('studyChoices').style.display = 'none';
  $('studyChoices').innerHTML = '';
  $('headword').classList.add(correct ? 'answer-correct' : 'answer-wrong');

  fillCardContent(v);
  $('zhBlock').classList.add('show');
  $('revealBtn').style.display = 'none';

  $('nextBtn').disabled = false;
}

$('headword').addEventListener('click', () => {

  $('zhBlock').classList.toggle('show', revealed);
  $('revealBtn').textContent = revealed ? '隱藏翻譯' : '顯示翻譯';

$('prevBtn').addEventListener('click', () => {
  if(studyState === 'glossary'){
    if(current > 0){ current--; renderGlossaryDetail(); }
  } else if(studyState === 'browse' && current > 0){
    current--; render();
  }
});

$('nextBtn').addEventListener('click', () => {
  if(studyState === 'glossary'){
    if(current < vocab.length - 1){ current++; renderGlossaryDetail(); }
  } else if(studyState === 'study'){
    queueIndex++;
    saveSession();
    renderStudyCard();
  } else if(studyState === 'studyComplete'){
    exitStudyMode();
  } else {
    if(current < vocab.length - 1){ current++; }
    else { current = 0; }
    render();
  }
});

function switchTab(target){
  $('flashcardMain').style.display = target === 'card' ? 'flex' : 'none';
  $('flashcardNav').style.display = target === 'card' ? 'flex' : 'none';
  $('quizMain').style.display = target === 'quiz' ? 'flex' : 'none';
  $('quizNav').style.display = target === 'quiz' ? 'flex' : 'none';
  $('progressMain').style.display = target === 'progress' ? 'flex' : 'none';
  $('topAction').style.display = target === 'progress' ? 'block' : 'none';

  if(target === 'card'){ render(); }
  else if(target === 'quiz'){ startQuiz(); }
  else if(target === 'progress'){ renderProgressTab(); }
}

// ---------------- Quiz mode ----------------
let quizOrder = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(){
  quizOrder = shuffle(vocab.map((_, i) => i));
  quizIndex = 0;
  quizScore = 0;
  $('quizResult').style.display = 'none';
  $('quizChoices').style.display = 'flex';
  $('quizNav').style.display = 'flex';
  renderQuizQuestion();
}

function renderQuizQuestion(){
  if(quizIndex >= quizOrder.length){
    showQuizResult();
    return;
  }
  quizAnswered = false;
  const v = vocab[quizOrder[quizIndex]];
  $('quizPrompt').textContent = '選出正確的意思';
  $('quizWord').textContent = v.word;
  $('idxNum').textContent = quizIndex + 1;
  $('idxTotal').textContent = '/ ' + quizOrder.length;

  const others = vocab.filter((item, i) => i !== quizOrder[quizIndex]);
  const distractors = shuffle(others).slice(0, 3).map(item => item.zh);
  const choices = shuffle([v.zh, ...distractors]);

  const container = $('quizChoices');
  container.innerHTML = '';
  choices.forEach(choiceText => {
    const btn = document.createElement('button');
    btn.className = 'quiz-choice-btn';
    btn.textContent = choiceText;
    btn.addEventListener('click', () => handleQuizAnswer(btn, choiceText, v.zh));
    container.appendChild(btn);
  });

  $('quizNextBtn').disabled = true;
  $('quizNextBtn').textContent = quizIndex === quizOrder.length - 1 ? '完成測驗' : '下一題';
}

function handleQuizAnswer(btn, choiceText, correctText){
  if(quizAnswered) return;
  quizAnswered = true;
  const allBtns = $('quizChoices').querySelectorAll('.quiz-choice-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if(b.textContent === correctText){
      b.classList.add('correct');
    } else if(b === btn){
      b.classList.add('wrong');
    }
  });
  if(choiceText === correctText){
    quizScore++;
  }
  $('quizNextBtn').disabled = false;
}

function showQuizResult(){
  $('quizPrompt').textContent = '測驗結束';
  $('quizWord').textContent = '';
  $('quizChoices').style.display = 'none';
  $('quizNav').style.display = 'none';
  $('quizResult').style.display = 'block';
  $('quizScoreText').textContent = '得分：' + quizScore + ' / ' + quizOrder.length;
}

$('quizNextBtn').addEventListener('click', () => {
  quizIndex++;
  renderQuizQuestion();
});

$('quizRestartBtn').addEventListener('click', () => {
  startQuiz();
});

// ---------------- Study queue (Ebbinghaus scheduling) ----------------
let queue = [];
let queueIndex = 0;

function formatDateNice(dateObj){
  const y = dateObj.getFullYear();
  const m = dateObj.getMonth() + 1;
  const d = dateObj.getDate();
  return y + '年' + m + '月' + d + '日';
}

function estimateFastestDaysToComplete(){
  const today = todayStr();
  const startDate = new Date(today + 'T00:00:00');

  const state = vocab.map(v => {
    const p = progress[v.word];
    if(p && p.status === 'remembered'){
      return { done: true };
    }
    if(p && p.status === 'learning'){
      const nr = new Date(p.nextReview + 'T00:00:00');
      let dueDay = Math.round((nr - startDate) / 86400000) + 1; // 1 = today
      if(dueDay < 1) dueDay = 1;
      return { done: false, streak: p.streak, dueDay: dueDay, started: true };
    }
    return { done: false, streak: 0, dueDay: null, started: false };
  });

  if(state.every(s => s.done)) return 0;

  const maxDays = 3650;
  let day = 1;
  while(day <= maxDays){
    state.forEach(s => {
      if(s.done || !s.started) return;
      if(s.dueDay === day){
        s.streak += 1;
        if(s.streak >= 3){ s.done = true; }
        else { s.dueDay = day + s.streak; }
      }
    });

    let introducedToday = 0;
    for(const s of state){
      if(s.done || s.started) continue;
      if(introducedToday >= dailyNewCount) break;
      s.started = true;
      s.streak = 1;
      s.dueDay = day + 1;
      introducedToday++;
    }

    if(state.every(s => s.done)) return day;
    day++;
  }
  return null;
}

function renderProgressTab(){
  const today = todayStr();
  $('simDateInput').value = today;
  const dueWords = vocab.filter(v => {
    const p = progress[v.word];
    return p && (p.status === 'learning' || p.status === 'remembered') && p.nextReview <= today;
  });
  const newWords = vocab.filter(v => !progress[v.word] || progress[v.word].status === 'new');
  const rememberedWords = vocab.filter(v => progress[v.word] && progress[v.word].status === 'remembered');

  $('statDue').textContent = dueWords.length;
  $('statNew').textContent = Math.min(newWords.length, dailyNewCount);
  $('statMastered').textContent = rememberedWords.length;
  $('stepValue').value = dailyNewCount;

  const fastestDays = estimateFastestDaysToComplete();
  if(fastestDays === 0){
    $('completionDate').textContent = '已全部學會（之後仍有例行複習）';
  } else if(fastestDays === null){
    $('completionDate').textContent = '無法估算';
  } else {
    const base = new Date(today + 'T00:00:00');
    const completion = new Date(base);
    completion.setDate(completion.getDate() + (fastestDays - 1));
    $('completionDate').textContent = formatDateNice(completion);
  }

  const saved = loadSession();
  const hasSavedSession = saved && saved.queueIndex < saved.queue.length;
  const todayQueue = getTodayQueue();

  if(hasSavedSession){
    const remaining = saved.queue.length - saved.queueIndex;
    $('startStudyBtn').textContent = '繼續今日學習（剩 ' + remaining + ' 題）';
    $('startStudyBtn').disabled = false;
  } else if(todayQueue.length > 0){
    $('startStudyBtn').textContent = '開始今日學習（' + todayQueue.length + ' 個）';
    $('startStudyBtn').disabled = false;
  } else {
    $('startStudyBtn').textContent = '今日進度已完成';
    $('startStudyBtn').disabled = true;
  }

  const statusLabel = { new:'新詞', learning:'學習中', remembered:'記得' };
  const listEl = $('wordStatusList');
  listEl.innerHTML = '';
  vocab.forEach((v, idx) => {
    const p = progress[v.word];
    const status = p ? p.status : 'new';
    const row = document.createElement('div');
    row.className = 'word-status-row';
    row.id = 'wordRow-' + idx;

    const wordSpan = document.createElement('span');
    wordSpan.textContent = v.word;

    const badge = document.createElement('span');
    badge.className = 'status-badge ' + status;
    let badgeText = statusLabel[status];
    if(p && p.totalAttempts > 0){
      badgeText += ' ' + p.totalCorrect + '/' + p.totalAttempts;
    }
    badge.textContent = badgeText;

    row.appendChild(wordSpan);
    row.appendChild(badge);
    row.addEventListener('click', () => openGlossaryDetail(idx));
    listEl.appendChild(row);
  });
}

$('jumpTodayBtn').addEventListener('click', () => {
  const queue = getTodayQueue();
  if(queue.length === 0){
    alert('今天沒有需要學習或複習的詞彙了！');
    return;
  }
  const firstWord = queue[0];
  const idx = vocab.indexOf(firstWord);
  const row = document.getElementById('wordRow-' + idx);
  if(row){
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    row.classList.add('highlight-row');
    setTimeout(() => row.classList.remove('highlight-row'), 1600);
  }
});

$('stepDown').addEventListener('click', () => {
  dailyNewCount = Math.max(1, dailyNewCount - 1);
  saveDailyNewCount();
  renderProgressTab();
});

$('stepUp').addEventListener('click', () => {
  dailyNewCount = Math.min(100, dailyNewCount + 1);
  saveDailyNewCount();
  renderProgressTab();
});

$('stepValue').addEventListener('change', (e) => {
  let val = parseInt(e.target.value, 10);
  if(isNaN(val)) val = dailyNewCount;
  val = Math.max(1, Math.min(100, val));
  dailyNewCount = val;
  saveDailyNewCount();
  renderProgressTab();
});

$('startStudyBtn').addEventListener('click', () => {
  const saved = loadSession();
  if(saved && saved.queueIndex < saved.queue.length){
    queue = saved.queue
      .map(item => ({ v: vocab.find(x => x.word === item.word), retried: item.retried }))
      .filter(entry => entry.v);
    queueIndex = saved.queueIndex;
    studyScore = saved.studyScore;
    studyTotal = saved.studyTotal;
  } else {
    const todayQueue = getTodayQueue();
    if(todayQueue.length === 0) return;
    queue = todayQueue.map(v => ({ v: v, retried: false }));
    queueIndex = 0;
    studyScore = 0;
    studyTotal = 0;
  }
  studyState = 'study';
  $('flashcardMain').style.display = 'flex';
  $('flashcardNav').style.display = 'flex';
  $('quizMain').style.display = 'none';
  $('quizNav').style.display = 'none';
  $('progressMain').style.display = 'none';
  $('topAction').style.display = 'none';
  $('glossaryBackBar').style.display = 'none';
  saveSession();
  renderStudyCard();
});

$('resetProgressBtn').addEventListener('click', () => {
  if(confirm('確定要重置所有學習紀錄嗎？此動作無法復原。')){
    progress = {};
    saveProgress();
    clearSession();
    queue = [];
    queueIndex = 0;
    studyScore = 0;
    studyTotal = 0;
    renderProgressTab();
  }
});

$('simDateInput').addEventListener('change', (e) => {
  simulatedDate = e.target.value || null;
  try{
    if(simulatedDate){ localStorage.setItem(STORAGE_PREFIX + 'sim_date', simulatedDate); }
    else{ localStorage.removeItem(STORAGE_PREFIX + 'sim_date'); }
  }catch(err){}
  renderProgressTab();
});

$('simDateReset').addEventListener('click', () => {
  simulatedDate = null;
  try{ localStorage.removeItem(STORAGE_PREFIX + 'sim_date'); }catch(err){}
  renderProgressTab();
});
