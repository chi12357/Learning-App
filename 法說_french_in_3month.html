<style>
  :root{
    --ink:#121315;
    --ink-2:#1b1c1f;
    --ink-3:#232427;
    --vermilion:#942525;
    --gold:#bd8b2a;
    --jade:#fcfbfa;
    --green:#4cd787;

  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--jade);
    font-family:'Noto Serif TC', serif;
    -webkit-tap-highlight-color:transparent;
  }
  .fr-text{ font-family:'Cormorant Garamond','Noto Serif TC',serif; }
  .num-text{ font-family:'Inter',sans-serif; }
  button, select{ font-family:'Noto Serif TC',serif; }

  /* ---------- Header ---------- */
  header#appHeader{
    position:fixed; top:0; left:0; right:0; height:64px;
    background:var(--ink);
    border-bottom:1px solid var(--gold);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 18px;
    z-index:100;
  }
  .brand{
    font-size:1.75rem;
    font-weight:900;
    letter-spacing:0.06em;
    color:var(--jade);
    white-space:nowrap;
  }
  .mode-toggle{ display:flex; gap:8px; }
  .mode-btn{
    background:transparent;
    border:1px solid var(--gold);
    color:var(--jade);
    padding:10px 16px;
    font-size:1rem;
    border-radius:6px;
    cursor:pointer;
    transition:background .15s, color .15s;
  }
  .mode-btn.active{
    background:var(--vermilion);
    border-color:var(--vermilion);
    color:var(--jade);
    font-weight:700;
  }

  /* ---------- Filter bar ---------- */
  #filterBar{
    position:fixed; top:64px; left:0; right:0; height:66px;
    background:var(--ink-2);
    border-bottom:1px solid var(--gold-dim);
    display:flex; align-items:center;
    padding:0 18px;
    z-index:99;
  }
  .filters{ display:flex; gap:12px; align-items:center; width:100%; flex:1; }
  .filters[hidden]{ display:none; }
  select{
    background:var(--ink);
    color:var(--jade);
    border:1px solid var(--gold);
    border-radius:6px;
    padding:11px 10px;
    font-size:1.05rem;
  }
  /* 字卡文字下拉：剛好容納2字 */
  #learnCardText{ width:calc(2em + 30px); flex:none; }
  /* 題型下拉：剛好容納5字 */
  #testType{ width:calc(5em + 30px); flex:none; }
  /* 章節下拉：填滿剩餘寬度，使篩選列右緣與頁首右緣對齊 */
  #learnChapter, #testChapter{ flex:1; min-width:0; }

  /* ---------- Translation panel (learn mode only) ---------- */
  #translationPanel{
    position:fixed; top:130px; left:0; right:0; height:150px;
    background:var(--ink-2);
    border-bottom:2px solid var(--gold);
    display:flex; align-items:center; gap:16px;
    padding:12px 18px;
    z-index:98;
  }
  #translationContent{
    flex:1;
    max-height:120px;
    overflow-y:auto;
    display:flex; align-items:center; justify-content:flex-end;
    text-align:right;
    font-size:1.35rem;
    line-height:1.5;
    color:var(--jade);
  }
  #translateBtn{
    flex-shrink:0;
    background:var(--gold);
    color:var(--ink);
    border:none;
    border-radius:6px;
    padding:14px 18px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
  }
  #translateBtn:active{ opacity:0.8; }

  /* ---------- Main content ---------- */
  body.mode-learn #mainContent{ padding-top:296px; }
  body.mode-test #mainContent{ padding-top:150px; }
  #mainContent{ min-height:100vh; padding-bottom:60px; }
  .view[hidden]{ display:none; }

  /* ---------- Learn mode card grid ---------- */
  #cardGrid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(210px,1fr));
    gap:14px;
    padding:18px;
  }
  .card{
    background:var(--ink-2);
    border:1px solid var(--gold-dim);
    border-radius:10px;
    padding:22px 16px;
    text-align:center;
    font-size:1.51875rem;
    cursor:pointer;
    transition:transform .12s, border-color .12s;
  }
  .card:hover{ border-color:var(--gold); transform:translateY(-2px); }
  .card.speaking{ border-color:var(--vermilion); box-shadow:0 0 0 2px var(--vermilion); }
  .speaker-tag{
    font-size:0.42em;
    color:var(--gold);
    font-family:'Inter',sans-serif;
    font-weight:600;
    vertical-align:super;
    margin-left:6px;
    letter-spacing:0.02em;
  }
  .section-header{
    grid-column:1 / -1;
    font-size:1.3rem;
    font-weight:700;
    color:var(--gold);
    border-bottom:2px solid var(--gold);
    padding:14px 4px 8px;
    margin-top:8px;
  }
  .section-header:first-child{ margin-top:0; }
  .section-subheader{
    grid-column:1 / -1;
    font-size:1rem;
    font-weight:600;
    color:var(--jade);
    background:var(--vermilion);
    display:inline-block;
    padding:4px 14px;
    border-radius:20px;
    margin:4px 0 -2px;
    width:fit-content;
  }

  /* ---------- Quiz ---------- */
  #quizArea{ max-width:640px; margin:0 auto; padding:20px; }
  .quiz-card{
    background:var(--ink-2);
    border:1px solid var(--gold);
    border-radius:14px;
    padding:22px;
  }
  .quiz-header{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:8px;
    min-height:42px;
  }
  .quiz-progress{ text-align:left; font-weight:700; color:var(--jade); font-size:1.2rem; }
  .quiz-score{ text-align:right; font-weight:700; color:var(--green); font-size:1.2rem; }
  .quiz-center-actions{
    display:none;
    gap:8px;
    justify-self:center;
  }
  .quiz-action-btn{
    background:var(--gold);
    color:var(--ink);
    border:none;
    border-radius:8px;
    padding:10px 14px;
    font-size:0.9rem;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }
  .quiz-next-btn{
    background:var(--vermilion);
    color:var(--jade);
  }
  .quiz-question{
    font-size:1.6875rem;
    text-align:center;
    margin:26px 0;
    cursor:pointer;
    min-height:1.4em;
  }
  .quiz-options{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .quiz-option{
    background:var(--ink);
    border:2px solid var(--gold-dim);
    border-radius:10px;
    padding:16px 10px;
    text-align:center;
    font-size:1.5525rem;
    cursor:pointer;
  }
  .quiz-option.correct{ border-color:var(--green); box-shadow:0 0 0 2px var(--green); }
  .quiz-option.wrong{ border-color:var(--vermilion); box-shadow:0 0 0 2px var(--vermilion); }

  .result-card{
    background:var(--ink-2);
    border:1px solid var(--gold);
    border-radius:14px;
    padding:26px;
    text-align:center;
  }
  .result-score{
    font-size:3rem;
    font-weight:900;
    color:var(--gold);
    margin:10px 0 20px;
  }
  .result-wrong-list{ text-align:left; margin:16px 0; }
  .result-wrong-item{
    padding:12px;
    border-bottom:1px solid var(--gold-dim);
    cursor:pointer;
  }
  .result-actions{ display:flex; gap:14px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
  .result-btn{
    background:var(--gold);
    color:var(--ink);
    border:none;
    border-radius:8px;
    padding:14px 22px;
    font-size:1.05rem;
    font-weight:700;
    cursor:pointer;
  }
  .result-btn.secondary{
    background:transparent;
    color:var(--jade);
    border:1px solid var(--gold);
  }
  .celebrate{ font-size:1.3rem; color:var(--green); font-weight:700; margin:16px 0; }
</style>
</head>
<body class="mode-learn">

<header id="appHeader">
  <div class="brand">法文學習</div>
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="learn">學習</button>
    <button class="mode-btn" data-mode="test">測驗</button>
  </div>
</header>

<div id="filterBar">
  <div class="filters" id="learnFilters">
    <select id="learnCardText">
      <option value="fr">法文</option>
      <option value="zh">英文</option>
    </select>
    <select id="learnChapter"></select>
  </div>
  <div class="filters" id="testFilters" hidden>
    <select id="testType">
      <option value="all">全部</option>
      <option value="fr2zh">法翻英</option>
      <option value="zh2fr">英翻法</option>
      <option value="listen">法文音聽</option>
    </select>
    <select id="testChapter"></select>
  </div>
</div>

<div id="translationPanel">
  <div id="translationContent" class="fr-text"></div>
  <button id="translateBtn">🌐 翻譯</button>
</div>

<input type="file" id="importRecordInput" accept=".txt" style="display:none">

<main id="mainContent">
  <div class="view" id="learnView">
    <div id="cardGrid"></div>
  </div>
  <div class="view" id="testView" hidden>
    <div id="quizArea"></div>
  </div>
</main>

function chapterLabel(sc){ return sc.scenario_id + ' · ' + sc.topic; }

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* =====================  章節學習記錄（持久化）  =====================
   說明：瀏覽器基於安全考量，網頁無法在使用者不主動選擇檔案的情況下，
   靜默讀寫磁碟上任意路徑的檔案（例如「學習記錄.txt」）。
   因此本機自動接續記錄採用瀏覽器 localStorage 儲存（同一裝置、同一瀏覽器
   重新開啟本頁面時會自動繼續累加）；同時提供「匯出／匯入 學習記錄.txt」
   按鈕，讓使用者可取得實際文字檔備份，或匯入先前匯出的記錄檔繼續使用。
*/
const CHAPTER_COMPLETE_THRESHOLD = 50;
const LEARNING_RECORD_KEY = 'frAppLearningRecord';
let chapterProgress = {};
let completedChapters = new Set();

function loadChapterProgress(){
  try{
    const raw = window.localStorage.getItem(LEARNING_RECORD_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && typeof parsed === 'object') chapterProgress = parsed;
    }
  }catch(e){ chapterProgress = {}; }
}
function saveChapterProgress(){
  try{ window.localStorage.setItem(LEARNING_RECORD_KEY, JSON.stringify(chapterProgress)); }catch(e){}
}
function updateCompletionStatus(){
  completedChapters = new Set(
    DATA.scenarios
      .map(function(sc){ return sc.scenario_id; })
      .filter(function(id){ return (chapterProgress[id] || 0) > CHAPTER_COMPLETE_THRESHOLD; })
  );
}
function recordTextContent(){
  return DATA.scenarios.map(function(sc){
    return sc.scenario_id + ',' + (chapterProgress[sc.scenario_id] || 0);
  }).join('\n') + '\n';
}
function exportLearningRecord(){
  const blob = new Blob([recordTextContent()], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '學習記錄.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}
function importLearningRecordText(text){
  const next = {};
  text.split(/\r?\n/).forEach(function(line){
    const parts = line.split(',');
    if(parts.length>=2){
      const id = parts[0].trim();
      const count = parseInt(parts[1], 10);
      if(id && !isNaN(count)) next[id] = count;
    }
  });
  chapterProgress = next;
  saveChapterProgress();
  updateCompletionStatus();
  refreshLearnChapterOptions();
}

/* File System Access API：支援的瀏覽器（如桌面版 Chrome/Edge）可一次授權，
   之後每完成 10 題會自動將完整記錄寫入使用者選定的「學習記錄.txt」，
   不需再手動匯出。不支援的瀏覽器（多數手機瀏覽器）則維持 localStorage
   自動接續＋手動匯出/匯入。 */
const FS_ACCESS_SUPPORTED = 'showSaveFilePicker' in window;
let recordFileHandle = null;
async function connectRecordFile(){
  if(!FS_ACCESS_SUPPORTED) return;
  try{
    recordFileHandle = await window.showSaveFilePicker({
      suggestedName: '學習記錄.txt',
      types: [{ description:'Text file', accept:{'text/plain':['.txt']} }]
    });
    await writeRecordFile();
    const btn = document.getElementById('connectRecordBtn');
    if(btn){ btn.textContent = '✅ 已連結，自動寫入中'; btn.disabled = true; }
  }catch(e){ /* 使用者取消選檔，忽略 */ }
}
async function writeRecordFile(){
  if(!recordFileHandle) return;
  try{
    const writable = await recordFileHandle.createWritable();
    await writable.write(recordTextContent());
    await writable.close();
  }catch(e){ /* 權限被收回或寫入失敗，忽略，仍保留 localStorage 記錄 */ }
}

updateCompletionStatus();

const state = {
  mode:'learn',
  learn:{ chapter:'all', cardText:'fr', currentCard:null },
  test:{ chapter:'all', type:'all', queue:[], currentSet:[], currentIndex:0, correctCount:0, wrongList:[], answered:false, isRetest:false, cumulativeAnswered:0, cumulativeCorrect:0 },
  speechToken:0
};

/* =====================  語音  ===================== */
let frVoice = null;
function loadVoices(){
  if(!('speechSynthesis' in window)) return;
  const voices = window.speechSynthesis.getVoices();
  frVoice = voices.find(function(v){ return v.lang && v.lang.toLowerCase().indexOf('fr') === 0; }) || null;
}
if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
  /* Chrome/Android 上 speechSynthesis 長時間播放會自動暫停，定時喚醒 */
  setInterval(function(){
    if(window.speechSynthesis.speaking && !window.speechSynthesis.paused){
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
  }, 4000);
}

function cancelSpeech(){
  state.speechToken++;
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
}
function speakFrench(text, times, interval){
  if(!('speechSynthesis' in window)) return;
  state.speechToken++;
  const token = state.speechToken;
  window.speechSynthesis.cancel();
  let count = 0;
  function speakOnce(){
    if(token !== state.speechToken) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'fr-FR';
    if(frVoice) utter.voice = frVoice;
    utter.rate = 0.92;
    count++;
    if(count < times){
      utter.onend = function(){
        if(token !== state.speechToken) return;
        setTimeout(function(){ if(token === state.speechToken) speakOnce(); }, interval);
      };
    }
    window.speechSynthesis.speak(utter);
  }
  /* 部分瀏覽器在 cancel() 後立即 speak() 會被忽略，故延遲一個 tick */
  setTimeout(speakOnce, 30);
}

/* =====================  DOM refs  ===================== */
const modeBtns = document.querySelectorAll('.mode-btn');
const learnFilters = document.getElementById('learnFilters');
const testFilters = document.getElementById('testFilters');
const translationPanel = document.getElementById('translationPanel');
const translationContent = document.getElementById('translationContent');
const translateBtn = document.getElementById('translateBtn');
const learnView = document.getElementById('learnView');
const testView = document.getElementById('testView');
const cardGrid = document.getElementById('cardGrid');
const quizArea = document.getElementById('quizArea');
const learnChapterSel = document.getElementById('learnChapter');
const learnCardTextSel = document.getElementById('learnCardText');
const testChapterSel = document.getElementById('testChapter');
const testTypeSel = document.getElementById('testType');

/* =====================  下拉選單初始化  ===================== */
function fillChapterSelect(sel, allLabel, markCompleted){
  sel.innerHTML = '<option value="completed">已完成章節</option>' +
    '<option value="all">'+allLabel+'</option>' +
    DATA.scenarios.map(function(sc){
      const isDone = markCompleted && completedChapters.has(sc.scenario_id);
      const style = isDone ? ' style="text-decoration:line-through;"' : '';
      return '<option value="'+sc.scenario_id+'"'+style+'>'+chapterLabel(sc)+'</option>';
    }).join('');
}
function refreshLearnChapterOptions(){
  const current = learnChapterSel.value;
  fillChapterSelect(learnChapterSel, '全部學習章節', true);
  learnChapterSel.value = current;
}
fillChapterSelect(learnChapterSel, '全部學習章節', true);
fillChapterSelect(testChapterSel, '全部測驗章節', false);
testTypeSel.value = state.test.type;
learnCardTextSel.value = state.learn.cardText;
learnChapterSel.value = state.learn.chapter;
testChapterSel.value = state.test.chapter;

/* =====================  模式切換  ===================== */
modeBtns.forEach(btn=>{
  btn.addEventListener('click', function(){
    state.mode = btn.dataset.mode;
    modeBtns.forEach(b=>b.classList.toggle('active', b===btn));
    document.body.classList.toggle('mode-learn', state.mode==='learn');
    document.body.classList.toggle('mode-test', state.mode==='test');
    learnFilters.hidden = state.mode !== 'learn';
    testFilters.hidden = state.mode !== 'test';
    translationPanel.style.display = state.mode==='learn' ? 'flex' : 'none';
    learnView.hidden = state.mode !== 'learn';
    testView.hidden = state.mode !== 'test';
    cancelSpeech();
    if(state.mode==='test'){
      if(state.test.chapter !== state.learn.chapter){
        state.test.chapter = state.learn.chapter;
        testChapterSel.value = state.test.chapter;
        resetTestSession();
      } else if(state.test.currentSet.length===0){
        resetTestSession();
      }
    }
  });
});

/* =====================  學習模式  ===================== */
function getRelevantChapters(){
  if(state.learn.chapter==='completed') return DATA.scenarios.filter(function(sc){ return completedChapters.has(sc.scenario_id); });
  if(state.learn.chapter==='all') return DATA.scenarios;
  return DATA.scenarios.filter(function(sc){ return sc.scenario_id===state.learn.chapter; });
}

function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendLearnCard(card){
  const div = document.createElement('div');
  div.className = 'card ' + (state.learn.cardText==='fr' ? 'fr-text' : '');
  const mainText = state.learn.cardText==='fr' ? card.fr : card.zh;
  if(card.type==='sentence' && card.speaker){
    div.innerHTML = escapeHtml(mainText) + '<sup class="speaker-tag">' + escapeHtml(card.speaker) + '</sup>';
  } else {
    div.textContent = mainText;
  }
  div.addEventListener('click', function(){ onCardClick(card, div); });
  cardGrid.appendChild(div);
}

function renderCardGrid(){
  const chapters = getRelevantChapters();
  cardGrid.innerHTML = '';
  if(chapters.length===0){
    const empty = document.createElement('div');
    empty.className = 'section-header';
    empty.textContent = '尚無已完成章節';
    cardGrid.appendChild(empty);
    return;
  }
  chapters.forEach(function(sc){
    const chapterHeader = document.createElement('div');
    chapterHeader.className = 'section-header';
    chapterHeader.textContent = chapterLabel(sc);
    cardGrid.appendChild(chapterHeader);

    const wordCards = ALL_CARDS.filter(function(c){ return c.chapter===sc.scenario_id && c.type==='word'; });
    wordCards.forEach(appendLearnCard);

    const sentenceCards = ALL_CARDS.filter(function(c){ return c.chapter===sc.scenario_id && c.type==='sentence'; });
    if(sentenceCards.length>0){
      const dialogueHeader = document.createElement('div');
      dialogueHeader.className = 'section-subheader';
      dialogueHeader.textContent = '對話';
      cardGrid.appendChild(dialogueHeader);
      sentenceCards.forEach(appendLearnCard);
    }
  });
}

function onCardClick(card, el){
  document.querySelectorAll('.card.speaking').forEach(function(c){ c.classList.remove('speaking'); });
  el.classList.add('speaking');
  state.learn.currentCard = card;
  if(state.learn.cardText==='fr'){
    translationContent.textContent = card.zh;
    translationContent.classList.remove('fr-text');
    speakFrench(card.fr, 3, 1000);
  } else {
    translationContent.textContent = card.fr;
    translationContent.classList.add('fr-text');
    speakFrench(card.fr, 1, 1000);
  }
}

learnChapterSel.addEventListener('change', function(){
  state.learn.chapter = learnChapterSel.value;
  cancelSpeech();
  translationContent.textContent = '';
  renderCardGrid();
});
learnCardTextSel.addEventListener('change', function(){
  state.learn.cardText = learnCardTextSel.value;
  cancelSpeech();
  translationContent.textContent = '';
  renderCardGrid();
});

function copyToClipboard(text){
  /* 優先使用 Clipboard API（需 https 安全環境） */
  if(window.isSecureContext && navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(function(){});
  }
  /* 同時使用相容性較高的 execCommand 備援，確保在 file:// 或非安全環境下也能複製 */
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }catch(e){}
}

translateBtn.addEventListener('click', function(){
  const card = state.learn.currentCard;
  if(!card) return;
  const text = state.learn.cardText==='fr' ? card.fr : card.zh;
  copyToClipboard(text);
  const targetLang = state.learn.cardText==='fr' ? 'zh-TW' : 'fr';
  const url = 'https://translate.google.com/?sl=auto&tl=' + targetLang + '&text=' + encodeURIComponent(text) + '&op=translate';
  /* window.open 必須在點擊事件的同一個呼叫堆疊中同步執行，避免被彈出視窗攔截 */
  window.open(url, '_blank');
});

/* =====================  測驗模式  ===================== */
function buildTestPool(){
  const chapter = state.test.chapter;
  let pool;
  if(chapter === 'completed'){
    pool = ALL_CARDS.filter(function(c){ return completedChapters.has(c.chapter); });
  } else if(chapter === 'all'){
    pool = ALL_CARDS;
  } else {
    pool = ALL_CARDS.filter(function(c){ return c.chapter===chapter; });
  }
  return pool;
}

function ensureQueue(){
  if(state.test.queue.length < 10){
    state.test.queue = state.test.queue.concat(shuffle(buildTestPool()));
  }
}

function resetTestSession(){
  state.test.queue = [];
  state.test.cumulativeAnswered = 0;
  state.test.cumulativeCorrect = 0;
  ensureQueue();
  startNewRound();
}

function startNewRound(){
  ensureQueue();
  state.test.currentSet = state.test.queue.splice(0, Math.min(10, state.test.queue.length));
  state.test.currentIndex = 0;
  state.test.correctCount = 0;
  state.test.wrongList = [];
  state.test.isRetest = false;
  renderQuestion();
}

function startRetest(){
  state.test.isRetest = true;
  state.test.currentSet = shuffle(state.test.wrongList);
  state.test.wrongList = [];
  state.test.currentIndex = 0;
  state.test.correctCount = 0;
  renderQuestion();
}

function getOptions(question, mode){
  const samePool = ALL_CARDS.filter(function(c){ return c.type===question.type && c!==question; });
  const shuffled = shuffle(samePool);
  const makeOpt = function(card){ return { text: mode==='zh2fr' ? card.fr : card.zh, fr: card.fr }; };
  const correctOpt = makeOpt(question);
  const used = new Set([correctOpt.text]);
  const distractors = [];
  for(let i=0;i<shuffled.length && distractors.length<3;i++){
    const opt = makeOpt(shuffled[i]);
    if(!used.has(opt.text)){ used.add(opt.text); distractors.push(opt); }
  }
  return { options: shuffle([correctOpt].concat(distractors)), correctVal: correctOpt.text };
}

function renderQuestion(){
  const idx = state.test.currentIndex;
  const total = state.test.currentSet.length;
  if(total===0){
    quizArea.innerHTML = '<div class="quiz-card"><p style="text-align:center;">此章節暫無題目。</p></div>';
    return;
  }
  const q = state.test.currentSet[idx];
  const rawType = state.test.type;
  const type = rawType==='all' ? ['fr2zh','zh2fr','listen'][Math.floor(Math.random()*3)] : rawType;
  state.test.answered = false;

  let questionDisplay, questionIsFr, useMode;
  if(type==='fr2zh'){
    questionDisplay = q.fr; questionIsFr = true; useMode = 'fr2zh';
  } else if(type==='zh2fr'){
    questionDisplay = q.zh; questionIsFr = false; useMode = 'zh2fr';
  } else {
    questionDisplay = '🔊'; questionIsFr = false;
    useMode = Math.random() < 0.5 ? 'fr2zh' : 'zh2fr';
  }
  const result = getOptions(q, useMode);

  quizArea.innerHTML =
    '<div class="quiz-card">' +
      '<div class="quiz-header">' +
        '<div class="quiz-progress num-text" id="quizProgress">' + (idx+1) + '/' + total + '</div>' +
        '<div class="quiz-center-actions" id="quizCenterActions">' +
          '<button class="quiz-action-btn" id="quizTranslateBtn">🌐 Google翻譯</button>' +
          '<button class="quiz-action-btn quiz-next-btn" id="quizNextBtn">下一題</button>' +
        '</div>' +
        '<div class="quiz-score num-text" id="quizScore">' + state.test.correctCount + '</div>' +
      '</div>' +
      '<div class="quiz-question ' + (questionIsFr ? 'fr-text' : '') + '" id="quizQuestion">' + questionDisplay + '</div>' +
      '<div class="quiz-options" id="quizOptions"></div>' +
    '</div>';

  const optionsContainer = document.getElementById('quizOptions');
  result.options.forEach(function(opt){
    const div = document.createElement('div');
    const optIsFr = useMode==='zh2fr';
    div.className = 'quiz-option ' + (optIsFr ? 'fr-text' : '');
    div.textContent = opt.text;
    div.addEventListener('click', function(){
      if(state.test.answered){
        speakFrench(q.fr, 1, 1000);
        return;
      }
      if(type==='fr2zh'){ speakFrench(opt.fr, 1, 1000); }
      onAnswer(opt.text, result.correctVal, q, div, optIsFr, type, useMode);
    });
    optionsContainer.appendChild(div);
  });

  const questionEl = document.getElementById('quizQuestion');
  const speakable = (type==='fr2zh' || type==='listen');
  if(speakable){
    questionEl.addEventListener('click', function(){ speakFrench(q.fr, 1, 1000); });
    speakFrench(q.fr, 1, 1000);
  }

  document.getElementById('quizTranslateBtn').addEventListener('click', function(){
    copyToClipboard(q.fr);
    const url = 'https://translate.google.com/?sl=fr&tl=en&text=' + encodeURIComponent(q.fr) + '&op=translate';
    window.open(url, '_blank');
  });

  document.getElementById('quizNextBtn').addEventListener('click', function(){
    state.test.currentIndex++;
    if(state.test.currentIndex < state.test.currentSet.length){
      renderQuestion();
    } else {
      showResults();
    }
  });
}

function onAnswer(selected, correct, q, btnEl, optIsFr, type, useMode){
  if(state.test.answered) return;
  state.test.answered = true;
  const isCorrect = selected === correct;
  if(isCorrect){
    state.test.correctCount++;
  } else {
    state.test.wrongList.push(q);
  }
  state.test.cumulativeAnswered++;
  if(isCorrect) state.test.cumulativeCorrect++;
  document.querySelectorAll('.quiz-option').forEach(function(o){
    if(o.textContent === correct) o.classList.add('correct');
    else if(o === btnEl) o.classList.add('wrong');
  });
  document.getElementById('quizScore').textContent = state.test.correctCount;
  document.getElementById('quizCenterActions').style.display = 'flex';
  const pct = Math.round((state.test.cumulativeCorrect / state.test.cumulativeAnswered) * 100);
  document.getElementById('quizProgress').textContent = state.test.cumulativeAnswered + '  ' + pct + '%';
  const questionEl = document.getElementById('quizQuestion');
  if(type==='listen'){
    /* 選項是法文(zh2fr) -> 題目區顯示英文；選項是英文(fr2zh) -> 題目區顯示法文 */
    if(useMode==='zh2fr'){
      questionEl.textContent = q.zh;
      questionEl.classList.remove('fr-text');
    } else {
      questionEl.textContent = q.fr;
      questionEl.classList.add('fr-text');
    }
  }
  /* 看結果時，點擊題目區一律朗讀法文 */
  questionEl.addEventListener('click', function(){ speakFrench(q.fr, 1, 1000); });
  speakFrench(q.fr, 1, 1000);
}

function showResults(){
  const total = state.test.currentSet.length;
  const score = total>0 ? Math.round((state.test.correctCount/total)*100) : 0;
  const wrongList = state.test.wrongList;

  if(!state.test.isRetest && total>0){
    const increments = {};
    state.test.currentSet.forEach(function(card){
      increments[card.chapter] = (increments[card.chapter] || 0) + 1;
    });
    Object.keys(increments).forEach(function(id){
      chapterProgress[id] = (chapterProgress[id] || 0) + increments[id];
    });
    saveChapterProgress();
    updateCompletionStatus();
    refreshLearnChapterOptions();
    if(recordFileHandle){ writeRecordFile(); }
  }

  let html = '<div class="result-card">';
  html += '<div>測驗完成</div>';
  html += '<div class="result-score num-text">' + score + '</div>';

  if(state.test.isRetest && wrongList.length===0){
    html += '<div class="celebrate">錯題全數消滅 🎉</div>';
  } else if(wrongList.length>0){
    html += '<div class="result-wrong-list">';
    wrongList.forEach(function(w){
      html += '<div class="result-wrong-item fr-text" data-fr="'+encodeURIComponent(w.fr)+'">' + w.fr + '　<span style="opacity:.7;">' + w.zh + '</span></div>';
    });
    html += '</div>';
  }

  html += '<div class="result-actions">';
  if(wrongList.length>0){
    html += '<button class="result-btn" id="retestBtn">重測（僅錯題）</button>';
  }
  html += '<button class="result-btn secondary" id="nextSetBtn">下10題</button>';
  html += '</div>';
  html += '<div class="result-actions">';
  if(FS_ACCESS_SUPPORTED && !recordFileHandle){
    html += '<button class="result-btn secondary" id="connectRecordBtn">🔗 連結學習記錄.txt（自動寫入）</button>';
  }
  html += '<button class="result-btn secondary" id="exportRecordBtn">📤 匯出學習記錄.txt</button>';
  html += '<button class="result-btn secondary" id="importRecordBtn">📥 匯入學習記錄.txt</button>';
  html += '</div></div>';

  quizArea.innerHTML = html;

  document.querySelectorAll('.result-wrong-item').forEach(function(el){
    el.addEventListener('click', function(){
      speakFrench(decodeURIComponent(el.dataset.fr), 1, 1000);
    });
  });
  const retestBtn = document.getElementById('retestBtn');
  if(retestBtn) retestBtn.addEventListener('click', startRetest);
  document.getElementById('nextSetBtn').addEventListener('click', startNewRound);
  const connectBtn = document.getElementById('connectRecordBtn');
  if(connectBtn) connectBtn.addEventListener('click', connectRecordFile);
  document.getElementById('exportRecordBtn').addEventListener('click', exportLearningRecord);
  document.getElementById('importRecordBtn').addEventListener('click', function(){
    document.getElementById('importRecordInput').click();
  });
}

document.getElementById('importRecordInput').addEventListener('change', function(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){ importLearningRecordText(String(reader.result)); };
  reader.readAsText(file);
  e.target.value = '';
});

testChapterSel.addEventListener('change', function(){
  state.test.chapter = testChapterSel.value;
  cancelSpeech();
  resetTestSession();
});
testTypeSel.addEventListener('change', function(){
  state.test.type = testTypeSel.value;
  cancelSpeech();
  resetTestSession();
});

/* =====================  初始化  ===================== */
renderCardGrid();
</script>
