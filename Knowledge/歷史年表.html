<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 28.8px; -webkit-text-size-adjust: 100%; transition: font-size 0.15s ease; scroll-padding-top: 120px; }
        body { background-color: #121315; color: #fcfbfa; font-family: 'Noto Serif TC', 'Inter', 'Cormorant Garamond', serif; padding: 16px 12px 40px; min-height: 100vh; line-height: 1.6; }
        .app { max-width: 820px; margin: 0 auto; }
        .app-header { text-align: center; padding: 8px 0 16px; border-bottom: 2px solid rgba(189, 139, 42, 0.25); margin-bottom: 12px; }

        .app-header h1 small { display: block; font-size: 0.65rem; font-weight: 400; letter-spacing: 6px; color: rgba(252, 251, 250, 0.5); margin-top: 2px; font-family: 'Inter', sans-serif; }
        .sticky-toolbar { position: sticky; top: 0; z-index: 100; background-color: rgba(18, 19, 21, 0.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 10px 0 6px; margin-bottom: 14px; border-bottom: 1px solid rgba(252, 251, 250, 0.06); }
        .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .search-wrap { flex: 1; position: relative; min-width: 150px; }
        .search-wrap input { width: 100%; padding: 10px 14px 10px 44px; font-size: 0.95rem; font-family: 'Noto Serif TC', serif; background: rgba(252, 251, 250, 0.07); border: 1.5px solid rgba(252, 251, 250, 0.15); border-radius: 60px; color: #fcfbfa; outline: none; transition: border-color 0.3s, box-shadow 0.3s; -webkit-appearance: none; }

        .search-wrap .clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(252, 251, 250, 0.3); font-size: 1.1rem; cursor: pointer; padding: 4px 8px; display: none; line-height: 1; border-radius: 50%; transition: background 0.2s; }
        .search-wrap .clear-btn:hover { background: rgba(252, 251, 250, 0.08); }

        .controls-group .toggle-all-btn:hover { background: rgba(252, 251, 250, 0.08); }

        .controls-group .divider { width: 1px; height: 28px; background: rgba(252, 251, 250, 0.08); flex-shrink: 0; }

        .font-controls button:hover { background: rgba(252, 251, 250, 0.08); }
        .font-controls button:active { background: rgba(189, 139, 42, 0.15); border-color: rgba(189, 139, 42, 0.3); }
        .font-controls .font-size-label { font-size: 0.65rem; color: rgba(252, 251, 250, 0.3); font-family: 'Inter', sans-serif; display: flex; align-items: center; padding: 0 4px; min-width: 28px; justify-content: center; }
        .stats { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: rgba(252, 251, 250, 0.4); padding: 0 4px 10px; font-family: 'Inter', sans-serif; letter-spacing: 0.3px; border-bottom: 1px solid rgba(252, 251, 250, 0.05); margin-bottom: 14px; flex-wrap: wrap; gap: 4px; }
        .stats .count { font-weight: 500; }
        .stats .hint { font-size: 0.7rem; opacity: 0.5; }
        .dynasty { margin-bottom: 12px; border-radius: 12px; background: rgba(252, 251, 250, 0.03); border: 1px solid rgba(252, 251, 250, 0.06); overflow: hidden; transition: border-color 0.3s; }
        .dynasty.highlight { border-color: rgba(189, 139, 42, 0.35); }
        .dynasty-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; transition: background 0.2s; gap: 12px; min-height: 64px; }

        .dynasty-name .badge { font-size: 1.2rem; font-weight: 400; color: rgba(252, 251, 250, 0.3); background: rgba(252, 251, 250, 0.06); padding: 0 10px; border-radius: 20px; font-family: 'Inter', sans-serif; letter-spacing: 0.5px; }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast .icon { margin-right: 8px; }
        .empty-state { text-align: center; padding: 40px 20px; color: rgba(252, 251, 250, 0.3); font-size: 1rem; letter-spacing: 1px; }
        .empty-state .icon { font-size: 2.4rem; margin-bottom: 12px; opacity: 0.4; }
        .col-china .no-event, .col-world .no-event { color: rgba(252, 251, 250, 0.2); cursor: default; }
        .loading { text-align: center; padding: 60px 20px; color: rgba(252, 251, 250, 0.5); font-size: 1.2rem; }
        .loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(189, 139, 42, 0.15); border-top-color: #bd8b2a; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state { text-align: center; padding: 60px 20px; color: rgba(252, 251, 250, 0.5); }
        .error-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
        .error-state .retry-btn { margin-top: 16px; padding: 10px 28px; border-radius: 40px; border: 1px solid rgba(189, 139, 42, 0.3); background: rgba(189, 139, 42, 0.1); color: #fcfbfa; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
        .error-state .retry-btn:hover { background: rgba(189, 139, 42, 0.2); }

        @media (max-width: 767px) { html { font-size: 25.6px; } body { padding: 8px 6px 24px; } .app-header h1 { font-size: 1.4rem; letter-spacing: 2px; } .app-header h1 small { font-size: 0.5rem; letter-spacing: 3px; } .sticky-toolbar { padding: 6px 0 4px; margin-bottom: 10px; } .toolbar { gap: 6px; } .search-wrap { min-width: 100px; flex: 1 1 100%; order: 1; } .search-wrap input { font-size: 0.85rem; padding: 8px 12px 8px 36px; } .search-wrap .search-icon { font-size: 0.9rem; left: 10px; } .search-wrap .clear-btn { font-size: 0.9rem; right: 8px; } .controls-group { order: 2; width: 100%; justify-content: flex-end; gap: 4px; } .controls-group .toggle-all-btn { width: 34px; height: 34px; font-size: 1.2rem; } .controls-group .divider { height: 22px; } .font-controls button { width: 34px; height: 34px; font-size: 1rem; } .font-controls .font-size-label { font-size: 0.55rem; min-width: 24px; } .stats { font-size: 0.65rem; padding: 0 2px 8px; margin-bottom: 10px; } .stats .hint { font-size: 0.6rem; } .dynasty-header { padding: 10px 12px; min-height: 48px; } .dynasty-name { font-size: 2.0rem; } .dynasty-name .years { font-size: 1.2rem; } .dynasty-name .badge { font-size: 0.9rem; } .dynasty-toggle { width: 32px; height: 32px; font-size: 1.3rem; } .emperor-row { grid-template-columns: 1fr 1fr; gap: 4px 8px; padding: 8px 10px; border-radius: 6px; min-height: 56px; grid-template-rows: auto auto auto; align-items: start; } .col-emperor { font-size: 1.2rem; grid-column: 1 / 3; grid-row: 1 / 2; padding-top: 2px; flex-direction: row; flex-wrap: wrap; align-items: baseline; gap: 2px 6px; } .col-emperor .emp-era { display: inline-flex; flex-wrap: wrap; gap: 2px 4px; } .col-emperor .year-range { font-size: 0.75rem; display: inline; } .col-china { font-size: 0.78rem; grid-column: 1 / 3; grid-row: 2 / 3; padding-top: 4px; border-top: 1px solid rgba(252, 251, 250, 0.05); } .col-world { font-size: 0.72rem; grid-column: 1 / 3; grid-row: 3 / 4; color: rgba(252, 251, 250, 0.5); padding-top: 4px; border-top: none; display: block; } .col-china .cross-tag { font-size: 0.5rem; padding: 0 4px; } .toast { font-size: 0.7rem; padding: 8px 16px; bottom: 20px; } }
        @media (max-width: 419px) { html { font-size: 22.4px; } body { padding: 4px 4px 16px; } .dynasty-name { font-size: 1.6rem; } .dynasty-name .years { font-size: 1.0rem; } .dynasty-name .badge { font-size: 0.75rem; } .emperor-row { padding: 6px 8px; gap: 2px 4px; } .col-emperor { font-size: 1.0rem; } .col-emperor .year-range { font-size: 0.6rem; } .col-china { font-size: 0.7rem; } .col-world { font-size: 0.65rem; } .dynasty-header { padding: 8px 10px; min-height: 40px; } .controls-group .toggle-all-btn { width: 30px; height: 30px; font-size: 1.0rem; } .font-controls button { width: 30px; height: 30px; font-size: 0.85rem; } .search-wrap input { font-size: 0.75rem; padding: 6px 10px 6px 30px; } .search-wrap .search-icon { font-size: 0.75rem; left: 8px; } .toast { font-size: 0.6rem; padding: 6px 12px; bottom: 16px; } }
        @media (min-width: 768px) { .emperor-row { grid-template-columns: 1.2fr 1.2fr 1.2fr 1.2fr; gap: 10px 14px; padding: 10px 18px; } .col-emperor { font-size: 1.5rem; } .col-emperor .year-range { font-size: 0.9rem; } .col-china { font-size: 0.95rem; } .col-world { font-size: 0.9rem; } .dynasty-header { padding: 16px 22px; } .dynasty-body.open { padding: 0 8px 12px; } .emperor-row .col-world { display: block; } }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(252, 251, 250, 0.04); }
        ::-webkit-scrollbar-thumb { background: rgba(189, 139, 42, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(189, 139, 42, 0.5); }
        @media print { body { background: #fff; color: #121315; padding: 20px; } .app-header h1 { color: #121315; } .app-header h1 small { color: rgba(18, 19, 21, 0.5); } .sticky-toolbar, .stats .hint, .dynasty-toggle, .toast { display: none !important; } .dynasty-body { max-height: none !important; opacity: 1 !important; padding: 0 !important; } .emperor-row { background: #f5f5f5 !important; border-left-color: #942525 !important; color: #121315 !important; } .col-emperor, .col-china, .col-world { color: #121315 !important; } .col-emperor .year-range { color: #555 !important; } .dynasty { border-color: #ccc !important; background: #fff !important; } .dynasty-header { background: #eee !important; } .dynasty-name .years { color: #666 !important; } .stats { color: #666 !important; border-bottom-color: #ddd !important; } .emperor-row.match { background: #f0f0f0 !important; } .emperor-row.cross-year { background: #faf0f0 !important; } .col-world { color: #555 !important; } .search-match { background: #ffd54f !important; color: #121315 !important; } .col-china .bullet { color: #942525 !important; } .col-world .bullet { color: #bd8b2a !important; } .col-china .event-item, .col-world .event-item { cursor: default !important; } }

<body>

    <div class="app" id="app">
        <header class="app-header">
            <h1>華夏·萬國<br /><small>CHINA &amp; THE WORLD · 歷史年表</small></h1>
        </header>

        <div class="sticky-toolbar">
            <div class="toolbar">
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜尋朝代、皇帝、年號、事件…" autocomplete="off" />
                    <button class="clear-btn" id="clearBtn" aria-label="清除搜尋">✕</button>
                </div>
                <div class="controls-group">
                    <button class="toggle-all-btn" id="toggleAllBtn" aria-label="全部展開或收回">▾</button>
                    <span class="divider"></span>
                    <div class="font-controls">
                        <button id="fontDecBtn" aria-label="縮小字級">A−</button>
                        <span class="font-size-label" id="fontSizeLabel">160%</span>
                        <button id="fontIncBtn" aria-label="放大字級">A+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="stats">
            <span class="count" id="statsCount">載入中…</span>
            <span class="hint">點擊事件自動複製並 Google 搜尋</span>
        </div>

        <div id="timelineContainer">
            <div class="loading">
                <div class="spinner"></div>
                <div>載入歷史資料中…</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"><span class="icon">📋</span><span id="toastMsg">已複製，開啟搜尋…</span></div>

    <script>
        // ============================================================
        //  工具函數
        // ============================================================
        function isCrossYear(text) {
            if (!text) return false;
            return /\(\d{3,4}~\d{3,4}\)/.test(text) || /\(\d{3,4}\)/.test(text);
        }

        function escapeAttr(text) {
            if (!text) return '';
            return text.replace(/"/g, '&quot;').replace(/&/g, '&amp;');
        }

        // ============================================================
        //  Toast 訊息
        // ============================================================
        let toastTimer = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMsg');
            msgEl.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ============================================================
        //  點擊事件 → 複製 + Google 搜尋
        // ============================================================
        function searchEvent(el) {
            const text = el.getAttribute('data-event-text');
            if (!text || text.trim() === '' || text === '—') return;
            el.classList.remove('flash');
            void el.offsetWidth;
            el.classList.add('flash');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).catch(() => {});
            }
            showToast('📋 已複製，開啟搜尋…');
            const url = 'https://www.google.com/search?q=' + encodeURIComponent(text);
            window.open(url, '_blank');
        }

        // ============================================================
        //  字級控制
        // ============================================================
        const MIN_FONT_SIZE = 12,
            MAX_FONT_SIZE = 38,
            STEP = 1,
            DEFAULT_FONT_SIZE = 28.8;

        function getCurrentFontSize() {
            const html = document.documentElement;
            const computed = window.getComputedStyle(html);
            const size = parseFloat(computed.fontSize);
            return isNaN(size) ? DEFAULT_FONT_SIZE : size;
        }

        function setFontSize(size) {
            const clamped = Math.min(Math.max(size, MIN_FONT_SIZE), MAX_FONT_SIZE);
            document.documentElement.style.fontSize = clamped + 'px';
            updateFontLabel(clamped);
        }

        function updateFontLabel(size) {
            const label = document.getElementById('fontSizeLabel');
            if (label) {
                const percent = Math.round((size / 18) * 100);
                label.textContent = percent + '%';
            }
        }

        function changeFontSize(delta) {
            const current = getCurrentFontSize();
            setFontSize(current + delta);
        }

        // ============================================================
        //  全部展開 / 全部收回
        // ============================================================
        let allExpanded = false;

        function toggleAll() {
            allExpanded = !allExpanded;
            const bodies = document.querySelectorAll('.dynasty-body');
            const toggles = document.querySelectorAll('.dynasty-toggle');
            const btn = document.getElementById('toggleAllBtn');
            if (allExpanded) {
                bodies.forEach(b => b.classList.add('open'));
                toggles.forEach(t => t.classList.add('open'));
                btn.classList.add('all-open');
            } else {
                bodies.forEach(b => b.classList.remove('open'));
                toggles.forEach(t => t.classList.remove('open'));
                btn.classList.remove('all-open');
            }
        }

        // ============================================================
        //  渲染引擎
        // ============================================================
        const container = document.getElementById('timelineContainer');
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const statsCount = document.getElementById('statsCount');

        let DATA = [];

        function render(term) {
            const search = (term || '').trim().toLowerCase();
            let totalMatch = 0,
                totalEmperor = 0;

            if (!DATA || DATA.length === 0) {
                container.innerHTML =
                    '<div class="loading"><div class="spinner"></div><div>載入歷史資料中…</div></div>';
                return;
            }

            const filteredDynasties = DATA.map(dynasty => {
                const dynastyNameMatch = dynasty.name.includes(search);
                const matchedEmperors = dynasty.emperors.map(emp => {
                    const texts = [
                        dynasty.name, emp.name, emp.era,
                        String(emp.yearStart), String(emp.yearEnd)
                    ];
                    // 合併事件陣列到搜尋文字中
                    if (emp.chinaEvents) emp.chinaEvents.forEach(e => texts.push(e));
                    if (emp.worldEvents) emp.worldEvents.forEach(e => texts.push(e));
                    const fullText = texts.join(' ').toLowerCase();
                    const match = !search || fullText.includes(search) || dynastyNameMatch;
                    return { ...emp, match };
                });
                const hasMatch = matchedEmperors.some(e => e.match) || dynastyNameMatch;
                return { ...dynasty, emperors: matchedEmperors, hasMatch, dynastyNameMatch };
            });

            let totalRows = 0,
                matchRows = 0;
            filteredDynasties.forEach(d => d.emperors.forEach(e => { totalRows++;
                    if (e.match) matchRows++; }));
            totalEmperor = totalRows;
            totalMatch = matchRows;

            if (search) statsCount.textContent = `找到 ${totalMatch} 筆 / 共 ${totalEmperor} 位皇帝`;
            else statsCount.textContent = `共 ${totalEmperor} 位皇帝 · ${DATA.length} 個朝代`;

            let html = '';
            if (totalRows === 0 && search) {
                html =
                    `<div class="empty-state"><div class="icon">📜</div><p>沒有找到與「<strong style="color:rgba(252,251,250,0.5);">${term}</strong>」相關的內容</p><p style="font-size:0.8rem;margin-top:6px;opacity:0.5;">試試其他關鍵字</p></div>`;
                container.innerHTML = html;
                return;
            }

            filteredDynasties.forEach((dynasty, di) => {
                const shouldOpen = !search || dynasty.hasMatch;
                const dynastyOpenClass = shouldOpen ? 'open' : '';
                const toggleOpenClass = shouldOpen ? 'open' : '';
                const highlightClass = dynasty.hasMatch && search ? 'highlight' : '';

                html += `<div class="dynasty ${highlightClass}" data-dynasty-id="${dynasty.id}">
                    <div class="dynasty-header" data-toggle>
                        <span class="dynasty-name">
                            ${dynasty.name}
                            <span class="years">${dynasty.start} ~ ${dynasty.end}</span>
                            <span class="badge">${dynasty.emperors.length} 帝</span>
                        </span>
                        <span class="dynasty-toggle ${toggleOpenClass}" aria-hidden="true">▾</span>
                    </div>
                    <div class="dynasty-body ${dynastyOpenClass}">
                        <div class="emperor-grid">`;

                dynasty.emperors.forEach((emp, ei) => {
                    // 檢查是否有事件包含年份區間（跨年）
                    let hasCross = false;
                    const allEvents = (emp.chinaEvents || []).concat(emp.worldEvents || []);
                    allEvents.forEach(e => { if (isCrossYear(e)) hasCross = true; });
                    const crossClass = hasCross ? 'cross-year' : '';
                    const matchClass = emp.match ? 'match' : '';

                    const highlightText = (text) => {
                        if (!text || !search) return text || '';
                        const escaped = search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        const regex = new RegExp(`(${escaped})`, 'gi');
                        return text.replace(regex, '<span class="search-match">$1</span>');
                    };

                    // === 中國事件（陣列） ===
                    let chinaHtml = '';
                    const chinaEvents = emp.chinaEvents || [];
                    if (chinaEvents.length === 0) {
                        chinaHtml = '<span class="no-event">—</span>';
                    } else {
                        chinaEvents.forEach((event) => {
                            const hasYear = isCrossYear(event);
                            const crossTag = hasYear ? '<span class="cross-tag">跨年</span>' : '';
                            const highlighted = highlightText(event);
                            const eventText = escapeAttr(event);
                            chinaHtml +=
                                `<span class="event-item" data-event-text="${eventText}" onclick="searchEvent(this)"><span class="bullet">•</span>${crossTag}${highlighted}</span>`;
                        });
                    }

                    // === 西洋事件（陣列） ===
                    let worldHtml = '';
                    const worldEvents = emp.worldEvents || [];
                    if (worldEvents.length === 0) {
                        worldHtml = '<span class="no-event">—</span>';
                    } else {
                        worldEvents.forEach((event) => {
                            const highlighted = highlightText(event);
                            const eventText = escapeAttr(event);
                            worldHtml +=
                                `<span class="event-item" data-event-text="${eventText}" onclick="searchEvent(this)"><span class="bullet">•</span>${highlighted}</span>`;
                        });
                    }

                    const emperorDisplay = `
                        <span class="emp-era">
                            <span class="emp-name">${emp.name}</span>·
                            <span class="era-name">${emp.era}</span>
                        </span>
                        <span class="year-range">（${emp.yearStart}~${emp.yearEnd}）</span>
                    `;

                    html += `<div class="emperor-row ${matchClass} ${crossClass}">
                        <div class="col-emperor">${emperorDisplay}</div>
                        <div class="col-china">${chinaHtml}</div>
                        <div class="col-world">${worldHtml}</div>
                    </div>`;
                });

                html += `</div></div></div>`;
            });

            container.innerHTML = html;

            if (search) {
                document.querySelectorAll('.dynasty').forEach(el => {
                    const body = el.querySelector('.dynasty-body');
                    const toggle = el.querySelector('.dynasty-toggle');
                    const hasMatch = el.querySelector('.emperor-row.match') !== null;
                    if (hasMatch) { body.classList.add('open'); if (toggle) toggle.classList.add('open'); } else { body
                            .classList.remove('open'); if (toggle) toggle.classList.remove('open'); }
                });
                allExpanded = false;
                document.getElementById('toggleAllBtn').classList.remove('all-open');
            }

            document.querySelectorAll('.dynasty-header[data-toggle]').forEach(header => {
                header.removeEventListener('click', toggleDynasty);
                header.addEventListener('click', toggleDynasty);
            });
        }

        // ============================================================
        //  展開/收回
        // ============================================================
        function toggleDynasty(e) {
            const header = e.currentTarget;
            const dynasty = header.closest('.dynasty');
            if (!dynasty) return;
            const body = dynasty.querySelector('.dynasty-body');
            const toggle = dynasty.querySelector('.dynasty-toggle');
            if (!body) return;
            const isOpen = body.classList.contains('open');
            if (isOpen) { body.classList.remove('open'); if (toggle) toggle.classList.remove('open'); } else { body.classList
                    .add('open'); if (toggle) toggle.classList.add('open'); }
            updateAllToggleState();
        }

        function updateAllToggleState() {
            const bodies = document.querySelectorAll('.dynasty-body');
            const allOpen = bodies.length > 0 && Array.from(bodies).every(b => b.classList.contains('open'));
            const btn = document.getElementById('toggleAllBtn');
            if (allOpen) { btn.classList.add('all-open');
                allExpanded = true; } else { btn.classList.remove('all-open');
                allExpanded = false; }
        }

        // ============================================================
        //  載入 JSON 資料
        // ============================================================
        function loadData() {
    const jsonPath = '../Data/timeline_data.json';

    fetch(jsonPath)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - ${response.statusText}`);
            }
            return response.json();  // ← 這行最重要！
        })
        .then(data => {
            DATA = data;
            render('');
            const total = DATA.reduce((sum, d) => sum + d.emperors.length, 0);
            statsCount.textContent = `共 ${total} 位皇帝 · ${DATA.length} 個朝代`;
        })
        .catch(error => {
            console.error('載入資料失敗:', error);
            container.innerHTML = `
                <div class="error-state">
                    <div class="icon">⚠️</div>
                    <p>無法載入歷史資料</p>
                    <p style="font-size:0.7rem;opacity:0.6;margin-top:4px;">${error.message}</p>
                    <p style="font-size:0.7rem;opacity:0.5;margin-top:2px;">請確認 Data/timeline_data.json 存在且格式正確</p>
                    <button class="retry-btn" onclick="loadData()">重新載入</button>
                </div>
            `;
        });
}

        // ============================================================
        //  搜尋邏輯
        // ============================================================
        function doSearch() {
            const term = searchInput.value;
            if (term.trim()) clearBtn.classList.add('visible');
            else clearBtn.classList.remove('visible');
            render(term);
        }
        searchInput.addEventListener('input', doSearch);
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.remove('visible');
            render('');
            searchInput.focus();
        });

        // ============================================================
        //  初始化
        // ============================================================
        document.documentElement.style.fontSize = DEFAULT_FONT_SIZE + 'px';
        updateFontLabel(getCurrentFontSize());

        document.getElementById('fontIncBtn').addEventListener('click', () => changeFontSize(STEP));
        document.getElementById('fontDecBtn').addEventListener('click', () => changeFontSize(-STEP));
        document.getElementById('toggleAllBtn').addEventListener('click', toggleAll);

        document.addEventListener('touchstart', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.closest('.search-wrap') === null) {
                searchInput.blur();
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.activeElement === searchInput) {
                clearBtn.click();
            }
        });

        // 開始載入資料
        loadData();
        console.log('📜 歷史年表主程式已載入，正在讀取 data/timeline_data.json…');
    </script>

</body>
</html>
